    }

    // ★ v0.9.1 승급 요청 (응답 대기)
    if (r.payrollReport.promotionRequests && r.payrollReport.promotionRequests.length > 0) {
      html += `<div style="font-size:14px; font-weight:bold; color:#facc15; margin:14px 0 6px 0;">📋 승급 요청 ${r.payrollReport.promotionRequests.length}건</div>`;
      r.payrollReport.promotionRequests.forEach(p => {
        html += `<div class="info-panel" style="border-color:#facc15; padding:8px 12px; margin-bottom:6px;"><span style="color:#facc15;">${htmlEscape(p.employeeName||'')} (Lv${p.atLevel}) 승급 요청 — 직원 상세에서 응답</span></div>`;
      });
    }

    // ★ v0.9.1 버프 획득
    if (r.payrollReport.buffsGained && r.payrollReport.buffsGained.length > 0) {
      html += `<div style="font-size:14px; font-weight:bold; color:#22d3ee; margin:14px 0 6px 0;">✨ 버프 획득 ${r.payrollReport.buffsGained.length}건</div>`;
      r.payrollReport.buffsGained.forEach(p => {
        html += `<div class="info-panel" style="border-color:#22d3ee; padding:8px 12px; margin-bottom:6px;"><span style="color:#22d3ee;">${htmlEscape(p.employeeName||'')} (Lv${p.level}) — ${p.buff.name}: ${p.buff.desc}</span></div>`;
      });
    }

    if (r.payrollReport.promotions.length > 0) {
      html += `<div style="font-size:14px; font-weight:bold; color:#a3e635; margin:14px 0 6px 0;">🎉 승급 ${r.payrollReport.promotions.length}건</div>`;
      r.payrollReport.promotions.forEach(p => {
        html += `<div class="info-panel" style="border-color:#a3e635; padding:8px 12px; margin-bottom:6px;"><span style="color:#a3e635;">${htmlEscape(p.employeeName||'')} ${lbl[p.from]} → ${lbl[p.to]}</span></div>`;
      });
    }

    if (r.payrollReport.accidents.length > 0) {
      html += `<div style="font-size:14px; font-weight:bold; color:#f87171; margin:14px 0 6px 0;">⚠ 사고 ${r.payrollReport.accidents.length}건</div>`;
      const types = {burnt:'음식 태움', complaint:'손님 컴플레인', runaway:'야반도주'};
      const counts = {};
      r.payrollReport.accidents.forEach(a => counts[a.type] = (counts[a.type]||0)+1);
      Object.keys(counts).forEach(k => {
        html += `<div class="info-panel" style="border-color:#f87171; padding:8px 12px; margin-bottom:6px;"><span style="color:#f87171;">${types[k]}: ${counts[k]}건</span></div>`;
      });
    }

    const hasReq = r.payrollReport.promotionRequests && r.payrollReport.promotionRequests.length > 0;
    const hasBuff = r.payrollReport.buffsGained && r.payrollReport.buffsGained.length > 0;
    if (r.payrollReport.promotions.length === 0 && r.payrollReport.accidents.length === 0 && !hasReq && !hasBuff) {
      html += `<div class="info-panel" style="text-align:center; color:#94a3b8; padding:24px;">이번 분기는 평온했습니다 ✨</div>`;
    }
    return html;
  },
  update: function() {},
};

/* ─── 메인 게임 ─── */
scenes.game = {
  enter: function() {
    const s = window.MJY.gameState.get();
    // ★ BUG-C: settlement 진행 중 재진입 차단
    if (s.phase === 'settlement') {
      s.phase = 'playing';
    } else {
      s.phase = 'playing';
    }
    // ★ v0.36b 개발자 모드 — 모든 시스템 즉시 해금
    if (s.loginType === 'dev') {
      if (!s.stocks)        s.stocks        = (typeof stockEngine        !== 'undefined') ? stockEngine.initStocksState()        : null;
      if (!s.futures)       s.futures       = (typeof futuresEngine       !== 'undefined') ? futuresEngine.initFuturesState()       : null;
      if (!s.foreignStocks) s.foreignStocks = (typeof foreignStockEngine  !== 'undefined') ? foreignStockEngine.initForeignStocksState() : null;
      if (s.stocks)        s.stocks.unlocked        = true;
      if (s.futures)       s.futures.unlocked       = true;
      if (s.foreignStocks) s.foreignStocks.unlocked = true;
      // 가격 초기화 (첫 진입 시)
      if (s.stocks && typeof STOCK_DATA !== 'undefined') {
        Object.keys(STOCK_DATA).forEach(code => {
          if (!s.stocks.priceHistory[code] || s.stocks.priceHistory[code].length === 0) {
            s.stocks.priceHistory[code] = [STOCK_DATA[code].basePrice];
          }
        });
        if (!s.stocks.nextMacro && typeof MACRO_HINTS !== 'undefined') {
          s.stocks.nextMacro = MACRO_HINTS[Math.floor(Math.random()*MACRO_HINTS.length)];
        }
      }
      if (s.futures && typeof FUTURES_DATA !== 'undefined') {
        Object.keys(FUTURES_DATA).forEach(code => {
          if (!s.futures.priceHistory[code] || s.futures.priceHistory[code].length === 0) {
            s.futures.priceHistory[code] = [FUTURES_DATA[code].basePrice];
          }
        });
      }
      if (s.foreignStocks && typeof FOREIGN_STOCK_DATA !== 'undefined') {
        Object.keys(FOREIGN_STOCK_DATA).forEach(code => {
          if (!s.foreignStocks.priceHistory[code] || s.foreignStocks.priceHistory[code].length === 0) {
            s.foreignStocks.priceHistory[code] = [FOREIGN_STOCK_DATA[code].basePrice];
          }
        });
        s.foreignStocks.exchangeRate = 1350;
      }
      s.gems = Math.max(s.gems||0, 9999);  // 보석 무한
      if (s.futures) s.futures._tutorialDone = true;
      // HUD에 DEV 배지 표시
      setTimeout(() => toast.show('🛠 개발자 모드 — 모든 기능 해금', '#fbbf24'), 500);
    }
    // quarterElapsedMs 안전 초기화 — 항상 0으로 (재진입 안전)
    s.quarterElapsedMs = 0;
    s.phase = 'playing';
    // 화면 전환
    document.getElementById('start-screen').classList.remove('active');
    document.getElementById('game-screen').classList.add('active');
    // ★ RangeError 방지: 초기 렌더를 setTimeout으로 비동기화
    // game.enter()가 loop() 프레임 안에서 동기 호출될 때 스택 폭발 방지
    const _self = this;
    setTimeout(() => {
      _self.renderHUD();
      _self.renderBackground();
      _self.renderBizList();
      _self.bindActionBar();
    }, 0);
  },
  exit: function() {
    document.getElementById('game-screen').classList.remove('active');
  },
  // HUD 업데이트
  // ★ v0.37m 모달/정지 중 경량 HUD (리스크 계산 없음)
  _renderHUDBasic: function() {
    const s = window.MJY.gameState.get();
    const gs = window.MJY.gameState;
    const totalDebt = gs.getTotalDebt ? gs.getTotalDebt() : 0;
    const cashEl = document.getElementById('hud-cash');
    const debtEl = document.getElementById('hud-debt');
    if (cashEl) cashEl.textContent = fmtWon(s.cash);
    if (debtEl) { debtEl.textContent = fmtWon(totalDebt); debtEl.style.color = totalDebt > 0 ? '#f87171' : '#cbd5e1'; }
    const timerEl = document.getElementById('hud-timer');
    if (timerEl) {
      const remaining = Math.max(0, Math.ceil((QUARTER_MS - (s.quarterElapsedMs||0))/1000));
      timerEl.textContent = remaining + '초';
    }
  },
  renderHUD: function() {
    const s = window.MJY.gameState.get();
    const gs = window.MJY.gameState;
    const stage = gs.getCurrentStage();
    const totalDebt = gs.getTotalDebt();
    const netWorth = s.cash - totalDebt;
    const elapsed = s.quarterElapsedMs;
    const remaining = Math.max(0, Math.ceil((QUARTER_MS - elapsed)/1000));
    const paused = s.isPaused || modal.isOpen();
    // 게임 화면 HUD
    document.getElementById('hud-quarter').textContent = fmtQuarterLabel(s.quarter) + ' (' + s.quarter + '/' + s.maxQuarters + ')';
    document.getElementById('hud-timer').textContent = (paused ? '⏸ ' : '⏱ ') + remaining + '초';
    document.getElementById('hud-timer').style.color = paused ? '#94a3b8' : (remaining <= 10 ? '#dc2626' : '#cbd5e1');
    document.getElementById('hud-stage').textContent = stage.label;
    // ★ v0.9.0 본사 배지
    const hqBadge = document.getElementById('hud-hq');
    if (hqBadge) {
      if (s.headquarters && s.headquarters.established) {
        hqBadge.style.display = 'inline';
        hqBadge.textContent = ' 🏢Lv' + s.headquarters.level;
      } else {
        hqBadge.style.display = 'none';
      }
    }
    document.getElementById('hud-cash').textContent = fmtWon(s.cash);
    document.getElementById('hud-debt').textContent = fmtWon(totalDebt);
    document.getElementById('hud-debt').style.color = totalDebt > 0 ? '#f87171' : '#cbd5e1';
    document.getElementById('hud-networth').textContent = (netWorth>=0?'+':'') + fmtWon(netWorth);
    document.getElementById('hud-networth').style.color = netWorth >= 0 ? '#facc15' : '#f87171';
    // ★ v0.9.1 명성 표시
    const repEl = document.getElementById('hud-reputation');
    if (repEl) {
      const rep = s.reputation !== undefined ? s.reputation : 50;
      repEl.textContent = rep;
      repEl.style.color = rep >= 70 ? '#a3e635' : rep >= 40 ? '#fbbf24' : '#f87171';
    }
    // ★ v0.10 보석 표시
    const gemEl = document.getElementById('hud-gems');
    if (gemEl) gemEl.textContent = (s.gems || 0);

    // ★ v0.37m 리스크 HUD — 5초(150프레임)마다 갱신 (성능 최적화)
    if (!this._lastRiskFrame) this._lastRiskFrame = 0;
    const riskHud = document.getElementById('risk-hud');
    const shouldUpdateRisk = (Math.floor(frameCount/150) !== this._lastRiskFrame);
    if (shouldUpdateRisk) this._lastRiskFrame = Math.floor(frameCount/150);
    if (riskHud && shouldUpdateRisk) {
      let stockPnl = 0;
      if (s.stocks && s.stocks.portfolio) {
        Object.keys(s.stocks.portfolio).forEach(code => {
          const h = s.stocks.portfolio[code]; if (!h||h.shares<=0) return;
          const hist=(s.stocks.priceHistory&&s.stocks.priceHistory[code])||[];
          const price = hist.length>0?hist[hist.length-1]:0;
          stockPnl += (price-h.avgPrice)*h.shares;
        });
      }
      let foreignPnl = 0;
      if (s.foreignStocks && s.foreignStocks.portfolio) {
        const exR = s.foreignStocks.exchangeRate||1350;
        Object.keys(s.foreignStocks.portfolio).forEach(code => {
          const h=s.foreignStocks.portfolio[code]; if(!h||h.shares<=0) return;
          const hist=(s.foreignStocks.priceHistory&&s.foreignStocks.priceHistory[code])||[];
          const pusd=hist.length>0?hist[hist.length-1]:0;
          foreignPnl += (pusd-h.avgPriceUSD)*h.shares*exR;
        });
      }
      let futuresPnl = 0;
      if (s.futures && s.futures.positions) {
        Object.values(s.futures.positions).forEach(pos => {
          if (!pos||pos.lots<=0) return;
          const fh=(s.futures.priceHistory&&s.futures.priceHistory[pos.code])||[];
          const fp=fh.length>0?fh[fh.length-1]:0;
          const diff=pos.direction==='long'?fp-pos.avgPrice:pos.avgPrice-fp;
          futuresPnl+=diff*pos.lots*pos.leverage*10000;
        });
      }
      const yongpali = s.yongpaliAccumInterest||0;
      const totalRisk = stockPnl+foreignPnl+futuresPnl-yongpali;
      const hasInv = (s.stocks&&s.stocks.unlocked)||(s.foreignStocks&&s.foreignStocks.unlocked)||(s.futures&&s.futures.unlocked);
      if (hasInv) {
        riskHud.style.display='block';
        const rc=totalRisk>=0?'#ef4444':'#3b82f6';
        const rtEl=document.getElementById('risk-total');
        if(rtEl){rtEl.style.color=rc;rtEl.textContent=(totalRisk>=0?'▲ ':'▼ ')+fmtWon(Math.abs(totalRisk));}
        const rsEl=document.getElementById('risk-stock');
        if(rsEl){rsEl.style.color=stockPnl>=0?'#ef4444':'#3b82f6';rsEl.textContent=(stockPnl>=0?'+':'')+fmtWon(stockPnl);}
        const rfEl=document.getElementById('risk-foreign');
        if(rfEl){rfEl.style.color=foreignPnl>=0?'#ef4444':'#3b82f6';rfEl.textContent=(foreignPnl>=0?'+':'')+fmtWon(foreignPnl);}
        const rftEl=document.getElementById('risk-futures');
        if(rftEl){rftEl.style.color=futuresPnl>=0?'#ef4444':'#3b82f6';rftEl.textContent=(futuresPnl>=0?'+':'')+fmtWon(futuresPnl);}
        const ryEl=document.getElementById('risk-yongpali');
        if(ryEl){ryEl.style.color=yongpali>0?'#dc2626':'#64748b';ryEl.textContent=yongpali>0?'-'+fmtWon(yongpali):'0';}

        // 위험도 바 + 아이콘 + 순자산 대비 %
        const netW = Math.max(1, s.cash - (window.MJY.gameState.getTotalDebt ? window.MJY.gameState.getTotalDebt() : 0));
        const lossPct = totalRisk < 0 ? Math.min(100, Math.abs(totalRisk)/netW*100) : 0;
        const barEl = document.getElementById('risk-bar');
        const iconEl = document.getElementById('risk-danger-icon');
        const pctEl  = document.getElementById('risk-pct');
        if (barEl) {
          const barCol = lossPct >= 50 ? '#dc2626' : lossPct >= 20 ? '#f97316' : '#22c55e';
          barEl.style.width   = Math.min(100, lossPct) + '%';
          barEl.style.background = barCol;
        }
        if (iconEl) iconEl.textContent = lossPct >= 50 ? '🔴' : lossPct >= 20 ? '🟡' : '🟢';
        if (pctEl)  pctEl.textContent  = lossPct > 0 ? '(손실 ' + lossPct.toFixed(1) + '%)' : '';
      } else { riskHud.style.display='none'; }
    }
    // ★ v0.10 퀘스트 미수령 배지
    const qBadge = document.getElementById('quest-badge');
    if (qBadge && window.MJY.questEngine) {
      const cc = window.MJY.questEngine.countClaimable(s);
      if (cc > 0) { qBadge.textContent = cc; qBadge.style.display = 'inline-block'; }
      else qBadge.style.display = 'none';
    }
    // 모달 안 미니 HUD (모달이 열려있을 때도 자산 가시성 유지)
    const mc = document.getElementById('modal-hud-cash');
    if (mc) {
      mc.textContent = fmtWon(s.cash);
      document.getElementById('modal-hud-debt').textContent = fmtWon(totalDebt);
      document.getElementById('modal-hud-debt').style.color = totalDebt > 0 ? '#f87171' : '#cbd5e1';
      const mn = document.getElementById('modal-hud-networth');
      mn.textContent = (netWorth>=0?'+':'') + fmtWon(netWorth);
      mn.style.color = netWorth >= 0 ? '#facc15' : '#f87171';
      document.getElementById('modal-hud-quarter').textContent = fmtQuarterLabel(s.quarter) + ' (' + s.quarter + '/' + s.maxQuarters + ')';
    }
    // 일시정지 버튼 상태
    const btnPause = document.getElementById('btn-pause');
    if (btnPause) {
      btnPause.textContent = s.isPaused ? '▶ 재개' : '⏸ 정지';
      btnPause.style.background = s.isPaused ? '#16a34a' : '#ca8a04';
    }
    // ★ v0.8.0 활성 사건 패널 갱신
    this.renderActiveEvents();
  },
  // ★ v0.8.0 활성 사건 패널 렌더
  renderActiveEvents: function() {
    const s = window.MJY.gameState.get();
    const panel = document.getElementById('active-events-panel');
    const list = document.getElementById('active-events-list');
    const yearEl = document.getElementById('active-year');
    if (!panel || !list) return;
    yearEl.textContent = (s.gameYear || 1985) + '년';
    if (!s.activeEvents || s.activeEvents.length === 0) {
      panel.style.display = 'none';
      return;
    }
    panel.style.display = 'block';
    const rarityColor = {common:'#475569', uncommon:'#0ea5e9', rare:'#a855f7', legendary:'#facc15'};
    list.innerHTML = s.activeEvents.map(ev => {
      const color = ev.posneg === 'positive' ? '#4ade80' : (ev.category === 'oneoff' ? '#fbbf24' : '#ef4444');
      const border = rarityColor[ev.rarity] || '#475569';
      const rq = ev.remainingQuarters !== undefined ? ev.remainingQuarters : 1;
      const days = rq >= 99 ? '∞' : rq + '분기';
      const star = ev.trigger ? '⭐' : '';
      let effect = '';
      if (ev.revMul && ev.revMul !== 1.0) effect += '매출×' + ev.revMul.toFixed(2) + ' ';
      if (ev.costMul && ev.costMul !== 1.0) effect += '비용×' + ev.costMul.toFixed(2);
      effect = effect.trim() || '효과';
      return `<div title="${ev.story}\n${effect}" style="background:#1e293b; border:1px solid ${border}; border-radius:4px; padding:3px 6px; font-size:10px; color:${color}; white-space:nowrap; cursor:help;">${star}${ev.name} <span style="color:#64748b; font-size:9px;">${days}</span></div>`;
    }).join('');
  },
  // 픽셀 배경 (작은 캔버스에 그리기)
  renderBackground: function() {
    const bgCanvas = document.getElementById('bg-canvas');
    if (!bgCanvas) return;
    const bctx = bgCanvas.getContext('2d');
    bctx.imageSmoothingEnabled = false;
    const s = window.MJY.gameState.get();

    // ★ v0.16 [계절×시간대] 하늘 — 사마의 "있는 것을 쓰라": 분기→계절, 분기내 경과→시간대
    const gs = window.MJY.gameState;
    const season = gs.getSeason ? gs.getSeason() : 'spring';
    const tod = gs.getTimeOfDay ? gs.getTimeOfDay() : 'evening';
    const isNight = (tod === 'night');
    // 시간대별 하늘 팔레트 (현대적: 데이터 테이블 분리)
    const SKY = {
      morning: [[0,'#3b5a8a'],[0.4,'#7a9ec4'],[0.72,'#f4c89a'],[1,'#fbe4b8']],
      noon:    [[0,'#2e6db4'],[0.45,'#5b9bd8'],[0.78,'#a9d2f0'],[1,'#d8eefb']],
      evening: [[0,'#33285e'],[0.38,'#5e3a7e'],[0.62,'#b85a8a'],[0.82,'#f08a5a'],[1,'#fbd07a']],
      night:   [[0,'#0a0a1e'],[0.45,'#161636'],[0.75,'#262652'],[1,'#3a3568']],
    };
    // 계절 틴트 (하늘 위에 살짝 얹는 반투명 — 사마의 2번: 계절은 바탕, 톤으로만)
    const SEASON_TINT = {
      spring: 'rgba(255,182,217,0.06)',
      summer: 'rgba(255,238,140,0.05)',
      autumn: 'rgba(255,160,80,0.07)',
      winter: 'rgba(200,220,255,0.08)',
    };
    const skyStops = SKY[tod] || SKY.evening;
    const grad = bctx.createLinearGradient(0,0,0,118);
    skyStops.forEach(([p,c])=>grad.addColorStop(p,c));
    bctx.fillStyle = grad;
    bctx.fillRect(0, 0, 800, 118);
    // 계절 틴트
    bctx.fillStyle = SEASON_TINT[season] || 'rgba(0,0,0,0)';
    bctx.fillRect(0, 0, 800, 118);

    // 밤이면 별
    if (isNight) {
      bctx.fillStyle = 'rgba(255,255,255,0.8)';
      for (let i=0;i<40;i++){ const sx=(i*97+13)%800, sy=(i*53+7)%70; const tw=(frameCount+i*20)%120<60; if(tw) bctx.fillRect(sx, sy, 2, 2); }
    }

    // 해 또는 달 (시간대로 위치/색 결정)
    const sunX = tod==='morning'?180 : tod==='noon'?400 : tod==='evening'?640 : 680;
    const sunY = tod==='noon'?28 : tod==='night'?34 : 50;
    if (isNight) {
      // 달
      bctx.fillStyle='rgba(230,230,250,0.25)'; bctx.beginPath(); bctx.arc(sunX,sunY,30,0,Math.PI*2); bctx.fill();
      bctx.fillStyle='#e8e8f8'; bctx.beginPath(); bctx.arc(sunX,sunY,20,0,Math.PI*2); bctx.fill();
      bctx.fillStyle='#0a0a1e'; bctx.beginPath(); bctx.arc(sunX+8,sunY-4,17,0,Math.PI*2); bctx.fill();  // 초승달 음영
    } else {
      const sunCol = tod==='evening'?'#fdebb0' : tod==='morning'?'#ffd9a0' : '#fff4c4';
      bctx.fillStyle = 'rgba(253,233,168,0.28)'; bctx.beginPath(); bctx.arc(sunX,sunY,42,0,Math.PI*2); bctx.fill();
      bctx.fillStyle = sunCol; bctx.beginPath(); bctx.arc(sunX,sunY,27,0,Math.PI*2); bctx.fill();
      bctx.fillStyle = '#fef9e0'; bctx.beginPath(); bctx.arc(sunX,sunY,19,0,Math.PI*2); bctx.fill();
    }

    // 구름 (느리게 흐름; 밤엔 흐릿)
    const co = (frameCount/6) % 1000;
    bctx.globalAlpha = isNight ? 0.35 : 1.0;
    drawSpriteOn(bctx, SPRITES.cloud, 120-co, 14, 3);
    drawSpriteOn(bctx, SPRITES.cloud2, 420-co, 30, 3);
    drawSpriteOn(bctx, SPRITES.cloud, 720-co, 10, 2);
    drawSpriteOn(bctx, SPRITES.cloud2, 980-co, 34, 3);
    bctx.globalAlpha = 1.0;

    // 원경 건물 실루엣 (어두운 보라, 깊이감)
    bctx.fillStyle = 'rgba(30,20,46,0.55)';
    for (let i=0;i<16;i++){ const h=18+((i*37)%26); bctx.fillRect(i*52, 96-h, 40, h); }

    // 근경 건물 5종 (창문 불빛) — 바닥 y=118 기준 정렬
    const layout = [
      {sp:'building3', x:-6,  sc:2}, {sp:'building1', x:78, sc:2},
      {sp:'building5', x:150, sc:2}, {sp:'building4', x:206, sc:2},
      {sp:'building2', x:286, sc:2}, {sp:'building1', x:360, sc:2},
      {sp:'building3', x:432, sc:2}, {sp:'building5', x:516, sc:2},
      {sp:'building4', x:572, sc:2}, {sp:'building2', x:652, sc:2},
      {sp:'building1', x:726, sc:2},
    ];
    for (const b of layout) {
      const sp = SPRITES[b.sp];
      drawSpriteOn(bctx, sp, b.x, 118 - sp.data.length*b.sc, b.sc);
    }

    // 도로 (어두운 아스팔트 + 보도)
    bctx.fillStyle = '#1a1530'; bctx.fillRect(0, 118, 800, 8);   // 보도
    bctx.fillStyle = '#26203c'; bctx.fillRect(0, 126, 800, 34);  // 차도
    // 중앙선 (네온 옐로우)
    bctx.fillStyle = '#fbbf24';
    for (let x=0; x<800; x+=50) bctx.fillRect(x+12, 142, 26, 3);
    // 가로등 불빛 반사 (도로에 따뜻한 점)
    bctx.fillStyle = 'rgba(251,191,36,0.12)';
    for (let x=20; x<800; x+=120) { bctx.beginPath(); bctx.ellipse(x, 150, 30, 6, 0, 0, Math.PI*2); bctx.fill(); }

    // 차 2종 (방향 따라 좌우 반전, 색 교대)
    cars.forEach((c, idx) => {
      const carSp = idx % 2 === 0 ? SPRITES.car : SPRITES.car2;
      if (c.speed > 0) drawSpriteOn(bctx, carSp, c.x, 134, 1.6);
      else {
        bctx.save(); bctx.translate(c.x+26, 134); bctx.scale(-1, 1);
        drawSpriteOn(bctx, carSp, 0, 0, 1.6); bctx.restore();
      }
    });

    // ★ v0.16 계절 입자 (봄 벚꽃잎 / 겨울 눈송이) — 떨어지며 흐름
    if (season === 'spring' || season === 'winter') {
      const isSnow = (season === 'winter');
      bctx.fillStyle = isSnow ? 'rgba(255,255,255,0.85)' : 'rgba(255,183,217,0.85)';
      for (let i=0;i<24;i++){
        const speed = isSnow ? 0.4 : 0.7;
        const px = (i*73 + (frameCount*(0.3+ (i%3)*0.15))) % 820;
        const py = (i*37 + frameCount*speed) % 118;
        const sz = isSnow ? 3 : 2;
        // 벚꽃은 좌우로 살랑
        const drift = isSnow ? 0 : Math.sin((frameCount+i*30)/40)*6;
        bctx.fillRect(Math.floor(800-px+drift), Math.floor(py), sz, sz);
      }
    } else if (season === 'autumn') {
      // 가을 낙엽 (드문드문)
      bctx.fillStyle = 'rgba(217,119,66,0.8)';
      for (let i=0;i<10;i++){
        const px=(i*131 + frameCount*0.9)%820;
        const py=(i*61 + frameCount*0.6)%118;
        const drift=Math.sin((frameCount+i*40)/35)*8;
        bctx.fillRect(Math.floor(800-px+drift), Math.floor(py), 3, 2);
      }
    }

    // ★ v0.50 그래픽 업그레이드 레이어 ──
    // 가로등 (밤에만)
    renderStreetLights(bctx, isNight);
    // 네온 사인 (건물 위)
    renderNeonSigns(bctx, isNight);
    // 보행자 미니 캐릭터
    renderPedestrians(bctx);
    // 건물 연기/김
    fx_buildingSteam(bctx);
    // 배경 파티클 (연기, 용팔이 아우라 등)
    renderParticles(bctx, _bgParticles);
    // 용팔이 위험도에 따른 붉은 아우라
    const yongInt = s.yongpaliAccumInterest || 0;
    if (yongInt > 100000000) {
      const intensity = Math.min(1, yongInt / 1e15);
      if (frameCount % 20 === 0) fx_yongpaliAura(intensity);
      // 화면 가장자리 붉은 비네팅
      const vigAlpha = 0.05 + intensity * 0.2;
      const vig = bctx.createRadialGradient(400, 80, 150, 400, 80, 450);
      vig.addColorStop(0, 'rgba(0,0,0,0)');
      vig.addColorStop(1, `rgba(180,20,20,${vigAlpha})`);
      bctx.fillStyle = vig; bctx.fillRect(0, 0, 800, 160);
    }
    // 화면 흔들기 적용
    if (_shake.active) {
      const shakeCanvas = document.getElementById('bg-canvas');
      if (shakeCanvas) {
        shakeCanvas.style.transform = `translate(${_shake.x}px, ${_shake.y}px)`;
      }
    } else {
      const shakeCanvas = document.getElementById('bg-canvas');
      if (shakeCanvas) shakeCanvas.style.transform = '';
    }
  },
  // 사업장 카드 리스트
  renderBizList: function() {
    const s = window.MJY.gameState.get();
    const gs = window.MJY.gameState;
    const stage = gs.getCurrentStage();
    const listEl = document.getElementById('biz-list');
    let html = '';

    // 보유 사업장
    s.businesses.forEach(biz => {
      const cat = gs.BUSINESS_CATEGORIES[biz.category] || gs.BUSINESS_CATEGORIES.food;
      const totalRev = (biz.baseRevenue || 0);
      const bizLv = biz.level || 1;
      const lvBadge = bizLv > 1 ? ` <span style="color:#f59e0b;">Lv${bizLv}</span>` : ` <span style="color:#64748b;">Lv1</span>`;
      const ceoBadge = biz.managedByCEO ? ` <span style="color:#c084fc; font-size:11px;">👑위임</span>` : '';
      html += `
        <div class="biz-card" data-biz-id="${biz.id}" ${biz.managedByCEO?'style="border-color:#a855f7;"':''}>
          <div class="biz-card-header">
            <div class="biz-card-icon">${cat.emoji}</div>
            <div style="flex:1; min-width:0;">
              <div class="biz-card-name">${htmlEscape(biz.name)}${lvBadge}${ceoBadge}</div>
              <div class="biz-card-meta">${cat.label} · 매출 ${fmtWon(totalRev)}/분기${bizLv>1?` · 레벨보너스 +${(bizLv-1)*2}%`:''}</div>
            </div>
            <div class="biz-card-arrow">▶</div>
          </div>
          <div class="biz-card-stats">
            <div style="color:#0ea5e9;">🤖 봇 ${biz.bots.length}/${biz.maxBots}</div>
            <div style="color:#fbbf24; text-align:right;">👥 직원 ${biz.employees.length}/${biz.maxEmployees}</div>
          </div>
        </div>
      `;
    });

    // 빈 슬롯 (잠금해제됨)
    const emptySlots = Math.max(0, stage.slots - s.businesses.length);
    const showEmpty = Math.min(emptySlots, 3);  // 최대 3개까지 표시
    for (let i = 0; i < showEmpty; i++) {
      html += `
        <div class="biz-card unlocked-empty" data-action="expand">
          <div style="font-size:32px; margin-bottom:6px;">➕</div>
          <div style="font-size:16px; font-weight:bold; color:#0ea5e9; margin-bottom:4px;">사업 추가</div>
          <div style="font-size:13px; color:#94a3b8;">사업확장 메뉴 열기</div>
        </div>
      `;
    }

    // 잠긴 슬롯 정보
    const stages = gs.STAGES;
    const curIdx = stages.findIndex(st => st.key === s.businessStage);
    const nextStage = stages[curIdx+1];
    if (nextStage && stage.slots < 999) {
      const need = Math.max(0, nextStage.promotion - s.cumulativeProfit);
      const pct = Math.min(100, (s.cumulativeProfit / nextStage.promotion * 100)).toFixed(1);
      html += `
        <div class="biz-card locked">
          <div style="font-size:32px; margin-bottom:6px;">🔒</div>
          <div style="font-size:15px; font-weight:bold; color:#94a3b8; margin-bottom:4px;">${nextStage.label} 단계 후 ${nextStage.slots - stage.slots}슬롯 해금</div>
          <div style="font-size:12px; color:#94a3b8;">누적 순이익 ${pct}% (남은 ${fmtWon(need)})</div>
        </div>
      `;
    }

    listEl.innerHTML = html;
    // 이벤트 바인딩
    const self = this;
    listEl.querySelectorAll('.biz-card[data-biz-id]').forEach(el => {
      bindClick(el, () => {
        sceneManager.switch('businessMenu', {businessId: el.dataset.bizId});
      });
    });
    listEl.querySelectorAll('.biz-card[data-action="expand"]').forEach(el => {
      bindClick(el, () => sceneManager.switch('expansionMenu'));
    });
  },
  // 액션 바 바인딩 (한 번만)
  _actionBarBound: false,
  bindActionBar: function() {
    if (this._actionBarBound) return;
    this._actionBarBound = true;
    const self = this;
    document.querySelectorAll('#action-bar button[data-game-action]').forEach(el => {
      bindClick(el, () => {
        const action = el.dataset.gameAction;

        if (action === 'loan') sceneManager.switch('loanMenu');
        else if (action === 'repay') sceneManager.switch('repayMenu');
        else if (action === 'hq') sceneManager.switch('hqMenu');
        else if (action === 'finance') sceneManager.switch('financeDashboard');
        else if (action === 'pause') {
          s.isPaused = !s.isPaused;
          toast.show(s.isPaused ? '⏸ 일시정지' : '▶ 게임 재개', s.isPaused ? '#fbbf24' : '#a3e635');
          self.renderHUD();
        }
        else if (action === 'quarter-end') sceneManager.switch('confirmQuarterEnd');
        else if (action === 'quest') sceneManager.switch('questMenu');
        else if (action === 'system') sceneManager.switch('systemMenu');
        else if (action === 'stock') sceneManager.switch('stockMarket');
      });

    // HUD 탭 클릭 → 재무 대시보드 진입
    document.querySelectorAll('[data-hud-click="dashboard"]').forEach(el => {
      bindClick(el, () => sceneManager.switch('financeDashboard'));

    // ★ v0.47 G↔보석 환전소 버튼

    if (gemExBtn) {
      bindClick(gemExBtn, () => sceneManager.switch('gemExchange'));

  },
  // 분기 종료 처리
  processQuarterEnd: function() {
    const s = window.MJY.gameState.get();
    if (s.phase !== 'playing') return;
    s.phase = 'settlement';
    s.quarterElapsedMs = 0;  // ★ BUG-B: 0으로 초기화 (settlement에선 update 차단됨)
    // ★ v0.40 MBTI 갈등 이벤트 (3분기 연속 부정 시너지)
    for (const biz of (s.businesses||[])) {
      if (!biz.unlocked || !biz._mbtiSynergy) continue;
      if ((biz._mbtiSynergyQ||0) >= 3 && (biz._mbtiSynergy.negatives||[]).length > 0) {
        const conflict = biz._mbtiSynergy.negatives[0];
        // 아직 처리 안 된 갈등만
        if (!biz._conflictHandled) {
          biz._conflictPending = true;
          biz._conflictName    = conflict.name;
          biz._conflictEffect  = conflict.effect;
          biz._mbtiSynergyQ    = 0;  // 카운터 리셋
        }
      }
    }
    // ★ v0.8.0 사건 처리 (매출/비용 계산 전에)
    const eventLog = window.MJY.eventEngine.processEventsOnQuarter(s);
    // 1. 인사 처리 (사고, 승급, 봇 마모)
    const pr = window.MJY.payrollEngine.processQuarter(s);
    // 2. 매출
    let rev = window.MJY.gameState.getQuarterlyRevenue();
    let rd = 0;
    for (const bid of Object.keys(pr.perBusinessAccidentLoss)) rd += pr.perBusinessAccidentLoss[bid].revenueDelta;
    rev += rd; s.cash += rev;
    // ★ v0.50 매출 이펙트
    try { if (rev > 0) fx_moneyBurst(400, 60, rev); } catch(e){}
    // ★ v0.9.3.1 [경로2] 매출 마일스톤 + [경로5] 사건 생존
    (function(){
      const gs = window.MJY.gameState;
      const MS = gs.BIZ_REV_MILESTONES;
      for (const b of s.businesses) {
        if (!b.unlocked) continue;
        b.cumRevenue = (b.cumRevenue||0) + gs.getBusinessRevenue(b);
        if (!b.revMilestonesPassed) b.revMilestonesPassed = [];
        MS.forEach((m, i) => {
          if (b.cumRevenue >= m && b.revMilestonesPassed.indexOf(i) < 0) {
            b.revMilestonesPassed.push(i);
            const lv = gs.addBizExp(b, gs.BIZ_EXP_REWARD.revMilestone, 'revMilestone');
            pr.bizExpGains.push({businessId:b.id, businessName:b.name, amount:gs.BIZ_EXP_REWARD.revMilestone, source:'revMilestone', milestone:m});
            if(lv) pr.bizLevelUps.push({businessId:b.id, businessName:b.name, newLevel:lv.newLevel, slotGained:lv.slotGained, source:'누적매출 '+fmtWon(m)});
          }
        });
      }
      // [경로5] 사건 생존: 이번 분기에 만료된 rare/legendary 악재가 있으면 보상
      const expired = (eventLog && eventLog.expired) ? eventLog.expired : [];
      const survived = expired.filter(ev => ev.posneg === 'negative' && (ev.rarity === 'rare' || ev.rarity === 'legendary'));
      if (survived.length > 0 && s.businesses.length > 0) {
        // 대표 사업체(첫 잠금해제) 1곳에 보상 (전사 위기 극복 상징)
        const b0 = s.businesses.find(b=>b.unlocked);
        if (b0) {
          const gain = gs.BIZ_EXP_REWARD.eventSurvive * survived.length;
          const lv = gs.addBizExp(b0, gain, 'eventSurvive');
          pr.bizExpGains.push({businessId:b0.id, businessName:b0.name, amount:gain, source:'eventSurvive', count:survived.length});
          if(lv) pr.bizLevelUps.push({businessId:b0.id, businessName:b0.name, newLevel:lv.newLevel, slotGained:lv.slotGained, source:'위기 극복'});
        }
      }
    })();
    // 3. 운영비
    let op = window.MJY.gameState.getQuarterlyOperationCost();
    let od = 0;
    for (const bid of Object.keys(pr.perBusinessAccidentLoss)) od += pr.perBusinessAccidentLoss[bid].operationCost;
    op += od;
    if (s.cash >= op) s.cash -= op; else s.cash = 0;
    // 4. 이자
    const ir = window.MJY.interestEngine.applyQuarterlyInterest(s);
    // ★ v0.50 용팔이 이자 위험도 이펙트
    try {
      const yAcc = s.yongpaliAccumInterest || 0;
      if (yAcc > 1e12) { screenShake(6, 400); fx_fire(400, 100, 1.2); }
      else if (yAcc > 1e9) { screenShake(3, 200); }
    } catch(e){}
    // 5. 리포트 생성
    const rep = window.MJY.reportBuilder.build(s, pr, ir);
    s.history.push(rep); s.cumulativeProfit += rep.netProfit;
    // ★ v0.10 퀘스트용: 직전 분기 순이익 + 전사 무사고 연속 분기 추적
    s._lastNetProfit = rep.netProfit;
    const firmHadAccident = (pr.accidents && pr.accidents.length > 0);
    s.questAccident0Streak = firmHadAccident ? 0 : ((s.questAccident0Streak||0) + 1);
    // ★ v0.9.4 위임 사업체 사장 급여 지급 (사업체별 순이익의 7%, 적자면 0)
    pr.ceoReports = [];
    const delegated = s.businesses.filter(b=>b.managedByCEO);
    if (delegated.length > 0) {
      const gsx = window.MJY.gameState;
      // 사업체별 순이익 추산: (사업체 매출 - 사업체 운영비). 전사 이자는 제외(개별 사업체 귀속 아님)
      for (const b of delegated) {
        const bRev = gsx.getBusinessRevenue(b);
        // 사업체 운영비 추산: operationCost + 봇 유지비
        let bCost = b.operationCost;
        for (const bot of (b.bots||[])) bCost += 50_000 + (bot.level*30_000);
        // 인건비 추산: 이 사업체 직원 급여 합
        let bLabor = 0;
        for (const e of (b.employees||[])) {
          if (e.isCEO) continue;  // 위임된 사장은 일반 급여 제외
          let sal = window.MJY.payrollEngine.SALARY[e.grade] || 0;
          sal = Math.floor(sal * (e.salaryMul||1.0));
          if (e.isExpert) sal = Math.floor(sal*3);
          bLabor += sal;
        }
        const bNet = bRev - bCost - bLabor;
        const ceoPay = bNet > 0 ? Math.floor(bNet * gsx.CEO_PROFIT_SHARE) : 0;
        if (ceoPay > 0) { s.cash = Math.max(0, s.cash - ceoPay); b.ceoSalaryPaid = (b.ceoSalaryPaid||0) + ceoPay; }
        const ceo = (b.employees||[]).find(e=>e.id===b.ceoId);
        // ★ v0.9.5 사장 레벨 성장 (실적 기반): 기본 10 + 흑자 보너스(순이익/1000만, 상한 +40)
        let ceoExpGain = 10, ceoLeveledTo = null;
        if (bNet > 0) ceoExpGain += Math.min(150, Math.floor(bNet / 3_000_000));
        if (b.ceoLevel === undefined) b.ceoLevel = 1;
        if (b.ceoExp === undefined) b.ceoExp = 0;
        if (b.ceoLevel < 50) {
          b.ceoExp += ceoExpGain;
          let need = 15 + b.ceoLevel * 3;
          while (b.ceoExp >= need && b.ceoLevel < 50) {
            b.ceoExp -= need;
            b.ceoLevel++;
            ceoLeveledTo = b.ceoLevel;
            need = 15 + b.ceoLevel * 3;
          }
          if (b.ceoLevel >= 50) { b.ceoExp = 0; b.ceoReachedLv50 = true; }  // ★ v0.9.5 확장 트리거 플래그
          if (ceo) ceo.ceoLevel = b.ceoLevel;  // 직원 객체에도 동기화
        }
        const report = { quarter:s.quarter, businessId:b.id, businessName:b.name, revenue:bRev, netProfit:bNet, ceoPay:ceoPay, ceoName:ceo?ceo.name:'?', ceoLevel:b.ceoLevel, ceoLeveledTo:ceoLeveledTo };
        b.ceoReportLog = (b.ceoReportLog||[]); b.ceoReportLog.push(report);
        if (b.ceoReportLog.length > 8) b.ceoReportLog.shift();  // 최근 8분기만 보관
        pr.ceoReports.push(report);
        if (ceoLeveledTo) { pr.ceoLevelUps = pr.ceoLevelUps || []; pr.ceoLevelUps.push({businessName:b.name, ceoName:ceo?ceo.name:'?', newLevel:ceoLeveledTo, reachedLv50:(b.ceoLevel>=50)}); }
      }
    }
    // ★ v0.9.3 홍보팀 명성 증가 (인원당 +1/분기)
    const prCount = window.MJY.gameState.getDeptMemberCount('pr');
    if (prCount > 0 && s.reputation !== undefined) {
      s.reputation = Math.max(0, Math.min(100, s.reputation + prCount));
    }
    // 6. 단계 승급 체크
    const promo = window.MJY.gameState.checkStagePromotion();
    if (promo) {
      setTimeout(() => {     // ★ v0.42 분기 시작 시 연차 부여 + 성과금 계산
    for (const _bw of (s.businesses||[])) {
      if (!_bw.unlocked) continue;
      let bizTotalRev = 0;
      // 해당 사업체 분기 매출 추정 (baseRevenue 기반)
      for (const _ew of (_bw.employees||[])) {
        // 연차 부여 (분기마다)
        if (typeof grantLeave === 'function') grantLeave(_ew, s.quarter);
        // _leaveUsedThisQ 리셋
        _ew._leaveUsedThisQ = 0;
      }
      // 성과금 계산 (전 분기 매출 기반, full_time 이상)
      const prevRevEst = Math.floor((_bw.baseRevenue||0) * 3);  // 분기 추정 매출
      for (const _ew of (_bw.employees||[])) {
        if (!['full_time','hq_full_time','executive'].includes(_ew.grade)) continue;
        const bonus = typeof calcBonus==='function' ? calcBonus(_ew, prevRevEst) : 0;
        if (bonus > 0) {
          s.cash -= bonus;
          _ew.rapport = Math.min(100, (_ew.rapport||50) + 10);
          _ew.bonusHistory = _ew.bonusHistory||[];
          _ew.bonusHistory.push({quarter:s.quarter, amount:bonus});
          if (_ew.bonusHistory.length > 5) _ew.bonusHistory.shift();
          setTimeout(()=>toast.show(
            '💰 '+htmlEscape(_ew.name)+' 성과금 +'+fmtWon(bonus), '#fbbf24'
          ), 3200);
        }
      }
    }
    // ★ v0.41 계약 만료 2분기 전 알림
    for (const _biz2 of (s.businesses||[])) {
      if (!_biz2.unlocked) continue;
      for (const _e2 of (_biz2.employees||[])) {
        if (_e2.grade==='contract' && _e2._contractExpireQ) {
          const remainQ = _e2._contractExpireQ - s.quarter;
          if (remainQ === 2) {
            setTimeout(()=>toast.show(
              '📋 '+htmlEscape(_e2.name)+' 계약 만료 2분기 전 — 재계약 협상 필요!','#fbbf24'
            ), 2500);
            _e2._contractWarned = true;
          } else if (remainQ <= 0 && !_e2._contractExpired) {
            _e2._contractExpired = true;
            setTimeout(()=>toast.show(
              '⚠ '+htmlEscape(_e2.name)+' 계약 만료! 재계약 또는 퇴사 처리 필요','#f87171'

toast.show('🎉 ' + promo.to.label + ' 승급!', '#a3e635'); }, 800);
    }

      pr.ceoLevelUps.forEach((cl, idx) => {

          if (cl.reachedLv50) toast.show('👑 ' + cl.ceoName + ' 사장 Lv50 달성! 사업 확장 가능', '#facc15');

        }, 3600 + idx * 600);
      });

    // ★ v0.9.5 사장 사업 확장 요청 트리거 (Lv50 도달 사업체)
    const expStarted = window.MJY.gameState.checkCEOExpansionTrigger();
    if (expStarted && expStarted.length > 0) {
      expStarted.forEach((ex, idx) => {
        setTimeout(() => {
          toast.show('📋 ' + ex.ceoName + ' 사장이 사업 확장을 요청합니다 (' + ex.businessName + ')', '#a855f7');
        }, 4200 + idx * 700);
      });
    }
    // 6-1. 20분기 도달 시 퀘스트 실패 알림 (게임 종료 X, 1회만)
    if (s.quarter >= s.maxQuarters && !s.quest20Notified) {
      s.quest20Notified = true;
      setTimeout(() => {
        toast.show('⏰ 퀘스트 실패: 5년(29년 4분기) 내 천조 미달성. 게임은 계속됩니다!', '#fbbf24');
      }, 3000);
    }

    const ec = window.MJY.interestEngine.checkEndGame(s);
    // ★ v0.8.2 사건 전용 토스트 (정산 화면 위에 순차 표시)

      eventLog.newEvents.forEach((ev, idx) => {
        setTimeout(() => {
          eventToast.show(ev);

    if (eventLog && eventLog.expired && eventLog.expired.length > 0) {
      const baseDelay = 700 + (eventLog.newEvents ? eventLog.newEvents.length : 0) * 3200;
      eventLog.expired.forEach((ev, idx) => {
        setTimeout(() => {
          toast.show('✅ ' + ev.name + ' 종료', '#94a3b8');

      });
    }
    // ★ v0.10 퀘스트 평가 (분기 종료 시점 누적 조건 반영)
    const qNewlyDone = window.MJY.questEngine.evaluate(s);
    if (qNewlyDone && qNewlyDone.length > 0) {
      qNewlyDone.forEach((qid, idx) => {
        const qd = window.MJY.questEngine.getDef(qid);
        setTimeout(() => {
          toast.show('✅ 퀘스트 완료: ' + (qd ? qd.title : qid) + ' (보상 수령 가능)', '#facc15');

    }
    // ★ v0.36 원유 롱 헤지 효과 (배달 운영비 절감)
    if (s.futures && s.futures._oilHedgeActive && typeof futuresEngine !== 'undefined') {
      const hedgeMul = 1 - futuresEngine.getOilHedgeEffect(s);

        (s.businesses||[]).forEach(biz => {
          if (!biz.unlocked) return;
          // 배달 비중 있는 사업체 운영비 절감

          if (saving > 0) {

        });
        setTimeout(() => toast.show('🛡 원유 헤지 — 배달 운영비 절감', '#a3e635'), 1000);

    }
    // ★ v0.35 주식 분기 정산 (뉴스 생성 → 가격 갱신 → 배당 → 목표가 체크)
    if (s.stocks && s.stocks.unlocked && typeof stockEngine !== 'undefined') {
      // 1) 뉴스 생성 (가격 갱신 전에 먼저)
      s.stocks.currentNews = (typeof generateStockNews === 'function') ? generateStockNews(s) : [];
      // 2) 매크로 + 뉴스 반영 가격 갱신
      s.stocks.currentMacro = s.stocks.nextMacro || null;
      stockEngine.updatePrices(s);
      // 3) 배당 지급
      const divIncome = stockEngine.payDividends(s);
      if (divIncome > 0) {
        setTimeout(() => toast.show('💰 배당금 +' + fmtWon(divIncome), '#fbbf24'), 1500);
      }
      s.stocks.totalDividend = (s.stocks.totalDividend||0) + divIncome;
      // 4) 역사적 이벤트 토스트 (우선 표시)
      if (s.stocks._pendingHistEvent) {
        const he = s.stocks._pendingHistEvent;
        s.stocks._pendingHistEvent = null;
        const isPos = he.globalMul >= 1.0;
        const col   = he.isBlackSwan ? '#dc2626' : (isPos ? '#a3e635' : '#f87171');
        const prefix = he.isBlackSwan ? '🚨 블랙스완!' : (isPos ? '📈 호황!' : '📉 위기!');
        setTimeout(() => toast.show(prefix + ' ' + he.name + ' — ' + he.desc, col), 600);
      }
      // 5) 종목 뉴스 토스트 (최대 2건)
      s.stocks.currentNews.slice(0, 2).forEach((n, i) => {
        const col = n.priceEffect > 0 ? '#a3e635' : '#f87171';
        setTimeout(() => toast.show('📰 ' + htmlEscape(n.text), col), 2000 + i*1200);
      });
      // 5) 목표가 알림
      const alerts = stockEngine.checkPriceTargets(s);
      alerts.forEach((a, i) => {
        const msg = a.type === 'above'
          ? '🎯 ' + a.name + ' 목표가 달성! (' + fmtWon(a.price) + ')'
          : '⚠ ' + a.name + ' 손절가 도달 (' + fmtWon(a.price) + ')';
        setTimeout(() => toast.show(msg, a.type==='above'?'#fbbf24':'#f87171'), 3000 + i*800);
      });
    }
    // ★ v0.36 해외선물 분기 정산
    if (s.futures && s.futures.unlocked && typeof futuresEngine !== 'undefined') {
      futuresEngine.updateFuturesPrices(s);

      // 마진콜 체크
      const calls = futuresEngine.checkMarginCalls(s);
      calls.forEach((c, i) => {
        setTimeout(() => {
          toast.show('🚨 마진콜! ' + c.name + ' 강제청산' +
            (c.yongpaliPenalty>0 ? ' · 이자 +'+fmtWon(c.yongpaliPenalty) : ''), '#dc2626');
        }, 1800 + i*1000);
        // ★ v0.37k 마진콜 시 용팔이 대사 팝업
        if (c.yongpaliPenalty > 0 || c.extra > 0) {
          setTimeout(() => {
            // 손실 규모별 용팔이 대사 분기 (박신양·김은희 합작)
            const lossAmt = Math.abs(c.profit||0);
            let lines;
            if (lossAmt >= 100_000_000) {  // 1억 이상
              lines = [
                lossAmt+'을 날렸어. 이제 어쩔 거야.',
                '1억? 그거 내 하루치 이자야.',
                '이 정도면 이미 내 거야, 사실상.',
                '크게 날렸네. 근데 나한테 오면 돼.',
              ];
            } else if (lossAmt >= 10_000_000) {  // 1000만 이상
              lines = [
                '1000만을 날렸어. 이제 나한테 와.',
                '그 돈 어디서 났어? 어차피 내 돈이었나.',
                '선물 어렵지? 나는 쉽게 벌어.',
                '잃었으면 빌려. 내가 있잖아.',
              ];
            } else {  // 1000만 미만
              lines = [
                '어디서 날렸어? 나한테 와.',
                '선물? 그게 쉬운 줄 알았어?',
                '이자 붙는 거 알지? 당연히 알겠지.',
                '돈 없으면 나한테 오면 돼. 조건은 내가 정해.',
                '또 날렸네. 이번엔 얼마야.',
              ];
            }
            const line = lines[Math.floor(Math.random()*lines.length)];
            modal.open('🦈 용팔이', `
              <div style="text-align:center;padding:16px 0;">
                <div style="font-size:48px;margin-bottom:10px;">🦈</div>
                <div style="font-size:18px;font-weight:bold;color:#dc2626;margin-bottom:8px;">마진콜 발동</div>
                <div style="font-size:15px;color:#94a3b8;line-height:1.8;margin-bottom:16px;">"${line}"</div>
                <div style="background:#0f172a;border-radius:8px;padding:10px;font-size:13px;color:#64748b;">
                  <div>강제청산 손실: <span style="color:#3b82f6;">-${fmtWon(Math.abs(c.profit||0))}</span></div>
                  <div>이자 추가: <span style="color:#dc2626;">+${fmtWon((c.yongpaliPenalty||0)+(c.extra||0))}</span></div>
                  <div>누적 이자: <span style="color:#dc2626;">${fmtWon(s.yongpaliAccumInterest||0)}</span></div>
                </div>
              </div>
            `, '<button class="btn btn-danger" data-action="close-yp">확인</button>');
            requestAnimationFrame(()=>{
              document.querySelectorAll('[data-action="close-yp"]').forEach(e=>bindClick(e,()=>modal.close()));
            });
          }, 2500 + i*1000);
        }
      });

      // 블랙스완 알림
      if (s.futures._lastBlackSwanShock) {
        const sh = s.futures._lastBlackSwanShock;
        const col = sh < 0 ? '#dc2626' : '#a3e635';
        setTimeout(() => {
          toast.show('🌪 선물 블랙스완! 전 원자재 ' + (sh>0?'+':'') + (sh*100).toFixed(0) + '%', col);
        }, 1200);
        s.futures._lastBlackSwanShock = 0;
      }

      // 원유 롱 헤지 효과 갱신
      s.futures._oilHedgeActive = futuresEngine.getOilHedgeEffect(s) > 0;
    }

    // ★ v0.37 해외주식 분기 정산
    if (s.foreignStocks && s.foreignStocks.unlocked && typeof foreignStockEngine !== 'undefined') {
      foreignStockEngine.updatePrices(s);
      const fDiv = foreignStockEngine.payDividends(s);
      if (fDiv > 0) {
        setTimeout(() => toast.show('💵 해외주식 배당금 +' + fmtWon(fDiv), '#fbbf24'), 2000);
      }
      // 환율 변동 알림
      const exRate = s.foreignStocks.exchangeRate || 1350;
      const exDiff = exRate - 1350;
      if (Math.abs(exDiff) > 100) {
        setTimeout(() => toast.show('💱 환율 변동 ' + exRate + '원/달러 ' + (exDiff>0?'(강달러)':'(약달러)'), '#0ea5e9'), 2500);
      }
    }
    // 봇 구매 플래그 초기화
    s.botPurchasedThisQuarter = false;

    window.MJY.saveSystem.save();
    // ★ v0.26 게임오버 즉시 연출 (용팔이 1000조)
    if (ec.ended && ec.type === 'gameover') {
      setTimeout(() => {
        // 붉은 화면 플래시
        if (typeof screenFlash !== 'undefined') {
          screenFlash.flash('negative');
        }
      }, 400);
    }
    sceneManager.switch('settlement', {report:rep, endCheck:ec});
  },
  // 매 프레임 업데이트
  update: function(dt) {
    const s = window.MJY.gameState.get();
    if (s.phase !== 'playing') return;
    if (modal.isOpen() || s.isPaused) {
      // 모달/정지 중에는 리스크 계산 없이 기본 HUD만 갱신
      this._renderHUDBasic();
      return;
    }
    s.quarterElapsedMs += dt;
    // 매초 한번씩 HUD 갱신
    if (Math.floor(frameCount/30) !== this._lastHudFrame) {
      this._lastHudFrame = Math.floor(frameCount/30);
      this.renderHUD();
      this.renderBackground();
    }
    // ★ v0.11 실시간 영업 흐름 (Living Business)
    this._liveFeedTick(dt, s);
    if (s.quarterElapsedMs >= QUARTER_MS) this.processQuarterEnd();
  },
  // ★ v0.11 실시간 영업 피드 틱
  _liveFeedAcc: 0,
  _interactionAcc: 0,
  _liveFeedTick: function(dt, s) {
    const lfe = window.MJY.liveFeedEngine;
    if (!lfe) return;
    // 흐름 멘트: 약 3.5초마다 1개
    this._liveFeedAcc = (this._liveFeedAcc||0) + dt;
    if (this._liveFeedAcc >= 3500) {
      this._liveFeedAcc = 0;
      const msg = lfe.nextFlowMessage(s);
      if (msg) {
        const el = document.getElementById('live-feed-line');
        if (el) {
          el.style.opacity = '0';
          setTimeout(() => { el.textContent = msg; el.style.opacity = '1'; }, 150);
        }
      }
    }
    // ★ v0.17 [기둥1] 상호작용 간격: 숙련도 높을수록 길어짐 (18~30초, 상한)
    this._interactionAcc = (this._interactionAcc||0) + dt;
    const crisisInterval = lfe.getCrisisIntervalMs ? lfe.getCrisisIntervalMs(s) : 18000;
    if (this._interactionAcc >= crisisInterval) {
      this._interactionAcc = 0;
      if (!modal.isOpen()) {
        const inter = lfe.rollInteraction(s);
        if (inter) { this._showInteraction(inter); }
      }
    }
  },
  // ★ v0.11 상호작용 모달 표시
  _showInteraction: function(inter) {
    const self = this;
    let html = `<div style="font-size:13px; color:#cbd5e1; margin-bottom:14px; line-height:1.5;">${htmlEscape(inter.desc)}</div>`;
    inter.choices.forEach((c, idx) => {
      const costStr = c.cost ? `<span style="color:#f87171;">-${fmtWon(c.cost)}</span>` : '<span style="color:#94a3b8;">비용 없음</span>';
      const repStr = c.rep>0 ? `<span style="color:#a3e635;">명성 +${c.rep}</span>` : (c.rep<0 ? `<span style="color:#f87171;">명성 ${c.rep}</span>` : '<span style="color:#94a3b8;">명성 -</span>');
      html += `<button class="btn" data-choice="${idx}" style="display:block; width:100%; text-align:left; margin-bottom:8px; padding:12px;">
        <div style="font-size:13px; font-weight:bold; color:#e2e8f0;">${htmlEscape(c.label)}</div>
        <div style="font-size:11px; margin-top:4px;">${costStr} · ${repStr}</div>
      </button>`;
    });
    modal.open(inter.title, html, '');
    document.querySelectorAll('[data-choice]').forEach(el => bindClick(el, () => {
      const c = inter.choices[parseInt(el.dataset.choice)];
      const s = window.MJY.gameState.get();
      const r = window.MJY.liveFeedEngine.applyChoice(s, inter.bizId, c, inter.empId);
      let msg = r.result;
      const col = r.review==='positive' ? '#a3e635' : (r.review==='negative' ? '#f87171' : '#94a3b8');
      let extra = r.rep ? ` (명성 ${r.rep>0?'+':''}${r.rep})` : '';
      toast.show(msg + extra, col);
      // ★ v0.18 [기둥2] 방어·행운 판정 결과 (3갈래: 무탈/경감/직격)
      if (r.damage) {
        const d = r.damage;
        const savedPct = Math.round(d.defenseReduction * 100);
        if (d.verdict === 'lucky') {
          toast.show('🍀 운이 따랐습니다! 피해 ' + fmtWon(d.finalCost) + ' (방어 -' + savedPct + '%, 기본 ' + fmtWon(d.baseCost) + ')', '#a3e635');
        } else if (d.verdict === 'direct') {
          toast.show('💥 하필! 직격탄 — 피해 ' + fmtWon(d.finalCost) + ' (방어 -' + savedPct + '%였으나 운 나쁨)', '#f87171');
        } else {
          toast.show('🛡 방어 덕에 피해 ' + fmtWon(d.finalCost) + ' (방어 -' + savedPct + '%, 기본 ' + fmtWon(d.baseCost) + ')', '#38bdf8');
        }
      }
      // ★ v0.12 직원 성장 알림 (위기를 겪고 배웠다)
      if (r.empGrew) {
        if (r.empGrew.leveled) toast.show('📈 ' + r.empGrew.name + ' 경험치 +' + r.empGrew.gain + ' → Lv' + r.empGrew.newLevel + '!', '#22d3ee');
        else toast.show('📖 ' + r.empGrew.name + '이(가) 경험을 쌓았습니다 (+' + r.empGrew.gain + ' exp)', '#22d3ee');
      }
      window.MJY.saveSystem.save();
      modal.close();
    }));
  },
};

// 헬퍼: 다른 캔버스에 스프라이트 그리기
function drawSpriteOn(targetCtx, sprite, x, y, scale) {
  scale = scale || 1;
  const data = sprite.data;
  // ★ v0.15 colormap 또는 palette 둘 다 지원 (배경 스프라이트는 palette 사용)
  const cmap = sprite.colormap || sprite.palette || {};
  for (let r = 0; r < data.length; r++) {
    for (let c = 0; c < data[r].length; c++) {
      const ch = data[r][c];
      if (ch === ' ' || ch === '.') continue;
      const color = cmap[ch];
      if (!color) continue;  // 정의 안 된 색/투명은 건너뜀 (검정 강제 칠 방지)
      targetCtx.fillStyle = color;
      targetCtx.fillRect(Math.floor(x+c*scale), Math.floor(y+r*scale), Math.ceil(scale), Math.ceil(scale));
    }
  }
}

/* ─── 사업체 메뉴 (HTML 모달) ─── */
scenes.businessMenu = {
  isModal: true,
  bizId: null,
  tab: 'overview',
  _isFirstRender: true,
  _lastBizId: null,
  enter: function(o) {
    const isNewBiz = (this._lastBizId !== o.businessId);
    this.bizId = o.businessId;
    if (isNewBiz) {
      this.tab = 'overview';
    }
    this._isFirstRender = true;
    this._lastBizId = o.businessId;
    this.render();
  },
  exit: function() {
    modal.close();
  },
  render: function() {
    const s = window.MJY.gameState.get();

      // 항목별 금액 계산

          if (item.fixed)      amt = item.fixed;
          groupTotal += amt;
          return { ...item, amt };
        });
        grandTotal += groupTotal;
        return { ...group, items, groupTotal };
      });

      const costPct = totalRev > 0 ? Math.round(grandTotal / totalRev * 100) : 0;
      const profitColor = (totalRev - grandTotal - lc) >= 0 ? '#a3e635' : '#f87171';

      let h = `

            </div>

          <!-- 최종 손익 -->
          <div style="border-top:1px solid #334155;padding-top:8px;margin-top:4px;">
            <div style="display:flex;justify-content:space-between;margin-bottom:3px;">
              <span style="font-size:11px;color:#64748b;">원가 합계</span>
              <span style="font-size:11px;color:#f87171;">-${fmtWon(grandTotal)}</span>
            </div>
            <div style="display:flex;justify-content:space-between;margin-bottom:3px;">

              <span style="font-size:12px;font-weight:bold;color:#e2e8f0;">예상 영업이익</span>
              <span style="font-size:13px;font-weight:bold;color:${profitColor};">${(totalRev-grandTotal-lc)>=0?'+':''}${fmtWon(totalRev-grandTotal-lc)}</span>
            </div>
          </div>
          <div style="font-size:9px;color:#334155;margin-top:6px;text-align:right;">※ A안: 업종별 평균 비율 기반 추정값</div>
        </div>
      `;
      return h;
    })();

    return html;
  },
  // ★ v0.7.2 사업 카테고리에 맞는 봇 풀 라벨
  _botPoolLabels: function(biz) {
    const BOTS_BY_CAT = window.MJY.gameState.BOTS_BY_CATEGORY;
    const BOT_TYPES = window.MJY.gameState.BOT_TYPES;
    const pool = (BOTS_BY_CAT && BOTS_BY_CAT[biz.category]) || ['cook','serve','cashier_f'];
    return pool.map(t => (BOT_TYPES[t] && BOT_TYPES[t].label) || t).join('/');
  },
  // ★ v0.7.2 일괄 수리 비용 계산 (컨디션 부족분 × 봇당 50,000원)
  _repairAllCost: function(biz) {
    let cost = 0;
    biz.bots.forEach(bot => {
      const need = 100 - bot.condition;
      cost += Math.floor(need * 5_000);  // %당 5천원
    });
    return cost;
  },

    biz.bots.forEach((bot, i) => {

      const condClass = bot.condition>=70?'high':bot.condition>=30?'mid':'low';
      const alvEquiv = Math.round(curRev / 1_500_000 * 10) / 10;  // Lv1봇=10
      const ownerBadge = bot.ownerType === 'rent'
        ? '<span style="font-size:10px; color:#fbbf24; background:rgba(0,0,0,0.3); padding:1px 6px; border-radius:8px; margin-left:4px;">임대</span>'
        : '<span style="font-size:10px; color:#a3e635; background:rgba(0,0,0,0.3); padding:1px 6px; border-radius:8px; margin-left:4px;">구매</span>';

              <div class="card-title" style="color:${ti.color};">${ti.label} Lv${bot.level}${ownerBadge}</div>
              <div class="card-meta" style="color:#a3e635;">${fmtWon(curRev)}/분기 <span style="color:#0ea5e9;">≈ 알바 ${alvEquiv}명치</span></div>
            </div>
            <div class="card-arrow" data-arrow-bot="${bot.id}" style="padding:8px 4px;cursor:pointer;">▶</div>
          </div>
          <div style="margin-top:8px;">
            <div style="display:flex; justify-content:space-between; margin-bottom:3px;">
              <span style="font-size:11px; color:#64748b;">컨디션</span>
              <span style="font-size:11px; color:${condColor}; font-weight:bold;">${bot.condition}%</span>
            </div>
            ${htmlProgress(bot.condition, 100, bot.condition + '%')}

          <div style="font-size:11px; color:#fbbf24; margin-top:6px;">

      const ALB = 1_500_000;

      html += `<div class="info-panel" style="text-align:center; color:#94a3b8;">최대 봇 수 도달</div>`;

            ${synResult2.negatives && synResult2.negatives.length > 0 ? `
              <div>

            ${(!synResult2.positives||synResult2.positives.length===0) && (!synResult2.negatives||synResult2.negatives.length===0)

      } catch(e2) { /* 시너지 계산 실패 시 조용히 무시 */ }

  bindEvents: function() {

      bindClick(el, () => {
        if (el.disabled) return;

        const biz = window.MJY.gameState.findBusiness(self.bizId);
        if (action === 'close') { modal.close(); return; }

          const BOT_P = window.MJY.gameState.BOT_PURCHASE_PRICE || [0,30_000_000];

          if (s.cash < botPrice) { toast.show('🚫 잔고 부족 ('+fmtWon(botPrice)+' 필요)', '#dc2626'); return; }
          if (biz.bots.length >= biz.maxBots) { toast.show('🚫 최대 봇 수 도달', '#dc2626'); return; }
          s.cash -= botPrice;
          biz.bots.push(window.MJY.gameState.createBot(null, self.bizId, 'purchase'));
          toast.show('🤖 봇 구매! ('+fmtWon(botPrice)+') ≈ 알바 10명치 효과', '#0ea5e9');
          questCheck(s);
          self.render();
        }
        // ★ v0.27b 임대 버튼
        if (action === 'rent-bot') {
          // ★ FIX-4c: 임대료 240만 기준
          const BOT_R = window.MJY.gameState.BOT_RENT_PER_QUARTER || [0,2_400_000];
          const rentPrice = BOT_R[1] || 2_400_000;
          if (s.cash < rentPrice) { toast.show('🚫 잔고 부족 (임대료 '+fmtWon(rentPrice)+' 필요)', '#dc2626'); return; }
          if (biz.bots.length >= biz.maxBots) { toast.show('🚫 최대 봇 수 도달', '#dc2626'); return; }
          // 임대는 첫 분기 임대료만 차감
          s.cash -= rentPrice;
          biz.bots.push(window.MJY.gameState.createBot(null, self.bizId, 'rent'));
          toast.show('📋 봇 임대 시작! ('+fmtWon(rentPrice)+'/분기)', '#fbbf24');
          questCheck(s);
          self.render();
        }
        // ★ v0.7.2 봇 일괄 수리
        if (action === 'repair-all-bots') {
          const cost = self._repairAllCost(biz);
          if (cost <= 0) { toast.show('수리 필요한 봇 없음', '#94a3b8'); return; }
          if (s.cash < cost) { toast.show('🚫 잔고 부족 (' + fmtWon(cost) + ' 필요)', '#dc2626'); return; }
          s.cash -= cost;
          let repaired = 0;
          biz.bots.forEach(bot => {
            if (bot.condition < 100) { bot.condition = 100; repaired++; }
          });
          toast.show('🔧 ' + repaired + '대 일괄 수리 완료', '#a3e635');
          self.render();
        }
        if (action === 'quick-hire' || action === 'hire') {
          // ★ PATCH-D v0.21: 기존 즉시 채용 → 후보 풀 씬으로 전환
          const r = window.MJY.payrollEngine.hireEmployee(s, self.bizId);
          if (r.ok) { toast.show('👤 ' + r.employee.name + ' 채용!', '#a3e635'); questCheck(s); self.render(); }
        }
        // ★ v0.21 후보 풀 채용 버튼
        if (action === 'open-hire-pool') {
          sceneManager.switch('hirePool', { bizId: self.bizId });
          return;
        }

        if (action === 'delegate-ceo') {

          const target = experts[0];
          const r = gsx.proposeCEO(self.bizId, target.id);

          if (r.accepted) {
            toast.show('👑 ' + r.ceoName + '님이 사장직을 수락! 자동운영 시작', '#a3e635');
            questCheck(s);

          }
          self.render();
        }
        // ★ v0.9.4 위임 해제
        if (action === 'revoke-ceo') {
          if (confirm('위임을 해제하고 직접 경영으로 복귀하시겠습니까?')) {

            toast.show('위임 해제 — 직접 경영 복귀', '#94a3b8');
            window.MJY.saveSystem.save();
            self.render();
          }
        }
        // ★ v0.9.5 확장 1단계: 요청 즉시 수락 → 바로 사업계획서 단계로
        if (action === 'exp-approve-req') {
          const r = window.MJY.gameState.generateExpansionPlan(self.bizId);
          if (r) toast.show('📑 사장이 사업계획서를 준비했습니다', '#facc15');
          window.MJY.saveSystem.save();
          self.render();
        }
        // ★ v0.9.5 확장 1단계: 거절 → 사장이 구체적 사업계획서 재제출
        if (action === 'exp-refuse-req') {
          const r = window.MJY.gameState.refuseCEOExpansion(self.bizId);
          if (r.ok) toast.show('📑 거절했지만, 사장이 구체적 사업계획서를 제출했습니다', '#fb923c');
          window.MJY.saveSystem.save();
          self.render();
        }
        // ★ v0.9.5 확장 2단계: 사업계획서 승인 → 새 사업체 생성
        if (action === 'exp-approve-plan') {
          const r = window.MJY.gameState.approveCEOExpansion(self.bizId);
          if (r.ok) {
            let msg = '🎉 새 사업체 「' + r.business.name + '」 시작!';
            if (r.loanInfo && r.loanInfo.borrowed && r.loanInfo.borrowed.bank1 > 0) msg += ' (자동대출 ' + fmtWon(r.loanInfo.borrowed.bank1) + ')';
            toast.show(msg, '#a3e635');
            questCheck(s);
            window.MJY.saveSystem.save();
            sceneManager.switch('game');
          } else if (r.reason === 'insufficient_auto_loan') {
            toast.show('🚫 자금 부족 — 1·2금융 한도 초과로 확장 보류 (사채·용팔이 미사용)', '#dc2626');
          } else if (r.reason === 'no_slot') {
            toast.show('🚫 사업 슬롯이 가득 찼습니다', '#dc2626');
          } else {
            toast.show('🚫 확장 실패', '#dc2626');
          }
          self.render();
        }
        // ★ v0.9.5 확장 보류 (상태 초기화)
        if (action === 'exp-cancel') {
          const biz2 = window.MJY.gameState.findBusiness(self.bizId);
          if (biz2) { biz2.expansionState = 'none'; biz2.expansionPlan = null; }
          toast.show('사업 확장을 보류했습니다', '#94a3b8');
          window.MJY.saveSystem.save();
          self.render();
        }
      });
    });
    // 봇 카드 ▶ 버튼만 클릭 영역 (★ C안: 카드 전체 → 화살표만)
    document.querySelectorAll('[data-arrow-bot]').forEach(el => {

    document.querySelectorAll('[data-arrow-emp]').forEach(el => {
      bindClick(el, () => sceneManager.switch('empDetail', {businessId: self.bizId, empId: el.dataset.arrowEmp}));
    });
  },
  update: function() {},
};

    // 강화 버튼
    if (bot.level < 5) {
      const nextRev = Math.floor(BOT_REV[bot.level+1] * ti.revenueMul);
      html += `
        <button class="btn ${canUp?'btn-warn':''}" ${canUp?'':'disabled'} data-action="upgrade">
          <div style="font-size:16px;">⭐ 강화 → Lv${bot.level+1}</div>
          <div style="font-size:13px; opacity:0.9; margin-top:4px;">비용 ${fmtWon(upCost)} → 수익 ${fmtWon(nextRev)}/분기</div>
        </button>
      `;
    } else {
      html += `<button class="btn" disabled><div style="font-size:16px;">⭐ 최고 레벨</div></button>`;
    }

    // 수리 버튼
    if (bot.condition < 100) {
      html += `
        <button class="btn ${canRepair?'btn-info':''}" ${canRepair?'':'disabled'} data-action="repair">
          <div style="font-size:16px;">🔧 수리 → 100%</div>
          <div style="font-size:13px; opacity:0.9; margin-top:4px;">비용 ${fmtWon(repairCost)}</div>
        </button>
      `;
    } else {
      html += `<button class="btn btn-success" disabled><div style="font-size:16px;">💯 완벽 상태</div></button>`;
    }

    // 판매 버튼
    html += `
      <button class="btn btn-danger" data-action="sell">
        <div style="font-size:16px;">🗑 판매</div>
        <div style="font-size:13px; opacity:0.9; margin-top:4px;">환급 ${fmtWon(refund)} (투자비 50%)</div>
      </button>
    `;

    const footer = `<button class="btn" data-action="back">◀ 뒤로</button>`;

    if (this._isFirstRender) {
      modal.open(`🤖 ${ti.label} 상세`, html, footer, () => {
        // 자체 닫기 시 처리 X (back 액션이 명시적 처리)
      });
      this._isFirstRender = false;
    } else {
      modal.update(`🤖 ${ti.label} 상세`, html, footer);
    }

    // 봇 미리보기 그리기
    const canvasEl = document.getElementById('bot-preview-canvas');
    if (canvasEl) renderBotPreview(canvasEl, bot);

    // 이벤트
    const self = this;
    document.querySelectorAll('[data-action]').forEach(el => {
      bindClick(el, () => {
        if (el.disabled) return;
        const action = el.dataset.action;
        if (action === 'back') { sceneManager.switch('businessMenu', {businessId: self.bizId}); return; }
        if (action === 'upgrade') {
          const r = window.MJY.gameState.upgradeBot(self.bizId, self.botId);
          if (r.ok) toast.show('⭐ Lv' + r.newLevel + ' 강화 완료!', '#facc15');
          else if (r.reason==='cash') toast.show('🚫 잔고 부족', '#dc2626');
          self.render();
        }
        if (action === 'repair') {
          const r = window.MJY.gameState.repairBot(self.bizId, self.botId);
          if (r.ok) toast.show('🔧 수리 완료!', '#0ea5e9');
          else if (r.reason==='cash') toast.show('🚫 잔고 부족', '#dc2626');
          self.render();
        }
        if (action === 'sell') {
          // 확인 단계
          if (!confirm('이 봇을 정말 판매하시겠습니까?\n환급 ' + fmtWon(refund) + ' (투자비의 50%)\n※ 되돌릴 수 없습니다.')) return;
          const r = window.MJY.gameState.sellBot(self.bizId, self.botId);
          if (r.ok) {
            toast.show('💰 환급 ' + fmtWon(r.refund), '#a3e635');
            sceneManager.switch('businessMenu', {businessId: self.bizId});
          }
        }
      });
    });
  },
  update: function() {},
};

/* ─── 직원 상세 (HTML 모달) ─── */
