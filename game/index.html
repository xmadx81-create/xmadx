        : '';

      // ★ v0.39 MBTI + 팀 궁합 계산
      const _gs        = window.MJY.gameState; // ★ BUG-3 FIX: IIFE 내부 함수 안전 참조
      const _getMbtiInfo     = _gs.getMbtiInfo     || getMbtiInfo;
      const _calcTeamSynergy = _gs.calcTeamSynergy || calcTeamSynergy;
      const _randomMbti      = _gs.randomMbti      || randomMbti;
      const empMbti    = emp.mbti || _randomMbti();
      if (!emp.mbti) emp.mbti = empMbti;  // 기존 캐릭터 MBTI 소급 적용
      const mbtiInfo   = _getMbtiInfo(empMbti);

      // ★ v0.46 전 사업체 베스트 시너지 매칭 1개 탐색
      let bestSynMatch = null; // { bizName, empName, synName, badge, score }
      try {
        const allBizEmps = [];
        (s.businesses||[]).forEach(bz => {
          if (!bz.unlocked) return;
          (bz.employees||[]).forEach(ex => {
            allBizEmps.push({ emp: ex, bizName: bz.name });
          });
        });
        allBizEmps.forEach(({ emp: ex, bizName }) => {
          const r = _calcTeamSynergy([ex], emp);
          if (r.positives && r.positives.length > 0) {
            const topSyn = r.positives[0];
            if (!bestSynMatch || r.score > bestSynMatch.score) {
              bestSynMatch = { bizName, empName: ex.name, synName: topSyn.name, badge: topSyn.badge||'✨', score: r.score, effect: (topSyn.effect||'').slice(0,18) };
            }
          }
        });
      } catch(e2) { /* 탐색 실패 시 무시 */ }
      const mbtiRCol   = mbtiInfo.rarity==='SR'?'#fbbf24':mbtiInfo.rarity==='R'?'#a78bfa':'#94a3b8';
      const curEmps    = biz.employees || [];
      const synResult  = _calcTeamSynergy(curEmps, emp);
      const synScore   = synResult.score;
      const synBarCol  = synScore>=70?'#a3e635':synScore>=50?'#fbbf24':'#f87171';
      const posNames   = synResult.positives.map(s=>s.badge+s.name).join(' ');
      const negNames   = synResult.negatives.map(s=>s.badge+s.name).join(' ');

      // 카드 테두리 색 (MBTI SR이면 보라빛)
      const borderCol = emp.isNamed ? rc : synScore>=70?'#1e4d2b':synScore<40?'#3b0f0f':'#2a2a4a';
      const bgCol     = emp.isNamed ? rbg : synScore>=70?'#0f2318':synScore<40?'#1a0505':'#1a1a2e';

      html += '<div class="card" style="border-color:'+borderCol+'; background:'+bgCol+'; margin-bottom:12px; position:relative;">'

        // ── 상단 등급 배지
        + '<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">'
        + '<div style="font-size:13px; font-weight:bold; color:'+rc+';">'+re+' '+rarity+'</div>'
        + '<div style="font-size:12px; color:#64748b;">'+suitStr+matchBadge+'</div>'
        + '</div>'

        // ── 본문: 픽셀 미리보기 + 정보
        + '<div style="display:flex; gap:12px; align-items:flex-start;">'

          // 픽셀 캔버스
          + '<div style="flex-shrink:0; background:#0f172a; border-radius:8px; padding:6px; border:2px solid '+borderCol+'; position:relative;">'
          + '<canvas id="'+cvId+'" width="80" height="108" style="display:block; image-rendering:pixelated;"></canvas>'
          + (emp.isNamed ? '<div style="position:absolute; bottom:-8px; left:50%; transform:translateX(-50%); background:'+rc+'; color:#000; font-size:9px; font-weight:bold; padding:1px 6px; border-radius:8px; white-space:nowrap;">'+rarity+'</div>' : '')
          + '</div>'

          // 정보 영역
          + '<div style="flex:1; min-width:0;">'

            // 이름
            + '<div style="font-size:16px; font-weight:bold; color:'+(emp.isNamed?rc:'#e2e8f0')+'; margin-bottom:2px;">'
            + htmlEscape(emp.name)
            + '</div>'

            // 플레이버 / 배경
            + '<div style="font-size:11px; color:#94a3b8; margin-bottom:5px; line-height:1.4;">'
            + htmlEscape(emp.flavor || (emp.background ? emp.background.label : ''))
            + '</div>'

            // intro 대사 (네임드만)
            + (emp.isNamed && emp.intro
              ? '<div style="font-size:11px; color:'+rc+'; font-style:italic; margin-bottom:6px;">'+htmlEscape(emp.intro)+'</div>'
              : '')

            // 성격 태그 (일반)
            + (emp.mbti
              ? '<div style="font-size:11px; color:'+(emp.mbti[0]==='E'?'#fb923c':'#818cf8')+'; margin-bottom:3px; font-weight:bold;">'+emp.mbti+'</div>'
              : (!emp.isNamed && emp.personalityTags && emp.personalityTags.length
                ? '<div style="font-size:10px; color:#475569; margin-bottom:5px;">'+emp.personalityTags.map(t=>t.label).join(' · ')+'</div>'
                : ''))

            // 스탯 수치
            + '<div style="display:flex; gap:8px; font-size:11px; margin-bottom:4px;">'
            + '<span style="color:#fb923c;">🔥'+emp.cooking+'</span>'
            + '<span style="color:#0ea5e9;">🍽'+emp.serving+'</span>'
            + '<span style="color:#a3e635;">💪'+emp.patience+'</span>'
            + '<span style="color:#64748b; margin-left:auto;">합계 <b style="color:#fff;">'+statTotal+'</b>/15</span>'
            + '</div>'

            // 스탯 바
            + '<div style="display:flex; gap:3px; margin-bottom:6px;">'
            + '<div style="flex:'+emp.cooking+'; background:#fb923c; height:3px; border-radius:2px;"></div>'
            + '<div style="flex:'+emp.serving+'; background:#0ea5e9; height:3px; border-radius:2px;"></div>'
            + '<div style="flex:'+emp.patience+'; background:#a3e635; height:3px; border-radius:2px;"></div>'
            + '<div style="flex:'+(15-statTotal)+'; background:#1e293b; height:3px; border-radius:2px;"></div>'
            + '</div>'

            // 스킬 칩 (네임드)
            + (emp.isNamed && emp.skills && emp.skills.length
              ? '<div style="background:rgba(0,0,0,0.35); border-radius:4px; padding:4px 8px; font-size:11px; border-left:2px solid '+rc+';">'
                + '<span style="color:'+rc+'; font-weight:bold;">✦ '+emp.skills[0].name+'</span>'
                + ' <span style="color:#94a3b8;">'+emp.skills[0].desc+'</span>'
                + '</div>'
              : '')

          + '</div>' // 정보 영역 끝
        + '</div>' // 본문 끝

        // ── 팀 궁합 게이지 (★ v0.39)
        + '<div style="margin:6px 0;padding:8px;background:rgba(0,0,0,0.25);border-radius:6px;">'
        + '<div style="display:flex;justify-content:space-between;margin-bottom:3px;">'
        + '  <span style="font-size:10px;color:#64748b;">🧬 팀 궁합</span>'
        + '  <span style="font-size:11px;font-weight:bold;color:'+synBarCol+';">'+synScore+'%</span>'
        + '</div>'
        + '<div style="background:#1e293b;border-radius:3px;height:5px;margin-bottom:5px;">'
        + '  <div style="background:'+synBarCol+';width:'+synScore+'%;height:100%;border-radius:3px;"></div>'
        + '</div>'
        + (bestSynMatch
          ? '<div style="font-size:10px;color:#a3e635;margin-bottom:2px;display:flex;align-items:center;gap:3px;">'
            + bestSynMatch.badge
            + ' <span style="color:#fbbf24;font-weight:bold;">'+htmlEscape(bestSynMatch.bizName)+' · '+htmlEscape(bestSynMatch.empName)+'</span>'
            + ' <span style="color:#a3e635;">'+htmlEscape(bestSynMatch.synName)+'</span>'
            + (bestSynMatch.effect ? '<span style="color:#64748b;margin-left:2px;">— '+htmlEscape(bestSynMatch.effect)+'</span>' : '')
            + '</div>'
          : (posNames ? '<div style="font-size:10px;color:#a3e635;margin-bottom:2px;">✨ '+posNames+'</div>' : '<div style="font-size:10px;color:#475569;">현재 팀과 특별 시너지 없음</div>'))
        + '</div>'

        // ── 채용 버튼
        + '<button class="btn '+(alreadyHired?'':'btn-success')+'" data-hire-idx="'+idx+'" '+(alreadyHired?'disabled':'')+' style="margin-top:10px; margin-bottom:0; width:100%;">'
        + (alreadyHired ? '✅ 이미 채용됨' : '✅ 채용하기  ₩300,000/분기')
        + '</button>'

        + '</div>';
    });

    html += `
      <div style="font-size:11px; color:#475569; text-align:center; margin-top:8px;">
        💡 SSR·SR 캐릭터는 시작부터 고유 스킬을 보유합니다
      </div>
    `;

    const footer = `
      <button class="btn" data-action="back" style="flex:1;">◀ 뒤로</button>
      <button class="btn btn-warn" data-action="reroll" style="flex:1;">🎲 다시 뽑기 (무료)</button>
    `;

    if (this._isFirstRender) {
      modal.open('👥 알바 채용 — 후보 선택', html, footer, () => {
        if (sceneManager.current === 'hirePool') {
          sceneManager.switch('businessMenu', { businessId: self.bizId });
        }
      });
      this._isFirstRender = false;
    } else {
      modal.update('👥 알바 채용 — 후보 선택', html, footer);
    }

    // ★ FIX-2: DOM 반영 후 바인딩 (requestAnimationFrame으로 타이밍 보장)
    requestAnimationFrame(() => {
    // 픽셀 캐릭터 미리보기 렌더
    this.pool.forEach((emp, idx) => {
      const cvEl = document.getElementById('hire-preview-' + idx);
      if (cvEl) {
        try { renderEmpPreview(cvEl, emp); } catch(e) {}
      }
    });

    // 이벤트 바인딩

    // ★ v0.39 가챠 리롤 핸들러
    document.querySelectorAll('[data-gacha-reroll]').forEach(el => {
      bindClick(el, () => {
        const s3  = window.MJY.gameState.get();
        const isSR = el.dataset.gachaReroll === 'sr';
        const cost = isSR ? 100 : 30;
        if ((s3.gems||0) < cost) {
          toast.show('💎 부족! ' + cost + '개 필요', '#f87171'); return;
        }
        s3.gems = (s3.gems||0) - cost;
        s3._gachaCount  = (s3._gachaCount||0)  + 1;
        s3._gachaSrCount= (s3._gachaSrCount||0) + 1;
        // 천장 리셋
        const ceilSR  = s3._gachaSrCount  >= 30;
        const ceilSSR = s3._gachaCount    >= 100;
        if (ceilSR)  s3._gachaSrCount = 0;
        if (ceilSSR) s3._gachaCount   = 0;
        const rarityBias = (isSR||ceilSR) ? 'SR_UP' : 'normal';
        // 새 후보 4명 생성
        self.pool = [];
        for (let i=0;i<4;i++) {
          // SSR 천장
          if (ceilSSR && i===0 && typeof NAMED_CHARS !== 'undefined') {
            const ssrList = NAMED_CHARS.filter(c=>c.rarity==='SSR');
            if (ssrList.length>0) {
              const nc = ssrList[Math.floor(Math.random()*ssrList.length)];
              const _rMbti2 = (window.MJY.gameState.randomMbti||randomMbti);
              self.pool.push(Object.assign({},nc,{mbti:nc.mbti||_rMbti2('SR_UP')}));
              continue;
            }
          }
          const emp3 = (window.MJY.gameState.generateCharacter||generateCharacter)(self.bizId, rarityBias); // ★ BUG-5 FIX: charFactory → generateCharacter
          emp3.mbti  = (window.MJY.gameState.randomMbti||randomMbti)(rarityBias);
          self.pool.push(emp3);
        }
        window.MJY.saveSystem.save();
        const msg = ceilSSR?'🌟 100연 천장 — SSR 확정!':
                    ceilSR ?'⭐ 30연 천장 — SR 확정!':
                    isSR   ?'⭐ SR 보장 리롤!':'🎲 후보 교체!';
        toast.show(msg, '#fbbf24');
        self.render();
      });
    });

    document.querySelectorAll('[data-hire-idx]').forEach(el => {
      bindClick(el, () => {
        if (el.disabled) return;
        const idx = parseInt(el.dataset.hireIdx);
        const emp = self.pool[idx];
        if (!emp) return;
        const s2 = window.MJY.gameState.get();
        const biz2 = window.MJY.gameState.findBusiness(self.bizId);
        if (!biz2) return;
        const realMax = (biz2.baseMaxEmployees || 5) + Math.floor((biz2.level || 1) / 2);
        biz2.maxEmployees = realMax;
        if (biz2.employees.length >= realMax) {
          toast.show('🚫 최대 직원 수 도달', '#dc2626'); return;
        }
        // 채용 확정
        emp.businessId = self.bizId;
        emp.hiredAtQuarter = s2.quarter;
        emp.gradeChangedAtQuarter = s2.quarter;
        biz2.employees.push(emp);
        questCheck(s2);
        window.MJY.saveSystem.save();

        // ★ v0.23 SSR/SR 풀스크린 연출 분기
        if (emp.isNamed && (emp.rarity === 'SSR' || emp.rarity === 'SR')) {
          // 모달 먼저 닫고 풀스크린 연출
          sceneManager.switch('game');
          setTimeout(() => {
            gachaReveal.show(emp, () => {
              // 연출 종료 후 businessMenu 복귀
              sceneManager.switch('businessMenu', { businessId: self.bizId });
            });
          }, 80);
        } else {
          // 일반 R 네임드 또는 비네임드: 기존 토스트
          if (emp.isNamed) {
            const rc = self.rarityColor(emp.rarity);
            const re = self.rarityEmoji(emp.rarity);
            toast.show(re + ' ' + emp.name + ' (' + emp.rarity + ') 채용!', rc);
          } else {
            toast.show('👤 ' + emp.name + ' 채용!', '#a3e635');
          }
          sceneManager.switch('businessMenu', { businessId: self.bizId });
        }
      });
    });

    // 뒤로 / 다시뽑기
    document.querySelectorAll('[data-action]').forEach(el => {
      bindClick(el, () => {
        const act = el.dataset.action;
        if (act === 'back') {
          sceneManager.switch('businessMenu', { businessId: self.bizId });
        }
        if (act === 'reroll') {
          // 후보 풀 재생성
          const s3 = window.MJY.gameState.get();
          self.pool = generateHirePool(s3, self.bizId, 4);
          self._isFirstRender = false;
          self.render();
          toast.show('🎲 후보를 다시 뽑았습니다', '#94a3b8');
        }
      });
    });
    }); // ★ FIX-2: requestAnimationFrame 닫기
  },

  update: function() {},
};

/* ─── v0.29 종료 씬 — 엔딩 A/B + 게임오버 강화 ─── */
scenes.endScreen = {
  endCheck: null,
  _anim: 0,
  enter: function(o) {
    this.endCheck = o.endCheck;
    this._anim = 0;
    clearButtons();
    document.getElementById('game-screen').classList.remove('active');
    document.getElementById('start-screen').classList.add('active');

    const t = o.endCheck.type;

    // 게임오버: 붉은 플래시 후 버튼
    if (t === 'gameover') {
      screenFlash.flash('negative');
      setTimeout(() => screenFlash.flash('negative'), 400);
    }

    // ★ BUG-2 수정: 엔딩 버튼 LH 기준
    const eBtnW = Math.floor(LW*0.44), eBtnGap = Math.floor(LW*0.04);
    const eBtnY = Math.floor(LH*0.87);
    registerButton({x: Math.floor(LW*0.04), y:eBtnY, w:eBtnW, h:70, isPrimary: t==='ending',
      onClick: () => {
        window.MJY.saveSystem.reset();
        window.MJY.gameState.reset();
        sceneManager.switch('onboarding');
      }
    });
    registerButton({x: Math.floor(LW*0.04)+eBtnW+eBtnGap, y:eBtnY, w:eBtnW, h:70,
      onClick: () => {
        window.MJY.saveSystem.reset();
        window.MJY.gameState.reset();
        sceneManager.switch('start');
      }
    });
  },
  exit: function() {
    document.getElementById('start-screen').classList.remove('active');
  },
  render: function() {
    if (!this.endCheck) return; // ★ BUG-2 FIX: null 방어
    this._anim++;
    const s = window.MJY.gameState.get();
    const t = this.endCheck.type;

    if (t === 'gameover') {
      // ── 게임오버: 용팔이 승리
      ctx.fillStyle = '#03000a'; ctx.fillRect(0, 0, LW, LH);
      // 붉은 맥동
      const pulse = Math.abs(Math.sin(this._anim * 0.04)) * 0.12;
      ctx.fillStyle = 'rgba(220,38,38,' + pulse + ')';
      ctx.fillRect(0, 0, LW, LH);
      // 용팔이 크게
      const scale = 5 + Math.sin(this._anim * 0.02) * 0.15;
      drawShadow(ctx, 400, 380, 100);
      drawSprite(ctx, SPRITES.yongpali6, 330, 120, scale);

      // 텍스트
      text('☠  GAME  OVER  ☠', 400, 45, {size:46, bold:true, color:'#dc2626', align:'center'});
      text('"빌리는 순간부터 당신 것이 아닙니다."', 400, 88, {size:22, color:'#7f1d1d', align:'center'});
      text('— 박신양', 400, 98, {size:10, color:'#4b1010', align:'center'});

      // 용팔이 대사
      ctx.fillStyle = 'rgba(10,0,0,0.88)';
      ctx.fillRect(60, 290, 680, 80);
      ctx.strokeStyle = '#dc2626'; ctx.lineWidth = 1;
      ctx.strokeRect(60, 290, 680, 80);
      text('"1000조야. 내가 이긴 거야."', 400, 315, {size:14, bold:true, color:'#fca5a5', align:'center'});
      text('"처음부터 알고 있었어. 네가 올 거."', 400, 340, {size:12, color:'#7f1d1d', align:'center'});
      text('"다음엔… 욕심을 버려."', 400, 360, {size:11, color:'#4b1010', align:'center'});

    } else if (t === 'ending') {
      // ── 엔딩: 플레이어 승리
      drawSkyBackground();
      ctx.fillStyle = 'rgba(10,23,42,0.75)'; ctx.fillRect(0,0,LW,LH);

      // CEO 환호
      const bounce = Math.sin(this._anim * 0.12) * 4;
      ctx.save(); ctx.translate(0, bounce);
      drawShadow(ctx, 380, 360, 70);
      drawSprite(ctx, SPRITES.ceo_idle2, 320, 180, 5);
      ctx.restore();

      // 금빛 글로우
      const eg = ctx.createRadialGradient(400, 250, 20, 400, 250, 280);
      eg.addColorStop(0, 'rgba(251,191,36,0.15)');
      eg.addColorStop(1, 'rgba(251,191,36,0)');
      ctx.fillStyle = eg; ctx.fillRect(0,0,LW,LH);

      text('🏆  천  조  달  성  🏆', 400, 45, {size:44, bold:true, color:'#facc15', align:'center'});
      text('"욕심을 버렸더니 천조가 왔다."', 400, 82, {size:13, color:'#a3e635', align:'center'});

      // CEO 승리 대사
      ctx.fillStyle = 'rgba(0,20,40,0.88)';
      ctx.fillRect(60, 295, 680, 70);
      ctx.strokeStyle = '#a3e635'; ctx.lineWidth = 1;
      ctx.strokeRect(60, 295, 680, 70);
      text('"해냈다."', 400, 318, {size:16, bold:true, color:'#facc15', align:'center'});
      text('"무지출 챌린지… 실패했지만."', 400, 340, {size:12, color:'#a3e635', align:'center'});
      text('"결국은 내가 용팔이를 이겼다."', 400, 358, {size:11, color:'#64748b', align:'center'});

    } else {
      // ── 타임아웃
      drawSkyBackground();
      ctx.fillStyle = 'rgba(15,23,42,0.88)'; ctx.fillRect(0,0,LW,LH);
      drawSprite(ctx, SPRITES.ceo_idle1, 350, 180, 4);
      text('⏰ 5년 타임아웃', 400, 50, {size:26, bold:true, color:'#fbbf24', align:'center'});
      text('"5년이 지났습니다. 챌린지는 미완성."', 400, 85, {size:12, color:'#94a3b8', align:'center'});
      text('"하지만 용팔이도 못 이겼고, 당신도 못 이겼다."', 400, 105, {size:11, color:'#475569', align:'center'});
    }

    // ── 최종 통계
    const statBg = t === 'gameover' ? '#0a0000' : '#0a0f1a';
    drawPixelBox(ctx, 60, 385, 720, 45, statBg, '#374151');
    const stats = [
      fmtQuarterLabel(s.quarter),
      '순자산 ' + fmtWon(s.cash-(s.loans.bank1+s.loans.bank2+s.loans.loanShark+s.loans.yongpali)),
      '용팔이 ' + fmtWon(s.yongpaliAccumInterest),
    ];
    stats.forEach((st, i) => {
      text(st, 130 + i*240, 412, {size:10, color:'#64748b', align:'center'});
    });

    // ── 버튼 레이블
    const eBtnW = Math.floor(LW*0.44), eBtnGap = Math.floor(LW*0.04); // ★ BUG-7 FIX: render 내 재계산
    drawPixelButton(ctx, Math.floor(LW*0.04), Math.floor(LH*0.87), eBtnW, 70, '🔄 다시 도전', t==='ending');
    drawPixelButton(ctx, Math.floor(LW*0.04)+eBtnW+eBtnGap, Math.floor(LH*0.87), eBtnW, 70, '🏠 타이틀로');
  },
  update: function() {},
};

/* ─── 메인 루프 ─── */
let lastTime = Date.now();
let _loopRunning = false; // ★ RangeError 방지: 재진입 가드
function loop() {
  if (_loopRunning) return; // 재진입 차단
  _loopRunning = true;
  try {
    const now = Date.now();
    const dt = Math.min(now - lastTime, 100); // dt 최대 100ms 캡 (탭 전환 후 폭발 방지)
    lastTime = now;
    updateScreenShake(dt);
    updateParticles(_activeParticles);
    updateParticles(_bgParticles);
    updatePedestrians();
    sceneManager.update(dt);
    sceneManager.render();
  } catch(e) {
    // 루프 내 에러를 잡아서 게임이 멈추지 않도록
    console.warn('[loop] 에러 무시:', e.message);
  } finally {
    _loopRunning = false;
  }
  requestAnimationFrame(loop);
}
