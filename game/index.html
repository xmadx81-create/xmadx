<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>무지출용팔이 v0.50</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html { width:100%; height:100%; }
  body {
    width:100%; height:100%;
    background:#0a0a14; color:#e8e8e8;
    font-family:'Pretendard',-apple-system,sans-serif;
    overflow:hidden;
    -webkit-tap-highlight-color:transparent;
    user-select:none;
    position: fixed;  /* iOS Safari 스크롤 바운스 방지 */
    overscroll-behavior: none;
  }
  /* 시작 화면 캔버스 (전체 화면 가운데) */
  #start-screen.active { display: flex !important; }
  #start-screen canvas {
    background: #87ceeb;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  /* 게임 화면 표시 */
  #game-screen.active { display: flex !important; }

  /* ★ MOB-9: 모바일 기본 폰트 + 터치 영역 */
  * { box-sizing: border-box; }
  html, body {
    overflow: hidden;
    touch-action: pan-y;
    -webkit-tap-highlight-color: transparent;
  }
  body { font-size: 15px; }

  /* 모바일에서 버튼 최소 터치 44px */
  button { touch-action: manipulation; }
  .btn {
    touch-action: manipulation; min-height: 44px; font-size: 15px; }
  .card { font-size: 14px; }
  .card-title { font-size: 16px; }
  .card-meta  { font-size: 13px; }
  .info-label { font-size: 13px; }
  .info-value { font-size: 14px; }
  @keyframes flashUp   { 0%{background:rgba(239,68,68,0.35)} 100%{background:transparent} }
  @keyframes flashDown { 0%{background:rgba(59,130,246,0.35)} 100%{background:transparent} }
  .price-flash-up   { animation: flashUp   0.7s ease-out; border-radius:4px; }
  .price-flash-down { animation: flashDown 0.7s ease-out; border-radius:4px; }
  .tab        {
    touch-action: manipulation; font-size: 13px; min-height: 40px; }

  /* 320~430px 폰 최적화 */
  @media (max-width: 430px) {
    body { font-size: 14px; }
    .btn { font-size: 14px; padding: 10px 12px; }
    .card-title { font-size: 15px; }
    .info-label, .info-value { font-size: 13px; }
    #version-badge { font-size: 10px; padding: 2px 6px; }
  }

  /* 버전 표시 (항상 보이는 디버그용) */
  #version-badge {
    position: fixed; top: 8px; right: 8px;
    background: rgba(220, 38, 38, 0.95);
    color: white;
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: bold;
    z-index: 5000;
    pointer-events: none;
    font-family: monospace;
  }

  /* HTML 모달 시스템 — z-index 명시 */
  /* 모달은 풀스크린 */
  .modal-overlay {
    position: fixed; top: 0; left: 0; right:0; bottom:0;
    width: 100%; height: 100%;
    background: #0a0a14;
    display: none; z-index: 9999;
    flex-direction: column;
    overflow: hidden;
  }
  .modal-overlay.active { display: flex; }
  .modal-container {
    background: #0a0a14;
    width: 100%; height: 100%;
    max-width: none; max-height: none;
    display: flex; flex-direction: column;
    color: #e8e8e8;
    font-family: 'Pretendard', -apple-system, sans-serif;
    overflow: hidden;
    border: none; border-radius: 0;
  }
  .modal-header {
    padding: 10px 14px;
    background: #1a1a2e;
    border-bottom: 2px solid #3a3a5a;
    display: flex; justify-content: space-between; align-items: center;
    flex-shrink: 0;
  }
  .modal-title {
    font-size: 20px;
    font-weight: bold;
    color: #fbbf24;
  }
  .modal-close {
    background: #3a3a5a;
    color: white;
    border: none;
    padding: 8px 14px;
    font-size: 16px;
    cursor: pointer;
    border-radius: 6px;
    font-weight: bold;
    min-width: 44px;
    min-height: 36px;
  }
  .modal-body {
    padding: 16px;
    overflow-y: auto;
    overflow-x: hidden;
    flex: 1 1 auto;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior: contain;
    touch-action: pan-y;
    min-height: 0;
    background: #0a0a14;
  }
  .modal-body::-webkit-scrollbar { width: 8px; }
  .modal-body::-webkit-scrollbar-track { background: #0f172a; }
  .modal-body::-webkit-scrollbar-thumb { background: #4a4a6a; border-radius: 4px; }
  .modal-footer {
    padding: 10px 14px;
    background: #1a1a2e;
    border-top: 2px solid #3a3a5a;
    flex-shrink: 0;
    display: flex; gap: 8px;
  }

  /* 게임 화면 액션 버튼 */
  .game-btn {
    background: #3a3a5a; color: white;
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 6px;
    padding: 4px 2px; /* ★ C안: 패딩 축소 */
    font-size: 11px;  /* ★ C안: 폰트 축소 */
    font-weight: bold;
    cursor: pointer;
    -webkit-user-select: none; user-select: none;
    -webkit-tap-highlight-color: transparent;
    min-height: 36px; /* ★ C안: 42→36px */
    font-family: inherit;
    transition: filter 0.1s;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1px;
    line-height: 1.2;
  }
  .game-btn .btn-icon { font-size: 16px; line-height: 1; } /* ★ C안: 아이콘 영역 */
  .game-btn .btn-label { font-size: 10px; opacity: 0.9; }  /* ★ C안: 텍스트 영역 */
  .game-btn:active { filter: brightness(1.3); }

  /* 사업장 카드 */
  .biz-card {
    background: #1a1a2e;
    border: 2px solid #3a3a5a;
    border-radius: 8px;
    padding: 14px;
    margin-bottom: 14px;
    cursor: pointer;
    -webkit-user-select: none; user-select: none;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.1s;
  }
  .biz-card:active { background: #252540; }
  .biz-card.unlocked-empty {
    border-style: dashed;
    border-color: #0ea5e9;
    text-align: center;
  }
  .biz-card.locked {
    border-color: #374151;
    background: #0f172a;
    opacity: 0.6;
    text-align: center;
  }
  .biz-card-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 10px;
  }
  .biz-card-icon { font-size: 32px; flex-shrink:0; }
  .biz-card-name {
    font-size: 18px; font-weight: bold; color: #fbbf24;
    flex: 1; min-width: 0;
  }
  .biz-card-meta {
    font-size: 13px; color: #94a3b8;
    margin-top: 2px;
  }
  .biz-card-stats {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    font-size: 13px;
  }
  .biz-card-arrow {
    color: #0ea5e9; font-size: 18px; font-weight: bold;
  }
  
  /* 탭 */
  .tabs {
    display: flex; gap: 6px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .tab {
    touch-action: manipulation;
    flex: 1; min-width: 0;
    padding: 10px 6px;
    background: #252540;
    color: #cbd5e1;
    border: 2px solid #3a3a5a;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: bold;
    text-align: center;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    min-height: 40px;
  }
  .tab.active {
    background: #0ea5e9;
    color: #0f172a;
    border-color: #0ea5e9;
  }

  /* 정보 패널 */
  .info-panel {
    background: #0f172a;
    border: 2px solid #374151;
    border-radius: 6px;
    padding: 12px;
    margin-bottom: 12px;
    font-size: 14px;
    line-height: 1.6;
  }
  .info-row {
    display: flex; justify-content: space-between;
    padding: 4px 0;
  }
  .info-label { color: #94a3b8; }
  .info-value { color: #ffffff; font-weight: bold; }

  /* 액션 버튼 (모달 내부) */
  .btn {
    padding: 10px 14px;
    background: #3a3a5a;
    color: white;
    border: 2px solid #4a4a6a;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    font-weight: bold;
    width: 100%;
    margin-bottom: 12px;
    transition: background 0.1s;
    -webkit-user-select: none; user-select: none;
    -webkit-tap-highlight-color: transparent;
    min-height: 40px;
  }
  .btn:active { background: #4a4a7a; }
  .btn-primary { background: #dc2626; border-color: #ef4444; }
  .btn-primary:active { background: #ef4444; }
  .btn-success { background: #16a34a; border-color: #22c55e; }
  .btn-warn { background: #ca8a04; border-color: #facc15; }
  .btn-danger { background: #7f1d1d; border-color: #dc2626; }
  .btn-info { background: #0c4a6e; border-color: #0ea5e9; }
  .btn:disabled { background: #1a1a2e; color: #475569; border-color: #252540; cursor: not-allowed; }
  .modal-footer .btn { margin-bottom: 0; }

  /* 카드 (봇, 직원) */
  .card {
    background: #252540;
    border: 2px solid #3a3a5a;
    border-radius: 6px;
    padding: 12px;
    margin-bottom: 14px;
    cursor: pointer;
    transition: background 0.1s;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .card:active { background: #2a2a4a; }
  .card-bot-cook { border-color: #dc2626; }
  .card-bot-serve { border-color: #0ea5e9; }
  .card-bot-cashier { border-color: #a3e635; }
  .card-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 8px;
  }
  .card-icon { font-size: 28px; }
  .card-title { font-size: 16px; font-weight: bold; flex: 1; }
  .card-meta { color: #94a3b8; font-size: 13px; }
  .card-arrow { color: #94a3b8; font-size: 18px; }

  /* 능력치 별 */
  .stars { display: inline-flex; gap: 3px; vertical-align: middle; }
  .star {
    width: 14px; height: 14px;
    background: #374151;
    clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
  }
  .star.filled { background: #facc15; }
  .stat-row {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 0;
    font-size: 14px;
  }
  .stat-label { width: 60px; }
  .stat-value { color: #cbd5e1; min-width: 30px; }
  .stat-effect { color: #94a3b8; font-size: 12px; }

  /* 진척 바 */
  .progress {
    width: 100%; height: 14px;
    background: #0f172a;
    border: 1px solid #374151;
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }
  .progress-fill { height: 100%; transition: width 0.3s; }
  .progress-fill.high { background: #a3e635; }
  .progress-fill.mid { background: #fbbf24; }
  .progress-fill.low { background: #dc2626; }
  .progress-text {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 11px; font-weight: bold;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.5);
  }

  /* 캐릭터 미리보기 */
  .char-preview {
    width: 120px; height: 150px;
    background: #0f172a;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .char-preview canvas { image-rendering: pixelated; }

  /* 그리드 */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .grid-1 { display: grid; grid-template-columns: 1fr; gap: 8px; }

  /* 토스트 */
  .toast {
    position: fixed; top: 20%; left: 50%;
    transform: translateX(-50%);
    background: #1a1a2e;
    border: 2px solid #fbbf24;
    color: white;
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 16px;
    font-weight: bold;
    z-index: 10000;
    display: none;
    animation: toastFade 1.6s ease-out forwards;
  }
  @keyframes toastFade {
    0% { opacity: 0; transform: translate(-50%, -10px); }
    20% { opacity: 1; transform: translate(-50%, 0); }
    80% { opacity: 1; transform: translate(-50%, 0); }
    100% { opacity: 0; transform: translate(-50%, -10px); }
  }

  /* ★ v0.8.2 사건 전용 대형 토스트 */
  .event-toast {
    position: fixed; top: 28%; left: 50%;
    transform: translateX(-50%);
    min-width: 260px; max-width: 90vw;
    background: #14142a;
    border: 3px solid #fbbf24;
    border-radius: 12px;
    padding: 16px 22px;
    z-index: 10001;
    display: none;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  }
  .event-toast .et-rarity {
    font-size: 11px; font-weight: bold; letter-spacing: 1px;
    text-transform: uppercase; margin-bottom: 4px;
  }
  .event-toast .et-name {
    font-size: 18px; font-weight: bold; color: #fff; margin-bottom: 6px;
  }
  .event-toast .et-story {
    font-size: 12px; color: #cbd5e1; line-height: 1.4; margin-bottom: 8px;
  }
  .event-toast .et-effect {
    font-size: 13px; font-weight: bold;
    display: inline-block; padding: 3px 10px; border-radius: 6px;
    background: rgba(255,255,255,0.08);
  }
  /* 희귀도별 연출 */
  .event-toast.rar-common { border-color: #64748b; }
  .event-toast.rar-common .et-rarity { color: #94a3b8; }
  .event-toast.rar-uncommon { border-color: #0ea5e9; box-shadow: 0 8px 32px rgba(14,165,233,0.3); }
  .event-toast.rar-uncommon .et-rarity { color: #38bdf8; }
  .event-toast.rar-rare { border-color: #a855f7; box-shadow: 0 8px 36px rgba(168,85,247,0.4); }
  .event-toast.rar-rare .et-rarity { color: #c084fc; }
  .event-toast.rar-legendary {
    border-color: #facc15;
    box-shadow: 0 0 40px rgba(250,204,21,0.6), 0 8px 32px rgba(0,0,0,0.6);
    animation: legendaryPulse 1.2s ease-in-out infinite;
  }
  .event-toast.rar-legendary .et-rarity { color: #fde047; }
  @keyframes legendaryPulse {
    0%, 100% { box-shadow: 0 0 40px rgba(250,204,21,0.5), 0 8px 32px rgba(0,0,0,0.6); }
    50% { box-shadow: 0 0 60px rgba(250,204,21,0.9), 0 8px 32px rgba(0,0,0,0.6); }
  }
  @keyframes eventToastIn {
    0% { opacity: 0; transform: translate(-50%, 20px) scale(0.9); }
    100% { opacity: 1; transform: translate(-50%, 0) scale(1); }
  }
  @keyframes eventToastOut {
    0% { opacity: 1; transform: translate(-50%, 0) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -10px) scale(0.95); }
  }

  /* ★ v0.8.2 화면 플래시 */
  #screen-flash {
    position: fixed; inset: 0; z-index: 9998;
    pointer-events: none; display: none; opacity: 0;
  }
  @keyframes flashPos {
    0% { opacity: 0; } 30% { opacity: 0.35; } 100% { opacity: 0; }
  }
  @keyframes flashNeg {
    0% { opacity: 0; } 30% { opacity: 0.4; } 100% { opacity: 0; }
  }

  /* ★ v0.23 SSR/SR 등장 풀스크린 연출 */
  #gacha-reveal {
    position: fixed; inset: 0; z-index: 10000;
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    pointer-events: all;
  }
  #gacha-reveal.active { display: flex; }

  /* SSR: 금빛 방사 배경 */
  #gacha-reveal.rarity-SSR {
    background: radial-gradient(ellipse at center,
      #2e2600 0%, #1a1500 40%, #0a0900 100%);
  }
  /* SR: 보라 방사 배경 */
  #gacha-reveal.rarity-SR {
    background: radial-gradient(ellipse at center,
      #1e0a2e 0%, #130620 40%, #080010 100%);
  }

  /* 방사선 파티클 레이어 */
  #gacha-rays {
    position: absolute; inset: 0;
    pointer-events: none; overflow: hidden;
  }
  .gacha-ray {
    position: absolute;
    top: 50%; left: 50%;
    width: 3px; height: 55vh;
    transform-origin: 0% 0%;
    opacity: 0;
  }
  @keyframes rayExpand {
    0%   { opacity: 0; height: 0; }
    30%  { opacity: 0.6; }
    100% { opacity: 0; height: 60vh; }
  }

  /* 캐릭터 등장 캔버스 */
  #gacha-char-wrap {
    position: relative; z-index: 2;
    transform: scale(0) translateY(40px);
    opacity: 0;
    transition: transform 0.45s cubic-bezier(0.175,0.885,0.32,1.275),
                opacity 0.3s ease;
  }
  #gacha-char-wrap.show {
    transform: scale(1) translateY(0);
    opacity: 1;
  }
  #gacha-char-canvas {
    image-rendering: pixelated;
    display: block;
    filter: drop-shadow(0 0 24px var(--gacha-glow, #facc15));
  }

  /* 등급 배지 */
  #gacha-badge {
    font-size: 28px; font-weight: 900;
    letter-spacing: 4px;
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.3s ease 0.35s, transform 0.3s ease 0.35s;
    text-shadow: 0 0 20px var(--gacha-glow, #facc15);
    margin-bottom: 8px;
  }
  #gacha-badge.show { opacity: 1; transform: translateY(0); }

  /* 캐릭터 이름 */
  #gacha-name {
    font-size: 26px; font-weight: 800;
    opacity: 0; transform: translateY(8px);
    transition: opacity 0.3s ease 0.5s, transform 0.3s ease 0.5s;
    margin-bottom: 4px;
  }
  #gacha-name.show { opacity: 1; transform: translateY(0); }

  /* 플레이버 */
  #gacha-flavor {
    font-size: 13px; color: #94a3b8;
    opacity: 0;
    transition: opacity 0.4s ease 0.65s;
    margin-bottom: 10px; text-align: center;
    max-width: 280px; line-height: 1.5;
  }
  #gacha-flavor.show { opacity: 1; }

  /* intro 대사 */
  #gacha-intro {
    font-size: 15px; font-style: italic;
    opacity: 0;
    transition: opacity 0.4s ease 0.8s;
    max-width: 280px; text-align: center;
    line-height: 1.5; padding: 8px 14px;
    border-radius: 8px;
    background: rgba(255,255,255,0.05);
  }
  #gacha-intro.show { opacity: 1; }

  /* 스킬 칩 */
  #gacha-skill {
    margin-top: 12px; opacity: 0;
    transition: opacity 0.4s ease 0.95s;
    padding: 6px 14px; border-radius: 20px;
    font-size: 12px; font-weight: bold;
    background: rgba(0,0,0,0.4);
  }
  #gacha-skill.show { opacity: 1; }

  /* 탭해서 닫기 */
  #gacha-tap-hint {
    position: absolute; bottom: 60px;
    font-size: 13px; color: rgba(255,255,255,0.35);
    opacity: 0; animation: hintBlink 1.2s ease 1.4s infinite;
  }
  @keyframes hintBlink {
    0%,100% { opacity: 0.3; } 50% { opacity: 0.7; }
  }

  /* 파티클 별 */
  .gacha-star {
    position: absolute; pointer-events: none;
    font-size: 14px; opacity: 0;
  }
  @keyframes starFloat {
    0%   { opacity: 0; transform: translate(0,0) scale(0.5); }
    20%  { opacity: 1; }
    100% { opacity: 0; transform: translate(var(--sx),var(--sy)) scale(1.2); }
  }
</style>
</head>
<body>
<div id="version-badge">v0.50 · 그래픽 업그레이드</div>

<!-- 시작 화면 (캔버스 사용) -->
<div id="start-screen" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; z-index:50; align-items:center; justify-content:center; background:#030308; overflow:hidden;">
  <canvas id="canvas" width="800" height="500" style="image-rendering:pixelated; image-rendering:crisp-edges; touch-action:none;"></canvas>
</div>

<!-- 메인 게임 화면 (HTML 풀 레이아웃) -->
<div id="game-screen" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; z-index:10; flex-direction:column; background:#0a0a14; overflow:hidden;">
  
  <!-- 상단 미니 HUD (탭하면 재무 대시보드) -->
  <div id="hud-bar" data-hud-click="dashboard" style="flex-shrink:0; background:#1a1a2e; border-bottom:2px solid #3a3a5a; padding:8px 10px; cursor:pointer;">
    <div style="display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:6px; align-items:center;">

  // ★ v0.32 결산 후 대화 이벤트 추첨
  function pickTalkEvent(emp, s) {
    const rap = emp.rapport || 50;
    const sat = emp.satisfaction || 70;
    const isNamed = !!emp.isNamed;
    let pool = [];

    // 불만 최우선 (만족도 40 이하)
    if (sat <= 40) TALK_POOL.complaint.forEach(t => pool.push({...t, _type:'complaint'}));

    // 이탈 예고 (만족도 35 이하 또는 임의)
    if (sat <= 35 || Math.random() < 0.12) TALK_POOL.quit.forEach(t => pool.push({...t, _type:'quit'}));

    // 고민 — rapport 범위 필터 (maxRap 포함)
    TALK_POOL.worry.forEach(t => {
      const minOk = (t.minRap||0) <= rap;
      const maxOk = t.maxRap === undefined || rap <= t.maxRap;
      if (minOk && maxOk) pool.push({...t, _type:'worry'});
    });

    // 요구 (rapport 30+)
    if (rap >= 30) TALK_POOL.demand.forEach(t => {
      if ((t.minRap||0) <= rap) pool.push({...t, _type:'demand'});
    });

    // 야간 고백 (rapport 55+)
    if (rap >= 55) TALK_POOL.night.forEach(t => {
      if ((t.minRap||0) <= rap) pool.push({...t, _type:'night'});
    });

    // 스토리 — 네임드 + namedKey 매칭 + rapport 조건
    if (isNamed) TALK_POOL.story.forEach(t => {
      const keyOk = !t.namedKey || (emp.key && emp.key === t.namedKey) || (emp.name && emp.name === t.namedKey);
      if (keyOk && (t.minRap||0) <= rap) pool.push({...t, _type:'story'});
    });

    // 일상 (항상)
    TALK_POOL.daily.forEach(t => pool.push({...t, _type:'daily'}));

    if (!pool.length) return null;

    // 가중치: urgent/story/night 높게, daily 낮게
    const typeW = {complaint:6, quit:5, worry:4, story:4, night:3, demand:2, daily:1};
    const w = pool.map(t => t.urgent ? (typeW[t._type]||1)*2 : (typeW[t._type]||1));
    const total = w.reduce((a,b)=>a+b, 0);
    let r = Math.random()*total;
    for (let i=0; i<pool.length; i++) { r -= w[i]; if (r<=0) return pool[i]; }
    return pool[pool.length-1];
  }

  // 발동 확률: rapport 높을수록 ↑
  function talkEventChance(emp) {
    const rap = emp.rapport || 50;
    const sat = emp.satisfaction || 70;
    if (sat <= 40) return 0.90;  // 불만 상태 → 거의 무조건
    if (rap >= 71) return 0.55;  // 친밀
    if (rap >= 31) return 0.30;  // 보통
    return 0.15;                 // 냉담
  }

  // MBTI 랜덤 배정 함수
  function randomMbti(rarityBias) {
    const pool = [...MBTI_LIST];
    let weights = pool.map(m => {
      if (rarityBias === 'SR_UP') return m.rarity==='SR'||m.rarity==='SSR' ? m.w*5 : m.w;
      return m.w;
    });
    const total = weights.reduce((a,b)=>a+b,0);
    let r = Math.random()*total;
    for (let i=0;i<pool.length;i++) { r -= weights[i]; if(r<=0) return pool[i].mbti; }
    return pool[0].mbti;
  }

  function grantLeave(emp, quarter) {
    const grade = emp.grade || 'part_time';
    const perYear = WELFARE.leavePerYear[grade] || 0;
    const perQ    = Math.floor(perYear / 4);
    if (perQ > 0 && emp.lastLeaveQ !== quarter) {
      emp.leaveBalance  = (emp.leaveBalance||0) + perQ;
      emp.lastLeaveQ    = quarter;
    }
    // 월차 초기화 (분기마다)
    emp.monthlyLeaveUsed = 0;
    // 복지포인트 지급
    emp.welfarePoint = (emp.welfarePoint||0) + (WELFARE.welfarePointPerQ[grade]||0);
  }

  function applyLeave(emp, type) {
    // type: 'annual'(연차) | 'monthly'(월차) | 'condolence'(경조사)
    const grade = emp.grade || 'part_time';
    if (type === 'annual') {
      if ((emp.leaveBalance||0) <= 0) return {ok:false, msg:'잔여 연차 없음'};
      emp.leaveBalance--;
      emp._leaveUsedThisQ = (emp._leaveUsedThisQ||0) + 1;
      emp.rapport = Math.min(100, (emp.rapport||50) + 20);
      return {ok:true, msg:'연차 1일 사용 → 만족도 +20', revPenalty:0.15};
    }
    if (type === 'monthly') {
      const maxML = WELFARE.monthlyLeavePerQ[grade] || 0;
      if (maxML === 0) return {ok:false, msg:'월차 해당 없는 직급'};
      if ((emp.monthlyLeaveUsed||0) >= maxML) return {ok:false, msg:'이번 분기 월차 소진'};
      emp.monthlyLeaveUsed = (emp.monthlyLeaveUsed||0) + 1;
      emp.rapport = Math.min(100, (emp.rapport||50) + 15);
      return {ok:true, msg:'월차 사용 → 만족도 +15', revPenalty:0.05};
    }
    return {ok:false, msg:'지원되지 않는 복지 유형'};
  }

  function calcBonus(emp, bizRevenue) {
    const grade = emp.grade || 'part_time';
    const maxRate = WELFARE.bonusMaxRate[grade] || 0;
    if (maxRate === 0) return 0;
    // 만족도 기반 성과금 비율 (만족도 100% = maxRate, 50% = maxRate/2)
    const perfRate = Math.max(0, ((emp.rapport||50) - 30) / 70);
    return Math.floor(bizRevenue * maxRate * perfRate);
  }

  // 팀 전체 궁합 계산 (현재 직원 목록 + 신규 후보)
  function calcTeamSynergy(employees, newEmp) {
    const allEmps = [...employees, newEmp];
    const allMbti = allEmps.map(e=>e.mbti).filter(Boolean);
    let positives = [], negatives = [], score = 50;

    for (const syn of MBTI_SYNERGY) {
      for (const [a, b] of syn.pairs) {
        // 양방향 매칭
        const hasA = allMbti.includes(a);
        const hasB = allMbti.includes(b);
        // 동일 MBTI 페어는 2명 이상
        const isSame = a === b;
        const count  = allMbti.filter(m=>m===a).length;
        const matched = isSame ? count >= 2 : (hasA && hasB);
        if (matched) {
          if (syn.type==='pos') { positives.push(syn); score += 15; }
          else                  { negatives.push(syn); score -= 12; }
        }
      }
    }
    // 같은 그룹 기본 친밀도
    const groups = allMbti.map(m=>getMbtiInfo(m).group);
    const groupCounts = {};
    groups.forEach(g=>{ groupCounts[g]=(groupCounts[g]||0)+1; });
    Object.values(groupCounts).forEach(c=>{ if(c>=2) score += (c-1)*5; });

    return {
      score: Math.max(0, Math.min(100, score)),
      positives: positives.slice(0,3),
      negatives: negatives.slice(0,2),
    };
  }

  function getMbtiCompat(mbtiA, mbtiB) {
    if (!mbtiA || !mbtiB) return 50;
    const same  = [...mbtiA].filter((c,i)=>c===mbtiB[i]).length;
    const EI_conflict = (mbtiA[0]==='E' && mbtiB[0]==='I') || (mbtiA[0]==='I' && mbtiB[0]==='E');
    const TF_same     = mbtiA[2] === mbtiB[2];
    const JP_same     = mbtiA[3] === mbtiB[3];
    let score = 40 + same*10;
    if (EI_conflict) score -= 10;
    if (TF_same)     score += 10;
    if (JP_same)     score += 5;
    return Math.max(10, Math.min(100, score));
  }

    return null;
  }

  function generateHirePool(s, bid, count) {
    count = count || 4;
    const b = s.businesses.find(bb => bb.id === bid);
    if (!b) return [];

    const hiredKeys = new Set();
    s.businesses.forEach(biz => {
      (biz.employees || []).forEach(e => { if (e.namedKey) hiredKeys.add(e.namedKey); });
    });
    // 네임드 출현 체크 (최대 1명만)
    const shuffled = NAMED_CHARS.slice().sort(() => Math.random() - 0.5);

      if (hiredKeys.has(nc.key)) continue;
      if (Math.random() < nc.spawnChance) {
        const emp = {
          id: 'emp_' + Date.now() + '_named_' + nc.key,
          name: nc.name,

    // bizExp 적립 + 레벨업 처리. 반환: 레벨업 발생 시 {leveled:true, newLevel, slotUnlocked}
    addBizExp:function(b, amount, sourceTag){
      if(!b) return null;
      if(b.bizExp === undefined) b.bizExp = 0;
      if(b.bizExpToNext === undefined) b.bizExpToNext = Math.ceil(100 * Math.pow(b.level||1, 1.5));
      b.bizExp += amount;
      let leveledTo = null, slotGained = 0;
      while(b.bizExp >= b.bizExpToNext){
        b.bizExp -= b.bizExpToNext;
        b.level = (b.level||1) + 1;
        const prevSlots = b.maxEmployees;
        this.recalcMaxEmployees(b);
        if(b.maxEmployees > prevSlots) slotGained += (b.maxEmployees - prevSlots);
        b.bizExpToNext = Math.ceil(100 * Math.pow(b.level, 1.5));
        leveledTo = b.level;

      return leveledTo ? {leveled:true, newLevel:leveledTo, slotGained:slotGained, source:sourceTag} : null;

    // 사업계획서 자동 생성 (거절 후 사장이 제출)
    generateExpansionPlan:function(bid){
      const b = _s.businesses.find(x=>x.id===bid);
      if(!b) return null;
      // 업종 랜덤 선택 (현재 사업체와 다른 업종 우선)
      const catKeys = Object.keys(this.BUSINESS_CATEGORIES);
      const otherCats = catKeys.filter(k=>k!==b.category);
      const pickCat = otherCats[Math.floor(Math.random()*otherCats.length)] || catKeys[0];
      const cat = this.BUSINESS_CATEGORIES[pickCat];
      const stage = this.getCurrentStage();
      // 예상 자본: 현 단계 기준자본 × 업종 배수
      const estCapital = Math.floor(stage.baseCapital * cat.capitalMul);
      const ceo = (b.employees||[]).find(e=>e.id===b.ceoId);
      const names = ['신규지점','확장점','제2사업','신사업','분점'];
      const planName = (cat.label) + ' ' + names[Math.floor(Math.random()*names.length)];
      const plan = { category:pickCat, categoryLabel:cat.label, emoji:cat.emoji, estCapital:estCapital, name:planName.slice(0,10), ceoName:ceo?ceo.name:'?' };
      b.expansionPlan = plan;
      b.expansionState = 'proposing';
      return plan;
    },
    // 1단계 요청 거절 → 사업계획서 단계로
    refuseCEOExpansion:function(bid){
      const b = _s.businesses.find(x=>x.id===bid);
      if(!b || b.expansionState !== 'requesting') return {ok:false};
      const plan = this.generateExpansionPlan(bid);
      return {ok:true, plan:plan};
    },
    // 자동 대출 (1금융 → 2금융 순, 사채·용팔이 절대 미사용). 반환 {ok, borrowed, shortfall}
    autoLoanForAmount:function(needed){
      let borrowed = {bank1:0, bank2:0};
      let remaining = needed;
      const curAuto = (_s.loans.bank1||0) + (_s.loans.bank2||0);
      let headroom = this.AUTO_LOAN_MAX - curAuto;  // 자동 대출 가능 잔여 한도
      if(headroom <= 0) return {ok:false, borrowed:borrowed, shortfall:remaining};
      // 1금융 우선 (한도 내), 그다음 2금융
      const take = Math.min(remaining, headroom);
      // 단순화: 1금융으로 먼저 채우고 부족분만 2금융 (여기선 1금융에 몰아도 무방하나, 단계 구분 위해 1금융 우선)
      _s.loans.bank1 = (_s.loans.bank1||0) + take;
      _s.cash += take;
      borrowed.bank1 = take;
      remaining -= take;
      return { ok: remaining <= 0, borrowed:borrowed, shortfall:Math.max(0,remaining) };
    },
    // 2단계 사업계획서 승인 → 새 사업체 생성 (자금 부족 시 자동 대출)
    approveCEOExpansion:function(bid){
      const b = _s.businesses.find(x=>x.id===bid);
      if(!b || b.expansionState !== 'proposing' || !b.expansionPlan) return {ok:false, reason:'no_plan'};
      const stage = this.getCurrentStage();
      if(_s.businesses.length >= stage.slots) return {ok:false, reason:'no_slot'};
      const plan = b.expansionPlan;
      // 자금 부족 시 자동 대출 (1·2금융만)
      let loanInfo = null;
      if(_s.cash < plan.estCapital){
        const need = plan.estCapital - _s.cash;
        const r = this.autoLoanForAmount(need);
        loanInfo = r;
        if(!r.ok){
          // 1·2금융으로도 부족 → 확장 보류 (사채·용팔이 절대 미사용)
          return {ok:false, reason:'insufficient_auto_loan', shortfall:r.shortfall};
        }
      }
      // 새 사업체 생성
      const result = this.createCustomBusiness({
        name: plan.name, category: plan.category,
        capitalLevel:'mid', riskLevel:'normal', maxBots:5, maxEmployees:5
      });
      if(!result.ok) return {ok:false, reason:result.reason};
      // 확장 완료 → 상태 복귀 (재요청 쿨다운: ceoReachedLv50 유지하되 state none)
      b.expansionState = 'none';
      b.expansionPlan = null;
      _s._ceoExpansionDone = true;  // ★ v0.10 gate_expansion 퀘스트 플래그
      return {ok:true, business:result.business, plan:plan, loanInfo:loanInfo};
    },
    // 요청/제안 대기 중인 사업체 목록
    getPendingExpansions:function(){
      return _s.businesses.filter(b=>b.expansionState==='requesting' || b.expansionState==='proposing');
    },
    // ★ v0.10 부서 정원 조회 (보석으로 부서별 +1 가능) — deptCapBonus 오버라이드 반영
    getDeptMaxMembers:function(deptKey){
      const bonus = (_s.deptCapBonus && _s.deptCapBonus[deptKey]) ? _s.deptCapBonus[deptKey] : 0;
      return this.DEPT_MAX_MEMBERS + bonus;
    },
    // ★ v0.10 보석 상점 ──────────────────────────────
    GEM_SHOP: {
      instant_hire: { price:30, label:'즉시 채용', emoji:'⚡', desc:'고능력 직원(능력치합 12+) 즉시 영입' },
      reroll:       { price:10, label:'능력치 리롤', emoji:'🎲', desc:'직원 능력치 재추첨 (나빠질 수도 있는 도박)' },
      event_cancel: { price:40, label:'사건 회피', emoji:'🛡', desc:'진행 중인 악재 1건 즉시 무효화' },
      dept_slot:    { price:50, label:'부서 정원 +1', emoji:'🏛', desc:'선택한 부서 1곳의 정원을 영구히 +1' },
    },
    // 보석 차감 헬퍼
    spendGems:function(n){
      if((_s.gems||0) < n) return false;
      _s.gems -= n; return true;
    },
    // [즉시 채용] 고능력 직원 영입 (능력치합 12+ 보장, 최대 30회 재추첨)
    gemInstantHire:function(bid){
      const b = _s.businesses.find(x=>x.id===bid);
      if(!b) return {ok:false, reason:'no_biz'};
      if((b.employees||[]).length >= b.maxEmployees) return {ok:false, reason:'full'};
      const price = this.GEM_SHOP.instant_hire.price;
      if((_s.gems||0) < price) return {ok:false, reason:'no_gems'};
      // 고능력 보장: 능력치합 12+ 나올 때까지 재추첨
      let emp=null;
      for(let i=0;i<30;i++){
        const e = this.createEmployee(bid,'part_time');
        if((e.cooking+e.serving+e.patience) >= 12){ emp=e; break; }
        emp = e; // 마지막 것이라도 보관
      }
      this.spendGems(price);
      b.employees.push(emp);
      return {ok:true, employee:emp};
    },
    // [리롤] 특정 직원 능력치 재추첨 (도박: 즉시 확정)
    gemReroll:function(empId){
      const price = this.GEM_SHOP.reroll.price;
      if((_s.gems||0) < price) return {ok:false, reason:'no_gems'};
      const e = this.findEmployeeById(empId);
      if(!e) return {ok:false, reason:'no_emp'};
      const before = { cooking:e.cooking, serving:e.serving, patience:e.patience };
      e.cooking = randStat(1,5); e.serving = randStat(1,5); e.patience = randStat(1,5);
      this.spendGems(price);
      const after = { cooking:e.cooking, serving:e.serving, patience:e.patience };
      const beforeSum = before.cooking+before.serving+before.patience;
      const afterSum = after.cooking+after.serving+after.patience;
      return {ok:true, before:before, after:after, delta: afterSum-beforeSum, empName:e.name};
    },
    // [사건 회피] 활성 악재 1건 무효화
    gemCancelEvent:function(){
      const price = this.GEM_SHOP.event_cancel.price;
      if((_s.gems||0) < price) return {ok:false, reason:'no_gems'};
      if(!_s.activeEvents || _s.activeEvents.length===0) return {ok:false, reason:'no_event'};
      // 악재(negative) 중 가장 오래 남은 것 우선 제거
      const negIdx = _s.activeEvents.findIndex(ev=>ev.posneg==='negative');
      if(negIdx < 0) return {ok:false, reason:'no_negative'};
      const removed = _s.activeEvents.splice(negIdx,1)[0];
      this.spendGems(price);
      return {ok:true, removed:removed};
    },
    // 활성 악재 존재 여부 (UI 버튼 활성화용)
    hasActiveNegativeEvent:function(){
      return !!(_s.activeEvents && _s.activeEvents.some(ev=>ev.posneg==='negative'));
    },
    // [부서 정원 +1] 선택한 부서 영구 +1
    gemDeptSlot:function(deptKey){
      const price = this.GEM_SHOP.dept_slot.price;
      if((_s.gems||0) < price) return {ok:false, reason:'no_gems'};
      if(!this.isDeptUnlocked(deptKey)) return {ok:false, reason:'locked'};
      if(!_s.deptCapBonus) _s.deptCapBonus = {};
      _s.deptCapBonus[deptKey] = (_s.deptCapBonus[deptKey]||0) + 1;
      this.spendGems(price);
      return {ok:true, deptKey:deptKey, newMax:this.getDeptMaxMembers(deptKey)};
    },
    // 자동 승급 (분기 종료 후 호출)
    checkStagePromotion:function(){
      const stages = this.STAGES;
      const curIdx = stages.findIndex(st=>st.key===_s.businessStage);
      if(curIdx >= stages.length-1) return null;  // 이미 최고
      const next = stages[curIdx+1];
      if(_s.cumulativeProfit >= next.promotion){
        const before = stages[curIdx];
        _s.businessStage = next.key;
        _s.creditGrade = next.credit;
        return {from:before, to:next};
      }
      return null;
    },
    // 사업 추가 (커스텀 옵션 적용)
    // ★ v0.25 TYPE A 자동 해금 체크
    checkCategoryUnlocks: function() {
      const s = _s;
      const cats = this.BUSINESS_CATEGORIES;
      const unlocked = s.unlockedCategories || (s.unlockedCategories = ['food']);
      const newlyUnlocked = [];

      // 현재 상태값 계산
      const cumulativeProfit = s.cumulativeProfit || 0;
      const bizCount = s.businesses.filter(b => b.unlocked).length;
      const botCount = s.businesses.reduce((t, b) => t + (b.bots ? b.bots.length : 0), 0);
      const maxEmpLv = s.businesses.reduce((max, b) => {
        const lv = b.employees ? Math.max(...b.employees.map(e => e.level || 1), 1) : 1;
        return Math.max(max, lv);
      }, 1);

      for (const [key, cat] of Object.entries(cats)) {
        if (cat.type !== 'A') continue;          // TYPE A만 자동 해금
        if (unlocked.includes(key)) continue;    // 이미 해금
        if (!cat.unlockCond) {                   // 조건 없음 → 즉시 해금
          unlocked.push(key);
          newlyUnlocked.push(cat);
          continue;
        }
        const cond = cat.unlockCond;
        let met = true;
        if (cond.cumulativeProfit && cumulativeProfit < cond.cumulativeProfit) met = false;
        if (cond.bizCount        && bizCount         < cond.bizCount)         met = false;
        if (cond.botCount        && botCount          < cond.botCount)         met = false;
        if (cond.employeeLv20    && maxEmpLv          < 20)                    met = false;
        if (met) {
          unlocked.push(key);
          newlyUnlocked.push(cat);
        }
      }
      return newlyUnlocked;  // 이번에 새로 해금된 목록 반환
    },

    createCustomBusiness:function(opts){
      // opts: {name, category, capitalLevel:'low'|'mid'|'high', riskLevel:'safe'|'normal'|'aggressive', maxBots:3|5|8, maxEmployees:3|5|8}
      const cat = this.BUSINESS_CATEGORIES[opts.category];
      if(!cat) return {ok:false, reason:'invalid_category'};
      // ★ v0.25 해금 여부 체크
      const unlockedCats = _s.unlockedCategories || ['food'];
      if(!unlockedCats.includes(opts.category)) {
        return {ok:false, reason:'category_locked', catLabel: cat.label};
      }
      const stage = this.getCurrentStage();
      if(_s.businesses.length >= stage.slots) return {ok:false, reason:'no_slot'};

      const capitalFactor = {low:0.7, mid:1.0, high:1.5}[opts.capitalLevel] || 1.0;
      const revenueFactor = {low:0.7, mid:1.0, high:1.5}[opts.capitalLevel] || 1.0;
      const riskMul = {safe:0.5, normal:1.0, aggressive:2.0}[opts.riskLevel] || 1.0;
      const riskRevMul = {safe:0.8, normal:1.0, aggressive:1.3}[opts.riskLevel] || 1.0;

      const totalCapital = Math.floor(stage.baseCapital * cat.capitalMul * capitalFactor);
      if(_s.cash < totalCapital) return {ok:false, reason:'insufficient_cash', required:totalCapital};
      _s.cash -= totalCapital;

      const finalRevenue = Math.floor(cat.baseRevenue * revenueFactor * riskRevMul);
      const finalRisk = Math.floor(cat.baseRisk * riskMul);
      const operationCost = Math.floor(finalRevenue * 0.3);

      const newBiz = {
        id: 'biz_'+Date.now()+'_'+Math.floor(Math.random()*9999),
        name: (opts.name || cat.label).slice(0, 10),
        category: opts.category,
        isCustom: true,
        capital: totalCapital,
        baseRevenue: finalRevenue,
        operationCost: operationCost,
        maxBots: opts.maxBots || 5,
        maxEmployees: opts.maxEmployees || 5,
        risk: finalRisk,
        bots: [],
        employees: [],
        unlocked: true,
        createdAtQuarter: _s.quarter,
        capitalLevel: opts.capitalLevel,
        riskLevel: opts.riskLevel,
        level:1, alba50Count:0,  // ★ v0.9.2 사업체 레벨
        baseMaxEmployees: opts.maxEmployees || 5,  // ★ v0.9.3.1 정원 기준값
        bizExp:0, bizExpToNext:100,
        revMilestonesPassed:[], safeQuarterStreak:0, maxDiversityScore:0, cumRevenue:0,
        managedByCEO:false, ceoId:null, ceoLevel:1, ceoExp:0, ceoReachedLv50:false, ceoSalaryPaid:0, ceoReportLog:[],  // ★ v0.9.4 사장 위임 (+v0.9.5 성장)
        expansionState:'none', expansionPlan:null,  // ★ v0.9.5 사업 확장 상태머신
        reviews:{positive:0,neutral:0,negative:0},  // ★ v0.11 리뷰 누적
      };
      _s.businesses.push(newBiz);
      return {ok:true, business:newBiz, capitalSpent:totalCapital};
    },
    BOT_TYPES, BOT_REVENUE_BY_LEVEL, BOT_UPGRADE_COST, BOTS_BY_CATEGORY,
    // ★ FIX-1 v0.21: NAMED_CHARS + generateHirePool 외부 노출
    NAMED_CHARS,
    generateHirePool,
    // ★ v0.24 캐릭터 생성기 노출
    generateCharacter,
    // ★ v0.32 이벤트형 대화 함수 노출
    getRapportBonus,
    getMbtiCompat,
    getMbtiInfo,       // ★ BUG-3 FIX: hirePool 씬 직접 참조
    calcTeamSynergy,   // ★ BUG-3 FIX: hirePool 씬 직접 참조
    randomMbti,        // ★ BUG-3 FIX: hirePool 씬 직접 참조
    TALK_POOL,
    pickTalkEvent,
    talkEventChance,
    BACKGROUNDS,
    PERSONALITY_TAGS,
    EMP_HAIR_VARIANTS,
    // ★ v0.25 해금 시스템 노출
    checkCategoryUnlocks,
  };
})();

          choices:[

            { label:'해당 배치만 회수', cost:10000000, rep:0, review:'neutral', result:'최소한으로 수습했습니다.' },
            { label:'문제를 축소한다', cost:0, rep:-6, review:'negative', result:'은폐 정황이 드러나 기업 이미지가 추락했습니다...' },

  function getFlowPool(cat){ return FLOW[cat] || FLOW._default; }
  function getInteractionPool(cat){ return INTERACTIONS[cat] || INTERACTIONS._default; }

  // 대표 사업체(첫 unlocked, 직접경영) 선택 — 흐름 멘트 대상
  function pickActiveBiz(s){
    const candidates = s.businesses.filter(b=>b.unlocked && !b.managedByCEO);
    return candidates.length>0 ? candidates[0] : (s.businesses.find(b=>b.unlocked)||null);
  }
  // 직원 객체 하나 뽑기 (없으면 null) — 상호작용 당사자 특정용
  function pickSubEmp(biz){
    const emps = (biz && biz.employees) ? biz.employees.filter(e=>!e.isCEO) : [];
    if(emps.length>0) return emps[Math.floor(Math.random()*emps.length)];
    return null;
  }
  // 직원명 하나 뽑기 (없으면 '직원')
  function pickSub(biz){
    const e = pickSubEmp(biz);
    return e ? e.name : '직원';
  }

  // 다음 흐름 멘트 생성
  function nextFlowMessage(s){
    const biz = pickActiveBiz(s);
    if(!biz) return null;
    const pool = getFlowPool(biz.category);
    const msg = pool[Math.floor(Math.random()*pool.length)];
    return msg.replace(/\{sub\}/g, pickSub(biz));
  }

  // 상호작용 이벤트 하나 생성 (가끔 호출)
  // ★ v0.20 [기둥4] 티어별 "유능한 대응" 선택지 등장에 필요한 숙련도 임계
  const COMPETENT_CHOICE_REQ = { 1:5, 2:5, 3:8, 4:10 };
  function rollInteraction(s){
    const biz = pickActiveBiz(s);
    if(!biz) return null;
    // ★ v0.19 [기둥3] Scale로 티어 결정 → 티어 위기 풀에서 뽑음
    const scale = getScale(s);
    const tier = pickTier(scale);
    const pool = getTierPool(tier, biz.category);
    const tmpl = pool[Math.floor(Math.random()*pool.length)];
    const subEmp = pickSubEmp(biz);          // ★ v0.12 당사자 직원 특정
    const sub = subEmp ? subEmp.name : '직원';
    let choices = tmpl.choices.slice();       // 복사 (원본 보존)
    // ★ v0.20 [기둥4·난이도] 숙련도 임계 이상이면 "유능한 대응" 선택지 추가
    //   유능한 팀을 키운 보상: 최선책 비용의 50%, 좋은 결과. 사마의 경계: 50%지 0 아님.
    const comp = getCompetence(biz);
    const req = COMPETENT_CHOICE_REQ[tier] || 5;
    if(comp >= req){
      // 기존 선택지 중 비용이 가장 큰 것(보통 최선책)을 기준으로 절반 비용
      const maxCost = Math.max.apply(null, tmpl.choices.map(c=>c.cost||0));
      choices.unshift({
        label: '💪 유능한 팀이 능숙하게 처리',
        cost: Math.round(maxCost * 0.5),
        rep: 2,
        review: 'positive',
        result: '잘 훈련된 팀이 위기를 매끄럽게 해결했습니다!',
        competent: true,
      });
    }
    return {
      bizId: biz.id,
      empId: subEmp ? subEmp.id : null,      // ★ v0.12 [사마의 2순위] 성장 대상
      tier: tier,                            // ★ v0.19 위기 티어
      competent: comp >= req,                // ★ v0.20 유능한 대응 가능 여부
      id: tmpl.id,
      title: tmpl.title,
      desc: tmpl.desc.replace(/\{sub\}/g, sub),
      choices: choices,
    };
  }

  // 상호작용 선택 적용 → 사후정산 (비용 차감 + 명성/리뷰 + ★직원 성장)
  function applyChoice(s, bizId, choice, empId){
    const biz = s.businesses.find(b=>b.id===bizId);
    // ★ v0.18 [기둥2] 비용을 "기본피해"로 보고 방어·행운 판정 (choice.cost가 있을 때만)
    let damage = null;
    if(choice.cost){
      damage = resolveCrisisDamage(s, biz, choice.cost);
      s.cash = Math.max(0, s.cash - damage.finalCost);
    }
    // 명성 (0~100 클램프)
    if(typeof choice.rep === 'number'){
      s.reputation = Math.max(0, Math.min(100, (s.reputation||50) + choice.rep));
    }
    // 리뷰 누적 (사업체별)
    if(biz){
      if(!biz.reviews) biz.reviews = { positive:0, neutral:0, negative:0 };
      if(choice.review && biz.reviews[choice.review] !== undefined) biz.reviews[choice.review]++;
    }
    // ★ v0.14 [사마의 3순위] 위기 대응 카운터: 부정(회피)이 아니면 "책임지고 수습"으로 인정
    if(choice.review && choice.review !== 'negative'){
      s.wiseCrisisCount = (s.wiseCrisisCount||0) + 1;
    }
    // ★ v0.12 [사마의 2순위] 위기를 겪은 직원의 성장
    //   좋은 대응(긍정)일수록 많이 배운다: positive +15exp, neutral +8, negative +3(그래도 겪었으니 조금)
    let empGrew = null;
    if(empId && biz){
      const e = (biz.employees||[]).find(x=>x.id===empId);
      if(e && (e.level||1) < 100){
        if(e.levelExp===undefined) e.levelExp=0;
        const expMap = { positive:15, neutral:8, negative:3 };
        const gain = expMap[choice.review] !== undefined ? expMap[choice.review] : 8;
        e.levelExp += gain;
        let leveled = false;
        while(e.levelExp >= (20 + (e.level||1)*2) && (e.level||1) < 100){
          e.levelExp -= (20 + (e.level||1)*2); e.level=(e.level||1)+1; leveled=true;
        }
        empGrew = { name:e.name, gain:gain, leveled:leveled, newLevel:e.level };
      }
    }
    return { result: choice.result, cost: choice.cost||0, rep: choice.rep||0, review: choice.review, empGrew:empGrew, damage:damage };
  }

  // ★ v0.19 [기둥3] 규모 점수(Scale) — 명세 §2.1
  function getScale(s){
    const hq = (s.headquarters && s.headquarters.established) ? (s.headquarters.level||0) : 0;
    const bizLevelSum = s.businesses.filter(b=>b.unlocked).reduce((a,b)=>a+(b.level||1),0);
    const allEmps = s.businesses.flatMap(b=>(b.employees||[]).filter(e=>!e.isCEO));
    const avgEmpLv = allEmps.length ? allEmps.reduce((a,e)=>a+(e.level||1),0)/allEmps.length : 0;
    const nw = window.MJY.gameState.getNetWorth();
    const nwTier = Math.min(30, Math.max(0, nw/100000000*5));  // 1억당 +5, 상한 30
    return hq*3 + bizLevelSum/3 + avgEmpLv/10 + nwTier;
  }
  // 주력 티어 (Scale 구간)
  function mainTier(scale){
    if(scale < 10) return 1;
    if(scale < 30) return 2;
    if(scale < 60) return 3;
    return 4;
  }
  // ★ Q1-나: 비율 혼합 티어 선택 (주력 70% + 인접 20% + 그아래 10%, 사마의: 낮은 티어 0 안 됨)
  function pickTier(scale){
    const main = mainTier(scale);
    const r = Math.random();
    if(main === 1) return 1;  // 영세는 항상 T1
    if(r < 0.7) return main;
    if(r < 0.9) return main - 1;
    return Math.max(1, main - 2);
  }
  // ★ Q2-나: Scale 연속 비례 피해 배수
  function getDamageMul(s){
    const scale = getScale(s);
    return Math.max(1, Math.pow(1 + scale/10, 1.6));
  }
  // 티어별 위기 풀에서 뽑기 (업종 우선, _default 폴백)
  function getTierPool(tier, cat){
    if(tier <= 1) return getInteractionPool(cat);  // 기존 Tier1
    const t = TIER_INTERACTIONS[tier];
    if(!t) return getInteractionPool(cat);
    return t[cat] || t._default || getInteractionPool(cat);
  }

  // ★ v0.17 [위기·방어·행운 기둥1] 숙련도(Competence) — 명세 §3
  //   봇 평균레벨×컨디션 + 직원 평균레벨/20 + 사고방지 스킬. 높을수록 위기가 덜 자주 온다.
  function getCompetence(biz){
    if(!biz) return 0;
    let score = 0;
    const bots = biz.bots || [];
    const emps = (biz.employees || []).filter(e => !e.isCEO);
    if(bots.length){
      score += bots.reduce((a,bot)=> a + (bot.level||1) * ((bot.condition||100)/100), 0) / bots.length;
    }
    if(emps.length){
      score += emps.reduce((a,e)=> a + (e.level||1), 0) / emps.length / 20;
    }
    // 사고방지 스킬 보유 직원 수만큼 가산 (방어적 숙련)
    const pe = window.MJY.payrollEngine;
    if(pe){
      for(const e of emps){ if(pe.hasSkill(e,'no_accident')) score += 1; }
    }
    return score;
  }
  // 위기 발생 간격(ms): 18초 + 숙련도×2초, 상한 30초 (사마의 경계1: 위기는 사라지지 않음)
  function getCrisisIntervalMs(s){
    const biz = pickActiveBiz(s);
    const comp = getCompetence(biz);
    const sec = Math.min(30, 18 + comp * 2);
    return sec * 1000;
  }

  // ★ v0.18 [기둥2] 방어 수치(Defense) — 명세 §2.2, 0~100 정규화
  //   흩어진 방어 요소(사고방지·베테랑·법무/세무팀·봇컨디션·patience)를 하나로 (사마의 "흩어진 것을 모으는 눈")
  function getDefense(s, biz){
    if(!biz) return 0;
    const pe = window.MJY.payrollEngine;
    const emps = (biz.employees||[]).filter(e=>!e.isCEO);
    let def = 0;
    // 1) 사고방지 스킬 (직원당 +12)
    if(pe){ for(const e of emps){ if(pe.hasSkill(e,'no_accident')) def += 12; } }
    // 2) 베테랑 버프 (직원당 +8)
    if(pe){ for(const e of emps){ if(pe.hasBuff(e,'veteran')) def += 8; } }
    // 3) 법무·세무팀 인원 (전사, 팀당 인원×6 — 악재 완화의 방어화)
    const depts = s.departments || {};
    const legalN = (depts.legal||[]).length, taxN = (depts.tax||[]).length;
    def += (legalN + taxN) * 6;
    // 4) 봇 컨디션 평균 (최대 +20)
    const bots = biz.bots||[];
    if(bots.length){ const avgCond = bots.reduce((a,b)=>a+(b.condition||100),0)/bots.length; def += avgCond/100 * 20; }
    // 5) 직원 patience 평균 (최대 +15; patience 0~5 가정)
    if(emps.length){ const avgPat = emps.reduce((a,e)=>a+(e.patience||0),0)/emps.length; def += Math.min(15, avgPat/5*15); }
    return Math.max(0, Math.min(100, def));
  }

  // ★ v0.18 [기둥2] 행운 계수 — 명세 §2.3, 0.6~1.4 (평균 1.0, ±40%)
  function rollLuck(){
    return 0.6 + Math.random() * 0.8;  // 0.6 ~ 1.4
  }

  // ★ v0.18 [기둥2] 위기 피해 판정 — 명세 §2.3 핵심 공식 (방어 8 : 운 2)
  //   최종피해 = 기본피해 × (1 - Defense/100×0.8) × 행운계수
  //   반환: { finalCost, defenseReduction(%), luck, verdict('lucky'|'normal'|'direct') }
  function resolveCrisisDamage(s, biz, baseCost){
    const defense = getDefense(s, biz);
    const defenseReduction = defense / 100 * 0.8;   // 최대 80% 경감
    const luck = rollLuck();                         // 0.6~1.4
    // ★ v0.19 [기둥3] Scale 연속 비례 — 규모 클수록 기본피해도 커짐 (명세 §4)
    const scaledBase = baseCost * getDamageMul(s);
    let finalCost = Math.round(scaledBase * (1 - defenseReduction) * luck);
    finalCost = Math.max(0, finalCost);
    let verdict = 'normal';
    if(luck < 0.8) verdict = 'lucky';
    else if(luck > 1.2) verdict = 'direct';
    return { finalCost, defense, defenseReduction, luck, verdict, baseCost: Math.round(scaledBase) };
  }

  return { getFlowPool, getInteractionPool, nextFlowMessage, rollInteraction, applyChoice, pickActiveBiz, getCompetence, getCrisisIntervalMs, getDefense, rollLuck, resolveCrisisDamage, getScale, mainTier, pickTier, getDamageMul, getTierPool };
})();

    {id:'gate_expansion', tier:'gate', title:'제국의 시작', desc:'사장이 새 사업체를 확장', reward:{gems:80}, prereq:['gate_ceo']},
  ];

  function getDef(id){ return QUEST_DEFS.find(q=>q.id===id); }

  // 퀘스트 진행 상태 보장 (없으면 초기화)
  function ensureState(s){
    if(!s.quests) s.quests = {};
    for(const def of QUEST_DEFS){
      if(!s.quests[def.id]){
        // pending(대화 등 미구현)은 locked, prereq 없으면 active, 있으면 locked
        let st = 'locked';
        if(def.pending) st = 'locked';
        else if(def.prereq.length === 0) st = 'active';
        s.quests[def.id] = { status: st, progress: 0 };
      }
    }
  }

  // prereq 충족 시 locked → active 승격
  function unlockByPrereq(s){
    for(const def of QUEST_DEFS){
      const q = s.quests[def.id];
      if(!q || q.status !== 'locked' || def.pending) continue;
      if(def.prereq.length>0 && def.prereq.every(pid => s.quests[pid] && (s.quests[pid].status==='done'||s.quests[pid].status==='claimed'))){
        q.status = 'active';
      }
    }
  }

  // 조건 평가: active 퀘스트가 달성됐는지 검사 → done 전환. 새로 done된 id 목록 반환
  function evaluate(s){
    ensureState(s);
    unlockByPrereq(s);
    const gs = window.MJY.gameState;
    const pe = window.MJY.payrollEngine;
    const newlyDone = [];
    const allEmps = [];
    for(const b of s.businesses){ for(const e of (b.employees||[])) allEmps.push(e); }
    const checks = {
      tut_first_bot: () => s.businesses.some(b=>(b.bots||[]).length>0),
      tut_first_alba: () => allEmps.length>0,
      tut_assign_task: () => allEmps.some(e=>e.task==='hall'||e.task==='kitchen'||e.task==='delivery'),
      tut_first_profit: () => (s._lastNetProfit||0) > 0,
      tut_lv10: () => allEmps.some(e=>(e.level||1)>=10),
      ch_first_lv50: () => allEmps.some(e=>(e.level||1)>=50),
      ch_no_accident: () => (s.questAccident0Streak||0) >= 5,
      ch_three_biz: () => s.businesses.filter(b=>b.unlocked).length>=3,
      ch_first_expert: () => allEmps.some(e=>e.isExpert || (e.level||1)>=100),
      ch_diversity: () => {
        const botTypes = new Set(); const grades = new Set();
        for(const b of s.businesses){ for(const bot of (b.bots||[])) botTypes.add(bot.type); for(const e of (b.employees||[])) grades.add(e.grade); }
        return botTypes.size>=3 && grades.size>=3;
      },
      ch_dept_full: () => { if(!s.departments) return false; return Object.values(s.departments).some(arr=>(arr||[]).length>=3); },
      // ★ v0.14 [사마의 3순위]
      ch_reputation: () => (s.reputation||50) >= 70,
      ch_good_reviews: () => s.businesses.reduce((sum,b)=>sum + ((b.reviews&&b.reviews.positive)||0), 0) >= 20,
      ch_wise_crisis: () => (s.wiseCrisisCount||0) >= 5,
      gate_hq: () => s.headquarters && s.headquarters.established,
      gate_dept: () => s.headquarters && s.headquarters.established && (s.headquarters.level||0)>=2,
      gate_ceo: () => s.businesses.some(b=>b.managedByCEO),
      gate_expansion: () => (s._ceoExpansionDone||false),
    };
    for(const def of QUEST_DEFS){
      const q = s.quests[def.id];
      if(!q || q.status !== 'active') continue;
      const fn = checks[def.id];
      if(fn && fn()){ q.status = 'done'; newlyDone.push(def.id); }
    }
    // 이번 평가에서 done된 퀘스트의 후속 prereq를 즉시 승격 (래그 제거)
    if(newlyDone.length > 0) unlockByPrereq(s);
    // ★ v0.25 TYPE A 카테고리 자동 해금 체크 (분기 종료 시)
    if (window.MJY && window.MJY.gameState && window.MJY.gameState.checkCategoryUnlocks) {
      const newCats = window.MJY.gameState.checkCategoryUnlocks();
      if (newCats && newCats.length > 0) {
        newCats.forEach(cat => {
          setTimeout(() => {
            if (typeof toast !== 'undefined') {
              toast.show('🔓 ' + cat.emoji + ' ' + cat.label + ' 해금!', '#a3e635');
            }
          }, 800);
        });
      }
    }
    return newlyDone;
  }

  // 보상 수령 (done → claimed, 보석/경험치 지급)
  function claim(s, questId){
    const q = s.quests[questId]; const def = getDef(questId);
    if(!q || !def || q.status !== 'done') return {ok:false};
    q.status = 'claimed';
    if(def.reward.gems){ s.gems = (s.gems||0) + def.reward.gems; }
    if(def.reward.exp){
      // 대표 사업체에 bizExp 지급
      const b0 = s.businesses.find(b=>b.unlocked);
      if(b0 && window.MJY.gameState.addBizExp) window.MJY.gameState.addBizExp(b0, def.reward.exp, 'quest');
    }
    return {ok:true, reward:def.reward};
  }

  function getActive(s){ ensureState(s); return QUEST_DEFS.filter(d=>s.quests[d.id] && (s.quests[d.id].status==='active'||s.quests[d.id].status==='done')); }
  function getByTier(s, tier){ ensureState(s); return QUEST_DEFS.filter(d=>d.tier===tier); }
  function getStatus(s, id){ ensureState(s); return s.quests[id] ? s.quests[id].status : 'locked'; }
  function countClaimable(s){ ensureState(s); return QUEST_DEFS.filter(d=>s.quests[d.id] && s.quests[d.id].status==='done').length; }

  return { QUEST_DEFS, getDef, ensureState, evaluate, claim, getActive, getByTier, getStatus, countClaimable };
})();

     revMul:1.0,costMul:1.0,hallDelta:0,deliveryDelta:0,cashDelta:0,posneg:'positive',
     trigger:{type:'profit',op:'gte',value:100_000_000},
     bizEvent:{type:'angel_invest'},
     choicePrompt:'단골 손님이 3000만 투자를 제안합니다!',
     choices:[
       {label:'수락 (지분 20% 제공)',key:'accept',cashDelta:30_000_000,effect:{msg:'3000만 투자 유치! 지분 20% 이전'}},

     ]},
  ];

  // 희귀도별 가중치 (총 100)
  const RARITY_WEIGHTS = {common:60, uncommon:25, rare:12, legendary:3};

  // 분기 → 연도 매핑: 5분기마다 +5년, 시작 1985
  function getYearFromQuarter(q){
    return 1985 + Math.floor((q-1)/5) * 5;
  }

  // 연도 → 시대 매핑
  function getEraFromYear(y){
    if(y < 1990) return '1980s';
    if(y < 2000) return '1990s';
    if(y < 2010) return '2000s';
    if(y < 2020) return '2010s';
    return '2020s';
  }

  // 사건이 현재 시대에 발생 가능한가?
  function isEraMatch(event, currentEra){
    if(event.era === 'all') return true;
    return event.era === currentEra;
  }

  // ★ v0.8.1 트리거 조건 체크
  // event.trigger 형식: {type, op, value}
  //  - type: 'profit'(누적이익) | 'debt'(총부채) | 'quarter'(분기) | 'cash'(현금)
  //  - op: 'gte'(이상) | 'lte'(이하)
  //  - value: 기준값
  // trigger 없으면 항상 통과
  function checkTrigger(event, s){
    if(!event.trigger) return true;
    const t = event.trigger;
    let stat = 0;
    if(t.type === 'profit') stat = s.cumulativeProfit || 0;
    else if(t.type === 'debt'){
      stat = (s.loans ? (s.loans.bank1+s.loans.bank2+s.loans.loanShark+s.loans.yongpali) : 0);
    }
    else if(t.type === 'quarter') stat = s.quarter || 1;
    else if(t.type === 'cash') stat = s.cash || 0;
    else return true;
    if(t.op === 'gte') return stat >= t.value;
    if(t.op === 'lte') return stat <= t.value;
    return true;
  }

  // 분기별 사건 추첨 (최대 1개)
  function drawEvent(s){
    if(!s.activeEvents) s.activeEvents = [];
    if(s.activeEvents.length >= 3) return null; // 동시 최대 3개

    const currentEra = getEraFromYear(getYearFromQuarter(s.quarter));
    // ★ v0.8.1 시대 + 트리거 조건 + 중복 제거 필터링
    const pool = EVENTS.filter(e =>
      isEraMatch(e, currentEra) &&
      checkTrigger(e, s) &&
      !s.activeEvents.find(ae => ae.id === e.id)
    );
    if(pool.length === 0) return null;

    // ★ v0.8.1 발생 확률: 기본 60%, 부채 많으면 악재 가중 (체감용 발생률↑)
    let baseChance = 0.6;
    const totalDebt = s.loans ? (s.loans.bank1+s.loans.bank2+s.loans.loanShark+s.loans.yongpali) : 0;
    if(totalDebt > 100_000_000) baseChance = 0.7; // 1억 초과 부채 시 사건 빈도↑
    if(Math.random() > baseChance) return null;

    // ★ v0.8.1 악재/긍정 풀 분리 (부채 많으면 악재 비중↑, 이익 많으면 긍정 비중↑)
    const negPool = pool.filter(e => e.posneg === 'negative');
    const posPool = pool.filter(e => e.posneg === 'positive');
    let chosenPool = pool;
    const profit = s.cumulativeProfit || 0;
    if(totalDebt > 500_000_000 && negPool.length > 0){
      // 부채 5억 초과: 70% 확률로 악재 풀에서
      if(Math.random() < 0.7) chosenPool = negPool;
    } else if(profit > 100_000_000 && posPool.length > 0){
      // 누적이익 1억 초과: 60% 확률로 긍정 풀에서
      if(Math.random() < 0.6) chosenPool = posPool;
    }
    if(chosenPool.length === 0) chosenPool = pool;

    // ★ v0.8.1 트리거 통과 사건은 추첨 풀에 가중 복제 (성장 보상 체감↑)
    // 조건을 만족해 "열린" 사건이 더 자주 등장하도록 2배 가중
    const weighted = [];
    chosenPool.forEach(e => {
      weighted.push(e);
      if(e.trigger) weighted.push(e); // 트리거 사건 2배 가중
    });
    chosenPool = weighted;

    // 희귀도별로 풀 분류
    const byRarity = {common:[], uncommon:[], rare:[], legendary:[]};
    chosenPool.forEach(e => { if(byRarity[e.rarity]) byRarity[e.rarity].push(e); });

    // 가중치 추첨
    const totalWeight = Object.entries(RARITY_WEIGHTS).reduce((sum,[k,w]) => sum + (byRarity[k].length > 0 ? w : 0), 0);
    if(totalWeight === 0) return null;
    let r = Math.random() * totalWeight;
    let pickedRarity = 'common';
    for(const [k,w] of Object.entries(RARITY_WEIGHTS)){
      if(byRarity[k].length === 0) continue;
      if(r < w){ pickedRarity = k; break; }
      r -= w;
    }
    const subPool = byRarity[pickedRarity];
    return subPool[Math.floor(Math.random() * subPool.length)];
  }

  // ★ v0.27 bizEvent 처리 — 봇 고장·임대료 인상 실제 적용
  function applyBizEvents(s) {
    if (!s.activeEvents || !s.businesses) return;
    s.activeEvents.forEach(ev => {
      if (!ev.bizEvent) return;
      const biz = s.businesses.find(b => b.unlocked);
      if (!biz) return;
      const be = ev.bizEvent;
      // 봇 고장: 랜덤 봇 컨디션 0
      if (be.type === 'bot_breakdown' && biz.bots && biz.bots.length > 0) {
        const idx = Math.floor(Math.random() * biz.bots.length);
        biz.bots[idx].condition = Math.max(0, biz.bots[idx].condition - 80);
      }
      if (be.type === 'bot_breakdown_chain' && biz.bots && biz.bots.length > 0) {
        const count = Math.min(2, biz.bots.length);
        biz.bots.slice().sort(()=>Math.random()-0.5).slice(0,count)
          .forEach(b => { b.condition = Math.max(0, b.condition - 80); });
      }
      // 임대료 인상: operationCost 영구 증가 (한 번만)
      if (be.type === 'rent_hike' && !ev._rentApplied) {
        biz.operationCost = Math.floor((biz.operationCost || 500_000) * (1 + (be.costIncrease || 0.25)));
        ev._rentApplied = true;
      }
    });
  }

  // 분기 진행: 사건 추첨 + 만료 처리 + 즉시 효과
  function processEventsOnQuarter(s){
    if(!s.activeEvents) s.activeEvents = [];
    const log = {newEvents:[], expired:[], cashDelta:0};

    // 1. 기존 사건 만료 처리 (분기 단위 차감) — 신규 추첨 전에 먼저
    s.activeEvents = s.activeEvents.filter(ev => {
      // 구버전 호환: remainingQuarters 없으면 days 기반 보충
      if(ev.remainingQuarters === undefined){
        ev.remainingQuarters = ev.remainingDays >= 9999 ? 99 : Math.max(1, Math.round((ev.remainingDays||ev.days||30)/30));
      }
      ev.remainingQuarters -= 1;
      if(ev.remainingQuarters <= 0){
        log.expired.push(ev);
        return false;
      }
      return true;
    });

    // 2. 새 사건 추첨 (만료 처리 후, 이번 분기부터 효과 발휘)
    const newE = drawEvent(s);
    if(newE){
      // 지속 분기 수 계산: days를 분기(약 30일 체감)로 환산, 최소 1분기, 9999(영구)는 99분기
      let durationQ;
      if(newE.days >= 9999) durationQ = 99;
      else durationQ = Math.max(1, Math.round(newE.days / 30));
      const inst = Object.assign({}, newE, {remainingQuarters:durationQ, remainingDays:newE.days, startQuarter:s.quarter});
      s.activeEvents.push(inst);
      log.newEvents.push(inst);
      // 일회성 현금 변동 즉시 적용
      if(newE.cashDelta && newE.cashDelta !== 0){
        s.cash += newE.cashDelta;
        log.cashDelta += newE.cashDelta;
      }
    }

    // ★ v0.27 bizEvent 실제 효과 적용 (봇 고장·임대료)
    applyBizEvents(s);
    return log;
  }

  // ★ v0.9.3 세무/법무팀 사건 완화: 악재(불리한 배율)를 1.0 쪽으로 당김
  function mitigateMul(mul, category, isCost){
    const gs = window.MJY.gameState;
    if(!gs || !gs.getDeptEventMitigation) return mul;
    const m = gs.getDeptEventMitigation(category);
    if(m <= 0) return mul;
    // 매출 악재: mul<1 (예: 0.6) → 1쪽으로 완화. 비용 악재: mul>1 (예: 1.1) → 1쪽으로 완화
    if(isCost){ if(mul > 1.0) return 1.0 + (mul - 1.0) * (1 - m); }
    else { if(mul < 1.0) return 1.0 - (1.0 - mul) * (1 - m); }
    return mul;
  }
  // 활성 사건들의 매출 배율 누적 (세무/법무 완화 반영)
  function getRevMultiplier(s){
    if(!s.activeEvents || s.activeEvents.length === 0) return 1.0;
    return s.activeEvents.reduce((m, e) => m * mitigateMul(e.revMul || 1.0, e.category, false), 1.0);
  }
  // 활성 사건들의 비용 배율 누적 (세무/법무 완화 반영)
  function getCostMultiplier(s){
    if(!s.activeEvents || s.activeEvents.length === 0) return 1.0;
    return s.activeEvents.reduce((m, e) => m * mitigateMul(e.costMul || 1.0, e.category, true), 1.0);
  }

  return {
    EVENTS, RARITY_WEIGHTS,
    getYearFromQuarter, getEraFromYear, checkTrigger,
    drawEvent, processEventsOnQuarter,
    getRevMultiplier, getCostMultiplier,
  };
})();

/* ─── interestEngine ─── */
window.MJY.interestEngine = (function(){
  // ★ v0.26 용팔이 이자: 원금 구간별 복리율 (사마의 설계)
  const RATES = {bank1:0.01, bank2:0.05, loanShark:0.20, yongpali:0.50};
  function getYongpaliRate(principal) {
    if (principal < 100_000_000)         return 0.005; // 1억 미만: 0.5%/분기
    if (principal < 10_000_000_000)      return 0.015; // 1억~100억: 1.5%
    if (principal < 1_000_000_000_000)   return 0.030; // 100억~1조: 3%
    return 0.050;                                       // 1조 이상: 5% (복리 공포)
  }
  const CREDIT_LADDER = ['D','CCC','BB','BBB','A','AA','AAA'];
  const GAMEOVER = 1_000_000_000_000_000;
  const ENDING = 1_000_000_000_000_000;
  const YONGPALI_SEED = 1_000_000_000_000;
  const ALERTS = [{threshold:0,name:'SAFE',level:0},{threshold:100_000_000,name:'LV1',level:1},{threshold:1_000_000_000_000,name:'LV2',level:2},{threshold:100_000_000_000_000,name:'LV3',level:3},{threshold:800_000_000_000_000,name:'LV4',level:4},{threshold:999_000_000_000_000,name:'LV5',level:5},{threshold:1_000_000_000_000_000,name:'LV6',level:6}];
  function downgrade(s){const i=CREDIT_LADDER.indexOf(s.creditGrade);if(i>0){const b=s.creditGrade;s.creditGrade=CREDIT_LADDER[i-1];return{from:b,to:s.creditGrade};}return null;}
  function getAlert(a){let r=ALERTS[0];for(let i=0;i<ALERTS.length;i++)if(a>=ALERTS[i].threshold)r=ALERTS[i];return r;}
  function apply(s){
    const cb=s.cash;
    // ★ v0.26 용팔이 구간별 이자율 적용
    const yongpaliRate = getYongpaliRate(s.loans.yongpali);
    const due={
      bank1:     Math.floor(s.loans.bank1     * RATES.bank1),
      bank2:     Math.floor(s.loans.bank2     * RATES.bank2),
      loanShark: Math.floor(s.loans.loanShark * RATES.loanShark),
      yongpali:  Math.floor(s.loans.yongpali  * yongpaliRate),
    };
    const paid={bank1:0,bank2:0,loanShark:0,yongpali:0};
    const unpaid={bank1:0,bank2:0,loanShark:0,yongpali:0};
    const pen=[];
    for(const tier of ['yongpali','loanShark','bank2','bank1']){
      if(s.loans[tier]===0)continue;
      const owed=due[tier]; if(owed===0)continue;
      if(s.cash>=owed){s.cash-=owed;paid[tier]=owed;}
      else{
        const p=s.cash;s.cash=0;paid[tier]=p;unpaid[tier]=owed-p;
        s.loans[tier]+=unpaid[tier];
        if(tier==='bank1'){const d=downgrade(s);pen.push({type:'credit_downgrade',tier,unpaidAmount:unpaid.bank1,downgrade:d});}
        else if(tier==='bank2'){s.loans.loanShark+=s.loans.bank2;const tr=s.loans.bank2;s.loans.bank2=0;pen.push({type:'forced_loan_shark',tier,unpaidAmount:unpaid.bank2,transferredAmount:tr});}
        else if(tier==='loanShark'){
          if(s.loans.yongpali===0){
            // ★ v0.28 용팔이 강제 진입: 선이자 20% 차감 후 기존 사채 원금 이전
            // 용팔이 원금 = 기존 사채 잔액 (이미 빌린 돈)
            const yongSeed = Math.max(YONGPALI_SEED, s.loans.loanShark);
            s.loans.yongpali = yongSeed;
            s.loans.loanShark = 0;  // 사채 → 용팔이로 강제 이전

            s.loanUnlocked = s.loanUnlocked || {};

            pen.push({type:'yongpali_appeared',tier,unpaidAmount:unpaid.loanShark,seedAmount:yongSeed,gemsGiven:100});

            s.loans.yongpali += unpaid.loanShark * 2;

    s.yongpaliAccumInterest += paid.yongpali;

    // 게임오버 근접 경고음 (누적이자 800조 이상)
    if (s.yongpaliAccumInterest >= 800_000_000_000_000 && s.yongpaliAccumInterest < 1_000_000_000_000_000) {
      s._yongpaliDangerFlag = true;
    }
    return {quarter:s.quarter,interestDue:due,interestPaid:paid,interestUnpaid:unpaid,penaltiesTriggered:pen,cashBefore:cb,cashAfter:s.cash,yongpaliAccumInterest:s.yongpaliAccumInterest,alertLevel:getAlert(s.yongpaliAccumInterest)};
  }
  function checkEnd(s){
    // 종료 조건은 두 가지뿐: 용팔이 누적이자 1000조(패) / 순자산 1000조(승)
    if(s.yongpaliAccumInterest>=GAMEOVER)return{ended:true,type:'gameover'};

    return{ended:false,type:null};
  }
  return {applyQuarterlyInterest:apply,checkEndGame:checkEnd,getYongpaliAlertLevel:getAlert,RATES};
})();

  function hire(s,bid){const b=s.businesses.find(bb=>bb.id===bid);if(!b)return{ok:false};if(b.employees.length>=b.maxEmployees)return{ok:false,reason:'max'};const e=window.MJY.gameState.createEmployee(bid,'part_time');b.employees.push(e);return{ok:true,employee:e};}
  function fire(s,bid,eid){
    const b=s.businesses.find(bb=>bb.id===bid);if(!b)return{ok:false};
    const idx=b.employees.findIndex(e=>e.id===eid);if(idx<0)return{ok:false};
    const e=b.employees[idx]; const sal=SALARY[e.grade]||0;
    if(s.cash>=sal){s.cash-=sal;b.employees.splice(idx,1);return{ok:true,severance:sal};}
    return{ok:false,reason:'cash',required:sal};
  }

  // ★ v0.9.1 명성 변동 헬퍼 (0~100 클램프, 충성 버프 시 하락 무효)
  function changeReputation(s, delta, emp){
    if(s.reputation === undefined) s.reputation = 50;
    // 충성(loyal) 버프 보유 직원 관련 하락은 무효
    if(delta < 0 && emp && hasBuff(emp,'loyal')) return;

  function approvePromotion(s, bid, eid){
    const b = s.businesses.find(bb=>bb.id===bid); if(!b) return {ok:false};
    const e = b.employees.find(ee=>ee.id===eid); if(!e) return {ok:false};
    if(!e.pendingPromotion) return {ok:false, reason:'no_request'};
    const gradeIdx = GRADE_CHAIN.indexOf(e.grade);
    if(gradeIdx >= GRADE_CHAIN.length-1) return {ok:false, reason:'max_grade'};
    const before = e.grade;
    e.grade = GRADE_CHAIN[gradeIdx+1];
    e.gradeChangedAtQuarter = s.quarter;
    // 레벨 1 리셋, 능력치(cooking/serving/patience)는 유지
    e.level = 1; e.levelExp = 0;
    e.lastPromoLevel = 0;  // 새 등급에서 다시 Lv50부터 승급 요청

    const skill = PROMO_SKILLS[e.promotionCount] || PROMO_SKILLS[PROMO_SKILLS.length-1];
    if(skill && !hasSkill(e, skill.key)) e.skills.push({key:skill.key, name:skill.name, desc:skill.desc});
    e.promotionCount = (e.promotionCount||0) + 1;
    e.pendingPromotion = false;
    e.satisfaction = Math.min(100, e.satisfaction + 30);
    changeReputation(s, +5, e);
    return {ok:true, from:before, to:e.grade, skill:skill};
  }

  // ★ v0.9.1 승급 거절: rapport 연동 랜덤 → 사직 OR 계속근무
  function refusePromotion(s, bid, eid){
    const b = s.businesses.find(bb=>bb.id===bid); if(!b) return {ok:false};
    const e = b.employees.find(ee=>ee.id===eid); if(!e) return {ok:false};
    if(!e.pendingPromotion) return {ok:false, reason:'no_request'};
    e.pendingPromotion = false;
    // 사직 확률: 기본 30% + rapport<31 +20%p + rapport>70 -15%p + 끈기버프 -10%p
    let quitChance = 0.30;
    const rap = e.rapport !== undefined ? e.rapport : 50;
    if(rap < 31) quitChance += 0.20;
    if(rap > 70) quitChance -= 0.15;
    if(hasBuff(e,'grit')) quitChance -= 0.10;
    quitChance = Math.max(0.05, Math.min(0.60, quitChance));
    if(Math.random() < quitChance){
      // 사직서 제출 → 퇴사 + 명성 -10
      b.employees = b.employees.filter(ee=>ee.id!==eid);
      changeReputation(s, -10, e);
      return {ok:true, outcome:'quit', employeeName:e.name};
    } else {
      // 계속근무 → 급여 10% 인상(복리) + 명성 -2
      e.salaryMul = (e.salaryMul || 1.0) * 1.1;
      e.refusedContinue = (e.refusedContinue||0) + 1;
      changeReputation(s, -2, e);
      return {ok:true, outcome:'stay', employeeName:e.name, salaryMul:e.salaryMul};
    }
  }

  return {processQuarter,hireEmployee:hire,fireEmployee:fire,SALARY,GRADE_CHAIN,PROMO_LEVELS,PROMO_SKILLS,BUFF_MAP,hasSkill,hasBuff,approvePromotion,refusePromotion,changeReputation,STAT_CAP_BY_GRADE,TASK_STAT_GROWTH};
})();

window.MJY.reportBuilder = (function(){
  function build(s,pr,ir){
    const rev=window.MJY.gameState.getQuarterlyRevenue();
    let rd=0;for(const bid of Object.keys(pr.perBusinessAccidentLoss))rd+=pr.perBusinessAccidentLoss[bid].revenueDelta;
    const aRev=rev+rd;
    const op=window.MJY.gameState.getQuarterlyOperationCost();
    let od=0;for(const bid of Object.keys(pr.perBusinessAccidentLoss))od+=pr.perBusinessAccidentLoss[bid].operationCost;
    const aOp=op+od;
    const tip=ir.interestPaid.bank1+ir.interestPaid.bank2+ir.interestPaid.loanShark+ir.interestPaid.yongpali;
    const tiu=ir.interestUnpaid.bank1+ir.interestUnpaid.bank2+ir.interestUnpaid.loanShark+ir.interestUnpaid.yongpali;
    const opr=aRev-aOp-pr.laborCost;
    const np=opr-tip;
    return {quarter:s.quarter,revenue:aRev,revenueDelta:rd,operationCost:aOp,operationCostDelta:od,laborCost:pr.laborCost,operatingProfit:opr,totalInterestPaid:tip,totalInterestUnpaid:tiu,netProfit:np,payrollReport:pr,interestReport:ir};
  }
  return {build};
})();

/* ─── 렌더 함수 ─── */
function drawSprite(ctx, sprite, x, y, scale, paletteOverride) {
  if (!sprite) return;
  const data = sprite.data;
  const palette = paletteOverride || sprite.palette;
  for (let row = 0; row < data.length; row++) {
    for (let col = 0; col < data[row].length; col++) {
      const c = data[row][col];
      const color = palette[c];
      if (!color) continue;
      ctx.fillStyle = color;
      ctx.fillRect(Math.floor(x + col*scale), Math.floor(y + row*scale), scale, scale);
    }
  }
}

    E: emp.hairColor  || '#3b2314',

    H: gradeShoes[emp.grade]   || '#1e293b',
    I: '#b45309',

    '.': null,
  };

  // ★ v0.24 헤어 타입별 오버라이드 렌더링
  const ht = emp.hairType || 'short';

    ? window.MJY.gameState.EMP_HAIR_VARIANTS : null;
  const variant = variants ? variants[ht] : null;

  if (!variant || !variant.overrides) {
    // 기본(단발) — 그대로

    drawSprite(ctx, { data: overrideData }, x, y, scale, palette);
  }
}

function drawPixelBox(ctx, x, y, w, h, fillColor, borderColor) {
  ctx.fillStyle = fillColor || '#252540'; ctx.fillRect(x+2, y+2, w-4, h-4);
  ctx.fillStyle = borderColor || '#3a3a5a';
  ctx.fillRect(x+2, y, w-4, 2); ctx.fillRect(x+2, y+h-2, w-4, 2);
  ctx.fillRect(x, y+2, 2, h-4); ctx.fillRect(x+w-2, y+2, 2, h-4);
  ctx.fillRect(x+1, y+1, 1, 1); ctx.fillRect(x+w-2, y+1, 1, 1);
  ctx.fillRect(x+1, y+h-2, 1, 1); ctx.fillRect(x+w-2, y+h-2, 1, 1);
}

function drawPixelButton(ctx, x, y, w, h, label, isPrimary, isDisabled, customColor) {
  const fill = isDisabled ? '#1a1a2e' : (customColor || (isPrimary ? '#dc2626' : '#3a3a5a'));
  const shadow = isDisabled ? '#0f0f1e' : (isPrimary ? '#7f1d1d' : '#1a1a2e');
  ctx.fillStyle = shadow; ctx.fillRect(x, y+2, w, h-2);
  ctx.fillStyle = fill; ctx.fillRect(x, y, w, h-4);
  ctx.fillStyle = isDisabled ? '#252540' : (isPrimary ? '#ef4444' : '#4a4a6a');
  ctx.fillRect(x+2, y+2, w-4, 2);
  const btnFontSize = Math.max(22, Math.floor(h * 0.42));
  ctx.font = 'bold ' + btnFontSize + 'px sans-serif';
  ctx.fillStyle = isDisabled ? '#6b7280' : '#ffffff';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, x+w/2, y+h/2);
}

function drawShadow(ctx, x, y, w) {
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  for (let i = 0; i < 3; i++) ctx.fillRect(x-i, y+i, w+i*2, 2);
}

// 능력치 별 표시 (★)
function drawStars(ctx, x, y, value, max) {
  max = max || 5;
  for (let i = 0; i < max; i++) {
    ctx.fillStyle = i < value ? '#facc15' : '#374151';
    ctx.fillRect(x + i*10, y, 8, 8);
    // 별 모양 효과 (작은 다이아몬드)
    ctx.fillStyle = i < value ? '#fde047' : '#1f2937';
    ctx.fillRect(x + i*10 + 3, y + 1, 2, 6);
    ctx.fillRect(x + i*10 + 1, y + 3, 6, 2);
  }
}

// 가로 진척 바 (만족도, 컨디션)
function drawBar(ctx, x, y, w, h, val, max, fillColor) {
  drawPixelBox(ctx, x, y, w, h, '#0f172a', '#374151');
  const ratio = Math.max(0, Math.min(1, val/max));
  ctx.fillStyle = fillColor || (ratio > 0.6 ? '#a3e635' : ratio > 0.3 ? '#fbbf24' : '#dc2626');
  ctx.fillRect(x+3, y+3, (w-6) * ratio, h-6);
}

// ★ v0.47 G 표기 시스템 — 1원 = 1G
function fmtG(n) {
  if (n === undefined || n === null) return '0G';
  if (n === 0) return '0G';
  const a = Math.abs(n), sg = n < 0 ? '-' : '';
  const fmt = (v) => v % 1 === 0 ? v.toFixed(0) : v.toFixed(1);
  if (a >= 1e9)  return sg + fmt(a/1e9)  + 'BG';
  if (a >= 1e6)  return sg + fmt(a/1e6)  + 'MG';
  if (a >= 1e3)  return sg + fmt(a/1e3)  + 'KG';
  return sg + Math.floor(a) + 'G';
}
// fmtWon은 fmtG의 래퍼 (기존 코드 호환 유지)
function fmtWon(n) { return fmtG(n); }

// ★ v0.47 G코인 환율 엔진 ─────────────────────────────────
// G코인(GC): 게임 내 기축 코인. 보석↔G 환전의 기준이 되는 자산.
// 환율 = f(분기, 보석잔고, 명성, 부채) — 정확한 계산 불가 설계
const GCoinEngine = (function() {

  // L1: 기준 환율 — sin+cos 복합 주기 (직관적 패턴 파악 불가)
  function _baseRate(quarter) {
    const q = quarter || 1;
    const wave1 = Math.sin(q * 1.7)   * 2000; // 주기 A
    const wave2 = Math.cos(q * 0.9)   * 1500; // 주기 B (위상 다름)
    const wave3 = Math.sin(q * 0.31)  * 800;  // 장기 트렌드
    return Math.round(10000 + wave1 + wave2 + wave3); // 5,700~14,300G 범위
  }

  // L2: 개인 보정 — 보석잔고·명성·부채가 환율에 영향
  function _personalAdj(s) {
    const gems      = Math.min(s.gems||0, 500);
    const gemAdj    = (500 - gems) * 8;            // 보석 적을수록 유리 (희소성)
    const repAdj    = -((s.reputation||50) * 12);  // 명성 높을수록 유리
    const debtAdj   = Math.floor(((s.loans&&(s.loans.bank1+s.loans.bank2+s.loans.loanShark+s.loans.yongpali))||0) * 0.000003); // 빚 많을수록 불리
    return gemAdj + repAdj + debtAdj;
  }

  // L3: 수수료 — 구간별 역진적 + 실시간 노이즈
  function _feeRate(amount) {
    if (amount < 100000)   return 0.12; // 10만G 미만: 12%
    if (amount < 1000000)  return 0.08; // 100만G 미만: 8%
    if (amount < 10000000) return 0.05; // 1000만G 미만: 5%
    return 0.03;                        // 그 이상: 3%
  }

  // 현재 환율 계산 (1보석 = ?G) — 호출할 때마다 ±5% 노이즈 포함
  function calcRate(s) {
    const base = _baseRate(s.quarter||1);
    const adj  = _personalAdj(s);
    const noise = (Math.random()*0.10 - 0.05); // ±5%
    return Math.max(3000, Math.round((base + adj) * (1 + noise)));
  }

  // 등급 판정 (UI 표시용)
  function rateGrade(s) {
    const base = _baseRate(s.quarter||1);
    const adj  = _personalAdj(s);
    const effective = base + adj;
    if (effective <= 7000)  return { label:'🔴 나쁨',  color:'#f87171' };
    if (effective <= 9000)  return { label:'🟡 보통',  color:'#fbbf24' };
    if (effective <= 11500) return { label:'🟢 좋음',  color:'#a3e635' };
    return                         { label:'⭐ 우대',  color:'#fbbf24' };
  }

  // 예상 수령 범위 (정확한 값 대신 범위 반환)
  function estimateRange(s, gAmount) {
    const base = _baseRate(s.quarter||1) + _personalAdj(s);
    const fee  = _feeRate(gAmount);
    const afterFee = gAmount * (1 - fee);
    const lo = Math.floor(afterFee / (base * 1.10)); // 불리한 경우
    const hi = Math.floor(afterFee / (base * 0.90)); // 유리한 경우
    return { lo, hi };
  }

  // 실제 환전 실행 (확정 수령량 계산)
  function exchange(s, gAmount) {
    if ((s.cash||0) < gAmount) return { ok:false, reason:'잔고 부족' };
    const rate = calcRate(s);
    const fee  = _feeRate(gAmount);
    const afterFee = Math.floor(gAmount * (1 - fee));
    const gems = Math.floor(afterFee / rate);
    if (gems < 1) return { ok:false, reason:'환전량 부족 (최소 1보석)' };
    s.cash -= gAmount;
    s.gems  = (s.gems||0) + gems;
    return {
      ok: true, gems, gAmount, fee: Math.floor(gAmount * fee),
      rate, feeRate: fee,
    };
  }

  // G코인 시장가 계산 (주식 종목 GC 가격용)
  // — 환율의 역수 기반, 분기마다 변동
  function gcMarketPrice(s) {
    const rate = _baseRate(s.quarter||1) + _personalAdj(s) * 0.3; // 노이즈 없는 기준가
    // GC 주가 = 10,000,000 / rate (환율이 높으면 GC 저렴)
    return Math.max(1000, Math.round(10_000_000 / rate));
  }

  return { calcRate, rateGrade, estimateRange, exchange, gcMarketPrice, _baseRate, _feeRate };
})();

/* ═══════════════════════════════════════════════════════════════

// ── 파티클 풀 (GC 방지) ──
const PARTICLE_POOL_SIZE = 300;
const _particlePool = [];
const _activeParticles = [];
const _bgParticles = [];

function _createParticle() {
  return { active:false, x:0, y:0, vx:0, vy:0, ax:0, ay:0,
    size:3, color:'#fff', alpha:1, life:60, age:0, decay:0,
    shape:'rect', rotation:0, rotSpeed:0, scaleX:1, scaleY:1,
    gravity:0, friction:1, glow:0, trail:false, trailLen:4,
    history:[], onDeath:null, layer:'fg' };
}
for (let i=0; i<PARTICLE_POOL_SIZE; i++) _particlePool.push(_createParticle());

function spawnParticle(opts) {
  let p = _particlePool.pop();
  if (!p) p = _createParticle();
  Object.assign(p, {
    active:true, x:opts.x||0, y:opts.y||0,
    vx:opts.vx||0, vy:opts.vy||0, ax:opts.ax||0, ay:opts.ay||0,
    size:opts.size||3, color:opts.color||'#fff',
    alpha:opts.alpha||1, life:opts.life||60, age:0,
    decay:opts.decay||(1/(opts.life||60)),
    shape:opts.shape||'rect', rotation:opts.rotation||0,
    rotSpeed:opts.rotSpeed||0, scaleX:opts.scaleX||1, scaleY:opts.scaleY||1,
    gravity:opts.gravity||0, friction:opts.friction||1,
    glow:opts.glow||0, trail:opts.trail||false, trailLen:opts.trailLen||4,
    history:[], onDeath:opts.onDeath||null, layer:opts.layer||'fg'
  });
  if (opts.layer === 'bg') _bgParticles.push(p);
  else _activeParticles.push(p);
  return p;
}

function updateParticles(arr) {
  for (let i=arr.length-1; i>=0; i--) {
    const p = arr[i];
    if (!p.active) { arr.splice(i,1); _particlePool.push(p); continue; }
    if (p.trail) { p.history.push({x:p.x,y:p.y}); if(p.history.length>p.trailLen) p.history.shift(); }
    p.vy += p.gravity;
    p.vx *= p.friction; p.vy *= p.friction;
    p.x += p.vx; p.y += p.vy;
    p.vx += p.ax; p.vy += p.ay;
    p.rotation += p.rotSpeed;
    p.age++;
    p.alpha = Math.max(0, 1 - p.age * p.decay);
    if (p.age >= p.life) {
      p.active = false;
      if (p.onDeath) p.onDeath(p);
      arr.splice(i,1); _particlePool.push(p);
    }
  }
}

function renderParticles(targetCtx, arr) {
  for (const p of arr) {
    if (!p.active || p.alpha <= 0) continue;
    targetCtx.save();
    targetCtx.globalAlpha = p.alpha;
    if (p.glow > 0) { targetCtx.shadowColor = p.color; targetCtx.shadowBlur = p.glow; }
    targetCtx.translate(p.x, p.y);
    if (p.rotation) targetCtx.rotate(p.rotation);
    targetCtx.scale(p.scaleX, p.scaleY);
    targetCtx.fillStyle = p.color;
    if (p.trail && p.history.length > 1) {
      targetCtx.globalAlpha = p.alpha * 0.3;
      for (let t=0; t<p.history.length; t++) {
        const h = p.history[t], ta = (t/p.history.length)*0.5;
        targetCtx.globalAlpha = ta * p.alpha;
        targetCtx.fillRect(h.x - p.x - p.size/2, h.y - p.y - p.size/2, p.size*0.7, p.size*0.7);
      }
      targetCtx.globalAlpha = p.alpha;
    }
    switch(p.shape) {
      case 'circle':
        targetCtx.beginPath(); targetCtx.arc(0, 0, p.size, 0, Math.PI*2); targetCtx.fill(); break;
      case 'diamond':
        targetCtx.beginPath();
        targetCtx.moveTo(0,-p.size); targetCtx.lineTo(p.size,0);
        targetCtx.lineTo(0,p.size); targetCtx.lineTo(-p.size,0);
        targetCtx.closePath(); targetCtx.fill(); break;
      case 'coin':
        targetCtx.fillStyle='#fbbf24'; targetCtx.beginPath(); targetCtx.ellipse(0,0,p.size,p.size*0.7,0,0,Math.PI*2); targetCtx.fill();
        targetCtx.fillStyle='#f59e0b'; targetCtx.beginPath(); targetCtx.ellipse(0,0,p.size*0.6,p.size*0.4,0,0,Math.PI*2); targetCtx.fill();
        targetCtx.fillStyle='#fde68a'; targetCtx.font=`bold ${Math.max(6,p.size)}px sans-serif`; targetCtx.textAlign='center'; targetCtx.textBaseline='middle';
        targetCtx.fillText('G',0,1); break;
      case 'star':
        targetCtx.beginPath();
        for (let si=0;si<5;si++) {
          const a1=si*Math.PI*2/5-Math.PI/2, a2=a1+Math.PI/5;
          targetCtx.lineTo(Math.cos(a1)*p.size, Math.sin(a1)*p.size);
          targetCtx.lineTo(Math.cos(a2)*p.size*0.4, Math.sin(a2)*p.size*0.4);
        }
        targetCtx.closePath(); targetCtx.fill(); break;
      case 'smoke':
        const grad = targetCtx.createRadialGradient(0,0,0, 0,0,p.size);
        grad.addColorStop(0, p.color); grad.addColorStop(1, 'rgba(0,0,0,0)');
        targetCtx.fillStyle = grad;
        targetCtx.fillRect(-p.size,-p.size,p.size*2,p.size*2); break;
      default:
        targetCtx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
    }
    targetCtx.restore();
  }
}
