/* ─── v0.28 대출 메뉴 (박신양 고문 설계 — 보석 해금 + 사채 공포) ─── */
scenes.loanMenu = {
  isModal: true,
  _confirm3rd: false,  // 3금융 2번 확인 플래그
  enter: function() { this._confirm3rd = false; this._isFirstRender = true; this.render(); },
  exit: function() { modal.close(); },

  // 대출 버튼 HTML 생성 헬퍼
  _loanBtn: function(s, tier, label, emoji, amount, rate, gemCost, unlocked, extraCond, lockMsg, dangerLevel) {
    const gems = s.gems || 0;
    const canGem = gems >= gemCost;
    const condOk = extraCond === null || extraCond;
    const isOpen = unlocked && condOk;
    const hasDebt = (s.loans[tier]||0) > 0;

    // 위험도별 버튼 색
    const btnCls = dangerLevel === 0 ? 'btn-success'
                 : dangerLevel === 1 ? 'btn-warn'
                 : 'btn-danger';
    const borderStyle = dangerLevel >= 2
      ? 'border:2px solid #dc2626; box-shadow:0 0 8px #dc262640;'
      : '';

    if (!isOpen) {
      // 잠금 상태
      return '<div class="info-panel" style="opacity:0.6; border-color:#374151;">'
        + '<div style="font-size:14px; color:#64748b; margin-bottom:4px;">🔒 ' + emoji + ' ' + label + '</div>'
        + '<div style="font-size:12px; color:#475569;">' + (lockMsg||'해금 조건 미충족') + '</div>'
        + (unlocked && !condOk && gemCost > 0
            ? '<div style="font-size:12px; color:#67e8f9; margin-top:4px;">💎'+gemCost+' 해금 필요 (보유: 💎'+gems+')</div>'
            : '')
        + '</div>';
    }

    // 해금됨 → 대출 버튼
    return '<button class="btn '+btnCls+'" data-loan="'+tier+'" style="margin-bottom:10px;'+borderStyle+'">'
      + '<div style="font-size:16px; font-weight:bold;">' + emoji + ' ' + label + ' +' + fmtWon(amount) + '</div>'
      + '<div style="font-size:12px; opacity:0.9; margin-top:4px;">이자율 ' + (rate*100).toFixed(0) + '%/분기'
        + (gemCost > 0 ? ' · 대출마다 💎'+gemCost+' 소모' : '')
        + (hasDebt ? ' · 현재 잔액 '+fmtWon(s.loans[tier]) : '')
      + '</div>'
      + (dangerLevel >= 2
          ? '<div style="font-size:11px; color:#fca5a5; margin-top:3px;">⚠ 미납 시 용팔이 자동 등장</div>'
          : '')
      + '</button>';
  },

  render: function() {
    const s   = window.MJY.gameState.get();
    const gs  = window.MJY.gameState;
    const lu  = s.loanUnlocked || {bank1:true,bank2:false,loanShark:false};
    const lh  = s.loanHistory  || {bank1:0,bank2:0,loanShark:0,yongpali:0};
    const totalDebt = gs.getTotalDebt();
    const gems = s.gems || 0;
    const creditNum = {AAA:700,AA:600,A:500,BBB:400,BB:300,B:200,CCC:100,D:0}[s.creditGrade]||400;

    // ── 2금융 해금 조건 체크
    const bank2UnlockCost = 20;
    const bank2Cond = lh.bank1 >= 1;  // 1금융 1회 이상 이력
    const bank2CanUnlock = bank2Cond && gems >= bank2UnlockCost && !lu.bank2;

    // ── 3금융 해금 조건 (전부 충족 필요)
    const loanSharkCond = {
      debt:      (s.loans.bank1||0)+(s.loans.bank2||0) >= 500_000_000,  // 1+2금융 5억 이상
      credit:    creditNum <= 300,      // 신용도 300 이하
      cash:      s.cash <= 5_000_000,   // 잔고 500만 이하
    };
    const loanSharkAllCond = Object.values(loanSharkCond).every(Boolean);
    const loanSharkUnlockCost = 50;
    const loanSharkCanUnlock = loanSharkAllCond && gems >= loanSharkUnlockCost && !lu.loanShark;

    let html = '';

    // ── 상태 패널
    html += '<div class="info-panel" style="margin-bottom:12px;">'
      + '<div style="display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px;">'
      + '<div><div style="font-size:11px; color:#64748b;">잔고</div><div style="color:#a3e635; font-weight:bold;">'+fmtWon(s.cash)+'</div></div>'
      + '<div><div style="font-size:11px; color:#64748b;">신용도</div><div style="color:#fbbf24; font-weight:bold;">'+s.creditGrade+'</div></div>'
      + '<div><div style="font-size:11px; color:#64748b;">💎 보석</div><div style="color:#67e8f9; font-weight:bold;">'+gems+'개</div></div>'
      + '<div><div style="font-size:11px; color:#64748b;">총부채</div><div style="color:#f87171; font-weight:bold;">'+fmtWon(totalDebt)+'</div></div>'
      + '</div></div>';

    // ── 1금융
    const bank1GemCost = lh.bank1 === 0 ? 5 : (creditNum < 400 ? 10 : 3);
    html += this._loanBtn(s, 'bank1', '1금융 은행', '🏦', 30_000_000, 0.01, bank1GemCost, lu.bank1, true,
      '', 0);
    html += '<div style="font-size:11px; color:#475569; margin:-6px 0 10px 4px;">💎'+bank1GemCost+' 소모 · 첫 대출 💎5, 추가 💎3, 신용불량 💎10</div>';

    // ── 2금융
    if (!lu.bank2) {
      // 해금 버튼
      const condTxt = bank2Cond ? '✅ 1금융 이력 있음' : '❌ 1금융 대출 1회 이상 필요';
      html += '<div class="info-panel" style="border-color:#fbbf24; margin-bottom:10px;">'
        + '<div style="font-size:13px; color:#fbbf24; font-weight:bold; margin-bottom:6px;">🔒 2금융 저축은행 — 미해금</div>'
        + '<div style="font-size:12px; color:#94a3b8; margin-bottom:6px;">'+condTxt+'</div>'
        + '<div style="font-size:12px; color:#94a3b8; margin-bottom:8px;">'+(gems>=bank2UnlockCost?'✅':'❌')+' 보석 💎'+bank2UnlockCost+' 보유 (현재 💎'+gems+')</div>'
        + (bank2CanUnlock
            ? '<button class="btn btn-warn" data-action="unlock-bank2">💎'+bank2UnlockCost+' 소모하여 2금융 해금</button>'
            : '<div style="font-size:11px; color:#475569;">조건 충족 시 해금 가능</div>')
        + '</div>';
    } else {
      const bank2GemCost = creditNum < 300 ? 20 : 8;
      html += this._loanBtn(s, 'bank2', '2금융 저축은행', '🏪', 100_000_000, 0.05, bank2GemCost, lu.bank2, true,
        '', 1);
      html += '<div style="font-size:11px; color:#475569; margin:-6px 0 10px 4px;">💎'+bank2GemCost+' 소모 · 신용불량 💎20</div>';
    }

    // ── 3금융 (대부업)
    if (!lu.loanShark) {
      html += '<div class="info-panel" style="border-color:#dc2626; margin-bottom:10px;">'
        + '<div style="font-size:13px; color:#dc2626; font-weight:bold; margin-bottom:6px;">🔒 3금융 대부업 — 절박함이 필요합니다</div>'
        + '<div style="font-size:11px; color:#94a3b8; margin-bottom:8px; line-height:1.6;">'
        + (loanSharkCond.debt?'✅':'❌') + ' 1+2금융 합계 5억 이상<br>'
        + (loanSharkCond.credit?'✅':'❌') + ' 신용도 300 이하 (현재 '+creditNum+')<br>'
        + (loanSharkCond.cash?'✅':'❌') + ' 잔고 500만 이하 (현재 '+fmtWon(s.cash)+')<br>'
        + (gems>=loanSharkUnlockCost?'✅':'❌') + ' 💎'+loanSharkUnlockCost+' 보유 (현재 '+gems+')'
        + '</div>'
        + (loanSharkCanUnlock
            ? '<button class="btn btn-danger" data-action="unlock-loanshark">💎'+loanSharkUnlockCost+' 소모 · 3금융 해금</button>'
            : '<div style="font-size:11px; color:#7f1d1d;">모든 조건 충족 시 해금 가능</div>')
        + '</div>';
    } else {
      html += this._loanBtn(s, 'loanShark', '3금융 대부업', '☠', 200_000_000, 0.20, 30, lu.loanShark, true,
        '', 2);
      html += '<div style="font-size:11px; color:#f87171; margin:-6px 0 10px 4px;">대출마다 💎30 소모 · 미납 시 용팔이 자동 등장</div>';
    }

    // ── 용팔이 상태 표시 (강제 진입이므로 수동 버튼 없음)
    if (s.loans.yongpali > 0) {
      html += '<div class="info-panel" style="border-color:#dc2626; background:#1a0000;">'
        + '<div style="font-size:13px; color:#dc2626; font-weight:bold; margin-bottom:4px;">☠ 용팔이 — 이미 진입</div>'
        + '<div style="font-size:12px; color:#94a3b8;">원금 '+fmtWon(s.loans.yongpali)+' · 누적이자 '+fmtWon(s.yongpaliAccumInterest)+'</div>'
        + '<div style="font-size:11px; color:#7f1d1d; margin-top:4px;">이 대출은 갚을 수 없습니다. 이자를 완전히 상환하거나 역인수하는 것이 유일한 탈출구입니다.</div>'
        + '</div>';
    } else if (!lu.loanShark) {
      html += '<div style="font-size:11px; color:#374151; text-align:center; margin-top:8px; padding:6px; border:1px solid #1f2937; border-radius:4px;">'
        + '☠ 용팔이 — 3금융 미납 시 자동 등장 (선택 불가)'
        + '</div>';
    }

    const footer = '<button class="btn" data-action="close">닫기</button>';
    if (this._isFirstRender === undefined) this._isFirstRender = true;
    if (this._isFirstRender) {
      modal.open('💰 대출 메뉴', html, footer, () => sceneManager.switch('game'));
      this._isFirstRender = false;
    } else {
      modal.update('💰 대출 메뉴', html, footer);
    }

    // ── 해금 버튼 바인딩
    requestAnimationFrame(() => {
      const self = this;
      const s2 = window.MJY.gameState.get();

      // 2금융 해금
      document.querySelectorAll('[data-action="unlock-bank2"]').forEach(el => {
        bindClick(el, () => {
          if (!window.MJY.gameState.spendGems(bank2UnlockCost)) {
            toast.show('💎 보석 부족', '#dc2626'); return;
          }
          s2.loanUnlocked.bank2 = true;
          window.MJY.saveSystem.save();
          toast.show('🔓 2금융 해금! 저축은행 대출 가능', '#fbbf24');
          self._isFirstRender = true;
          self.render();
        });
      });

      // 3금융 해금
      document.querySelectorAll('[data-action="unlock-loanshark"]').forEach(el => {
        bindClick(el, () => {
          if (!window.MJY.gameState.spendGems(loanSharkUnlockCost)) {
            toast.show('💎 보석 부족', '#dc2626'); return;
          }
          s2.loanUnlocked.loanShark = true;
          window.MJY.saveSystem.save();
          // 경고 연출
          screenFlash.flash('negative');
          toast.show('⚠ 3금융 해금. 이제 되돌아오기 어렵습니다.', '#dc2626');
          setTimeout(() => toast.show('박신양: "빌리는 순간부터 당신 것이 아닙니다."', '#7f1d1d'), 1800);
          self._isFirstRender = true;
          self.render();
        });
      });

      // 대출 실행
      document.querySelectorAll('[data-loan]').forEach(el => {
        bindClick(el, () => {
          const tier = el.dataset.loan;
          const s3 = window.MJY.gameState.get();
          const lu3 = s3.loanUnlocked || {};
          if (!lu3[tier]) { toast.show('🔒 해금 필요', '#dc2626'); return; }

          const amounts = {bank1:30_000_000, bank2:100_000_000, loanShark:200_000_000};
          const gemCosts = {
            bank1: ((s3.loanHistory && s3.loanHistory.bank1)||0)===0 ? 5 : ({AAA:3,AA:3,A:3,BBB:3}[s3.creditGrade] ? 3 : 10),
            bank2: ({AAA:8,AA:8,A:8,BBB:8,BB:8}[s3.creditGrade] ? 8 : 20),
            loanShark: 30,
          };
          const gemCost = gemCosts[tier] || 0;

          // 보석 확인
          if ((s3.gems||0) < gemCost) {
            toast.show('💎 보석 부족 ('+gemCost+'개 필요)', '#dc2626'); return;
          }

          // 3금융 2중 확인
          if (tier === 'loanShark' && !self._confirm3rd) {
            self._confirm3rd = true;
            toast.show('⚠ 한 번 더 확인: 다시 누르면 실행됩니다', '#f87171');
            screenFlash.flash('negative');
            return;
          }
          self._confirm3rd = false;

          // 보석 차감 + 대출 실행
          window.MJY.gameState.spendGems(gemCost);
          s3.loans[tier] = (s3.loans[tier]||0) + amounts[tier];
          s3.cash += amounts[tier];
          if (!s3.loanHistory) s3.loanHistory = {bank1:0,bank2:0,loanShark:0,yongpali:0};
          s3.loanHistory[tier] = (s3.loanHistory[tier]||0) + 1;

          window.MJY.saveSystem.save();

          const tierLabel = {bank1:'1금융',bank2:'2금융',loanShark:'3금융'}[tier]||tier;
          toast.show('💰 '+tierLabel+' +'+fmtWon(amounts[tier])+' 대출 (💎'+gemCost+' 소모)', '#a3e635');
          sceneManager.switch('game');
        });
      });

      document.querySelectorAll('[data-action="close"]').forEach(el => {
        bindClick(el, () => { self._isFirstRender = true; sceneManager.switch('game'); });
      });
    });
  },
  update: function() {},
  _isFirstRender: true,
};

/* ─── v0.32 이벤트형 직원 대화 팝업 ─── */
scenes.empTalkPopup = {
  isModal: true,
  _emp: null, _biz: null, _talk: null,
  _step: 'talk',   // 'talk' → 'result'
  _afterClose: null,  // 팝업 닫힌 후 실행할 콜백

  enter: function(o) {
    this._emp  = o.emp;
    this._biz  = o.biz;
    this._talk = o.talk;
    this._step = 'talk';
    this._afterClose = o.afterClose || null;
    this.render();
  },
  exit: function() { modal.close(); },

  render: function() {
    const emp  = this._emp;
    const talk = this._talk;
    if (!emp || !talk) return;

    const rap = emp.rapport || 50;
    const rapColor = rap>=71?'#a3e635':rap>=31?'#fbbf24':'#f87171';
    const typeIcon = {daily:'💬', demand:'💸', worry:'😰', story:'⭐', complaint:'😤', night:'🌙', quit:'📋'}[talk._type] || '💬';
    const typeLabel = {daily:'일상', demand:'요구', worry:'고민', story:'특별', complaint:'불만', night:'야간', quit:'퇴직예고'}[talk._type] || '';

    let html = '';

    if (this._step === 'talk') {
      // ─ 직원 말풍선 (왼쪽)
      html += '<div style="display:flex; align-items:flex-start; gap:12px; margin-bottom:18px;">'
        + '<div style="flex-shrink:0;">'
        + '<canvas id="popup-emp-canvas" width="56" height="70" style="border-radius:8px; background:#0f172a;"></canvas>'
        + '</div>'
        + '<div style="flex:1;">'
        + '<div style="display:flex; align-items:center; gap:6px; margin-bottom:6px;">'
        + '<span style="font-size:15px; font-weight:bold; color:#e2e8f0;">'+htmlEscape(emp.name)+'</span>'
        + '<span style="font-size:11px; background:rgba(255,255,255,0.1); padding:2px 7px; border-radius:8px; color:#94a3b8;">'+typeIcon+' '+typeLabel+'</span>'
        + '</div>'
        + '<div style="background:#0f172a; border-radius:4px 12px 12px 12px; padding:12px 16px; border-left:3px solid '+rapColor+';">'
        + '<div style="font-size:17px; color:#f1f5f9; line-height:1.5;">'+htmlEscape(talk.line)+'</div>'
        + '</div>'
        + '</div>'
        + '</div>';

      // ─ 사장(나)의 응답 선택지
      html += '<div style="font-size:13px; color:#475569; margin-bottom:10px;">어떻게 말할까요?</div>';
      talk.res.forEach((r, idx) => {
        const isPos = r.rap >= 0;
        const borderCol = r.quitRisk ? '#dc2626' : isPos ? '#1e3a5f' : '#3b1111';
        html += '<button class="btn" data-res-idx="'+idx+'" style="text-align:left; margin-bottom:10px; border-color:'+borderCol+';">'
          + (r.quitRisk ? '<div style="font-size:11px; color:#f87171; margin-bottom:3px;">⚠ 퇴직 위험</div>' : '')
          + '<div style="font-size:16px; color:#e2e8f0;">"'+htmlEscape(r.label)+'"</div>'
          + '<div style="font-size:13px; color:'+(isPos?'#a3e635':'#f87171')+'; margin-top:4px;">'
          + (isPos ? '▲ 유대 +' : '▼ 유대 ')+Math.abs(r.rap)
          + (r.costDelta ? '<span style="color:#f87171; margin-left:8px;">운영비 +'+r.costDelta.toLocaleString()+'</span>' : '')
          + '</div></button>';
      });

      const footer = '<button class="btn" data-action="skip">나중에 (유대 -1)</button>';
      modal.open(typeIcon+' '+htmlEscape(emp.name)+'이/가 말을 겁니다', html, footer);

    } else {
      // ─ RESULT: 직원 반응 + 유대 변동
      const res  = this._selRes;
      const isPos = res.rap >= 0;
      const newRap = Math.max(0, Math.min(100, rap + res.rap));

      // 내 말
      html += '<div style="text-align:right; margin-bottom:12px;">'
        + '<div style="font-size:12px; color:#475569; margin-bottom:4px;">나 (사장)</div>'
        + '<div style="display:inline-block; background:#1e3a5f; border-radius:12px 12px 2px 12px; padding:10px 14px;">'
        + '<div style="font-size:15px; color:#93c5fd;">"'+htmlEscape(res.label)+'"</div>'
        + '</div></div>';

      // 직원 속마음
      html += '<div style="background:rgba(0,0,0,0.3); border-left:3px solid '+(isPos?'#a3e635':'#f87171')+'; padding:10px 14px; border-radius:4px; margin-bottom:14px;">'
        + '<div style="font-size:12px; color:#475569; margin-bottom:3px;">'+htmlEscape(emp.name)+'의 반응</div>'
        + '<div style="font-size:14px; color:#94a3b8; font-style:italic;">'+htmlEscape(res.msg)+'</div>'
        + '</div>';

      // 유대 변동
      html += '<div style="text-align:center; margin-bottom:10px;">'
        + '<span style="font-size:22px; font-weight:bold; color:'+(isPos?'#a3e635':'#f87171')+'">'
        + (isPos?'▲ 유대 +':'▼ 유대 ')+Math.abs(res.rap)+' → '+newRap
        + '</span></div>';
      html += htmlProgress(newRap, 100, newRap+'%');

      // 친밀 달성
      if ((rap<71) && (newRap>=71)) {
        html += '<div class="info-panel" style="border-color:#a3e635; text-align:center; margin-top:10px;">✨ <b>친밀 달성!</b> 유대 버프 활성화</div>';
      }
      // 스토리 해금
      if (res.unlock) {
        html += '<div class="info-panel" style="border-color:#facc15; margin-top:10px;">⭐ '+htmlEscape(emp.name)+'의 이야기가 열렸습니다.</div>';
      }

      const footer = '<button class="btn btn-success" data-action="close">확인</button>';
      modal.update(typeIcon+' '+htmlEscape(emp.name)+'이/가 말을 겁니다', html, footer);
    }

    // ─ 이벤트 바인딩
    const self = this;
    requestAnimationFrame(() => {
      // 응답 선택
      document.querySelectorAll('[data-res-idx]').forEach(el => {
        bindClick(el, () => {
          const idx = parseInt(el.dataset.resIdx);
          const res = self._talk.res[idx];
          self._selRes = res;

          // rapport 적용
          const emp2 = self._emp;
          emp2.rapport = Math.max(0, Math.min(100, (emp2.rapport||50) + res.rap));
          if (!emp2.rapportHistory) emp2.rapportHistory = [];
          const s = window.MJY.gameState.get();
          emp2.rapportHistory.push({q: s.quarter, delta: res.rap});

          // 운영비 증가 (시급 인상 요구 수락)
          if (res.costDelta && self._biz) {
            self._biz.operationCost = (self._biz.operationCost || 500000) + res.costDelta;
            toast.show('💸 운영비 +'+res.costDelta.toLocaleString()+'원/분기', '#f87171');
          }

          // 퇴직 위험
          if (res.quitRisk) {
            emp2.satisfaction = Math.max(0, (emp2.satisfaction||70) - 30);
            toast.show('⚠ '+htmlEscape(emp2.name)+' 이/가 마음이 떠났습니다', '#dc2626');
          }

          // 퀘스트 체크
          if (s.quests && s.quests['tut_first_talk']) {
            s.quests['tut_first_talk'].status = 'done';
          }
          questCheck(s);
          window.MJY.saveSystem.save();

          self._step = 'result';
          self.render();

          // 캐릭터 미리보기
          setTimeout(() => {
            const cvs = document.getElementById('popup-emp-canvas');
            if (cvs && typeof renderEmpPreview === 'function') renderEmpPreview(cvs, emp2);
          }, 50);
        });
      });

      // 스킵
      document.querySelectorAll('[data-action="skip"]').forEach(el => {
        bindClick(el, () => {
          self._emp.rapport = Math.max(0, (self._emp.rapport||50) - 1);
          window.MJY.saveSystem.save();
          modal.close();
          if (self._afterClose) self._afterClose();
        });
      });

      // 결과 확인 후 닫기
      document.querySelectorAll('[data-action="close"]').forEach(el => {
        bindClick(el, () => {
          modal.close();
          if (self._afterClose) self._afterClose();
        });
      });

      // 캐릭터 미리보기 (talk 단계)
      if (self._step === 'talk') {
        setTimeout(() => {
          const cvs = document.getElementById('popup-emp-canvas');
          if (cvs && typeof renderEmpPreview === 'function') renderEmpPreview(cvs, self._emp);
        }, 50);
      }
    });
  },
  update: function() {},
};

/* ─── 상환 메뉴 (HTML 모달) ─── */
scenes.repayMenu = {
  isModal: true,
  enter: function() { this.render(); },
  exit: function() { modal.close(); },
  render: function() {
    const s = window.MJY.gameState.get();
    let html = `
      <div class="info-panel">
        <div class="info-row"><span class="info-label">💰 잔고</span><span class="info-value" style="color:#a3e635">${fmtWon(s.cash)}</span></div>
      </div>
      <div style="font-size:13px; color:#94a3b8; margin-bottom:12px;">※ 잔고 부족 시 최대치까지 상환</div>
    `;

    const tiers = [
      {key:'yongpali', label:'💀 용팔이', color:'#dc2626', cls:'btn-danger'},
      {key:'loanShark', label:'⚠ 사채', color:'#fb923c', cls:'btn-warn'},
      {key:'bank2', label:'🏪 2금융', color:'#0ea5e9', cls:'btn-info'},
      {key:'bank1', label:'🏦 1금융', color:'#a3e635', cls:'btn-success'},
    ];
    let any = false;
    tiers.forEach(t => {
      if (s.loans[t.key] > 0) {
        any = true;
        const repayAmt = Math.min(s.cash, s.loans[t.key]);
        html += `
          <button class="btn ${t.cls}" data-tier="${t.key}">
            <div style="font-size:16px;">${t.label}</div>
            <div style="font-size:13px; opacity:0.95; margin-top:4px;">잔액 ${fmtWon(s.loans[t.key])}</div>
            <div style="font-size:12px; opacity:0.85; margin-top:2px;">상환 가능 ${fmtWon(repayAmt)}</div>
          </button>
        `;
      }
    });

    if (!any) html += `<div class="info-panel" style="text-align:center; color:#a3e635; padding:24px;">✨ 상환할 대출이 없습니다</div>`;

    const footer = `<button class="btn" data-action="close">닫기</button>`;
    modal.open('💵 상환 메뉴', html, footer);

    document.querySelectorAll('[data-tier]').forEach(el => {
      bindClick(el, () => {
        const tier = el.dataset.tier;
        const amt = Math.min(s.cash, s.loans[tier]);
        s.cash -= amt; s.loans[tier] -= amt;
        toast.show('💵 -' + fmtWon(amt) + ' 상환!', '#a3e635');
        sceneManager.switch('game');
      });
    });
    document.querySelectorAll('[data-action="close"]').forEach(el => {
      bindClick(el, () => sceneManager.switch('game'));
    });
  },
  update: function() {},
};

/* ─── ★ v0.9.0 본사 메뉴 (HTML 모달) ─── */
scenes.hqMenu = {
  isModal: true,
  enter: function() { this.render(); },
  exit: function() { modal.close(); },
  render: function() {
    const gs = window.MJY.gameState;
    const s = gs.get();
    const hq = s.headquarters || { established:false, level:0 };
    const cfg = gs.HQ_CONFIG;
    let html = '';

    if (!hq.established) {
      // 미설립 — 설립 조건 안내
      const check = gs.canEstablishHQ();
      const bizCount = s.businesses.filter(b=>b.unlocked).length;
      html += `
        <div class="info-panel">
          <div style="font-size:14px; color:#facc15; font-weight:bold; margin-bottom:8px;">🏢 본사 설립</div>
          <div style="font-size:12px; color:#94a3b8; line-height:1.5; margin-bottom:10px;">
            본사를 설립하면 전 사업장에 매출·비용 보너스가 적용됩니다.
            성장의 가속 엔진을 손에 넣으세요.
          </div>
        </div>
        <div class="info-panel">
          <div style="font-size:13px; font-weight:bold; color:#cbd5e1; margin-bottom:6px;">설립 조건</div>
          <div class="info-row">
            <span class="info-label">사업장 수</span>
            <span style="color:${bizCount>=cfg.requireBusinesses?'#a3e635':'#f87171'}">${bizCount} / ${cfg.requireBusinesses}개</span>
          </div>
          <div class="info-row">
            <span class="info-label">누적이익</span>
            <span style="color:${s.cumulativeProfit>=cfg.requireProfit?'#a3e635':'#f87171'}">${fmtWon(s.cumulativeProfit)} / ${fmtWon(cfg.requireProfit)}</span>
          </div>
          <div class="info-row">
            <span class="info-label">설립 비용</span>
            <span style="color:${s.cash>=cfg.establishCost?'#a3e635':'#f87171'}">${fmtWon(cfg.establishCost)} (보유 ${fmtWon(s.cash)})</span>
          </div>
        </div>
        <div class="info-panel">
          <div style="font-size:13px; font-weight:bold; color:#cbd5e1; margin-bottom:6px;">설립 시 효과 (Lv1)</div>
          <div class="info-row"><span class="info-label">전사 매출</span><span style="color:#a3e635">+10%</span></div>
          <div class="info-row"><span class="info-label">전사 운영비</span><span style="color:#a3e635">-5%</span></div>
        </div>
      `;
      if (check.ok) {
        html += `<button class="btn btn-success" data-action="establish"><div style="font-size:16px;">🏢 본사 설립 (${fmtWon(cfg.establishCost)})</div></button>`;
      } else {
        let reason = '조건 미달';
        if (check.reason === 'need_business') reason = `사업장 ${check.need}개 필요 (현재 ${check.have}개)`;
        else if (check.reason === 'need_profit') reason = `누적이익 ${fmtWon(check.need)} 필요`;
        else if (check.reason === 'need_cash') reason = `잔고 ${fmtWon(check.need)} 필요`;
        html += `<button class="btn" style="opacity:0.5;" disabled><div style="font-size:14px;">🔒 ${reason}</div></button>`;
      }
    } else {
      // 설립됨 — 본사 현황 + 레벨 진행
      const info = gs.getHQLevelInfo();
      const levels = cfg.levels;
      const nextLevel = hq.level < levels.length ? levels[hq.level] : null;
      html += `
        <div class="info-panel" style="border-color:#facc15;">
          <div style="font-size:16px; color:#facc15; font-weight:bold; margin-bottom:4px;">🏢 본사 Lv${hq.level}</div>
          <div style="font-size:11px; color:#94a3b8;">${hq.establishedQuarter}분기에 설립</div>
        </div>
        <div class="info-panel">
          <div style="font-size:13px; font-weight:bold; color:#cbd5e1; margin-bottom:6px;">현재 전사 효과</div>
          <div class="info-row"><span class="info-label">전사 매출</span><span style="color:#a3e635">+${Math.round(info.revBonus*100)}%</span></div>
          <div class="info-row"><span class="info-label">전사 운영비</span><span style="color:#a3e635">-${Math.round(info.costReduce*100)}%</span></div>
        </div>
      `;
      if (nextLevel) {
        const remain = Math.max(0, nextLevel.threshold - s.cumulativeProfit);
        const progress = Math.min(100, Math.round(s.cumulativeProfit / nextLevel.threshold * 100));
        html += `
          <div class="info-panel">
            <div style="font-size:13px; font-weight:bold; color:#cbd5e1; margin-bottom:6px;">다음 레벨 (Lv${nextLevel.level})</div>
            <div style="background:#1e293b; border-radius:6px; height:14px; overflow:hidden; margin:6px 0;">
              <div style="background:linear-gradient(90deg,#f59e0b,#facc15); height:100%; width:${progress}%;"></div>
            </div>
            <div style="font-size:11px; color:#94a3b8;">누적이익 ${fmtWon(s.cumulativeProfit)} / ${fmtWon(nextLevel.threshold)} (${progress}%)</div>
            <div style="font-size:11px; color:#64748b; margin-top:2px;">남은 금액: ${fmtWon(remain)}</div>
            <div class="info-row" style="margin-top:6px;"><span class="info-label">Lv${nextLevel.level} 효과</span><span style="color:#a3e635">매출+${Math.round(nextLevel.revBonus*100)}% / 비용-${Math.round(nextLevel.costReduce*100)}%</span></div>
            <div style="font-size:10px; color:#64748b; margin-top:4px;">※ 누적이익 도달 시 분기 종료 후 자동 레벨업</div>
          </div>
        `;
      } else {
        html += `<div class="info-panel" style="text-align:center; color:#facc15; padding:20px;">🏆 본사 최고 레벨 달성!</div>`;
      }
      // ★ v0.9.3 사내 팀 관리 진입 버튼
      const deptUnlocked = gs.getUnlockedDeptCount();
      html += `<button class="btn btn-info" data-action="depts"><div style="font-size:15px;">🏛 사내 팀 관리 (${deptUnlocked}/${gs.DEPARTMENTS.length} 부서 해금)</div></button>`;
    }

    html += `<button class="btn" data-action="hr-dashboard" style="background:rgba(99,102,241,0.12);border-color:#6366f1;margin-top:4px;">
      <div style="font-size:15px;">👥 인사 현황 대시보드</div>
      <div style="font-size:11px;color:#a5b4fc;">전체 직원 직급·복지·만족도 한눈에</div>
    </button>`;
    const footer = `<button class="btn" data-action="close">닫기</button>`;
    modal.open('🏢 본사', html, footer);

    requestAnimationFrame(() => {
      document.querySelectorAll('[data-action="hr-dashboard"]').forEach(el => {
        bindClick(el, () => sceneManager.switch('hrDashboard'));
      });
      document.querySelectorAll('[data-action="depts"]').forEach(el => {
      bindClick(el, () => sceneManager.switch('deptMenu'));
      });
    });

    document.querySelectorAll('[data-action="establish"]').forEach(el => {
      bindClick(el, () => {
        const r = gs.establishHQ();
        if (r.ok) {
          toast.show('🏢 본사 설립 완료! 전사 보너스 적용', '#facc15');
          window.MJY.saveSystem.save();
          sceneManager.switch('game');
        } else {
          toast.show('🚫 설립 조건 미달', '#dc2626');
        }
      });
    });
    document.querySelectorAll('[data-action="close"]').forEach(el => {
      bindClick(el, () => sceneManager.switch('game'));
    });
  },
  update: function() {},
};

/* ─── ★ v0.9.3 사내 팀 관리 (HTML 모달) ─── */
scenes.deptMenu = {
  isModal: true,
  enter: function() { this.selectedDept = null; this.render(); },
  exit: function() { modal.close(); },
  render: function() {
    const gs = window.MJY.gameState;
    const s = gs.get();
    const unlocked = gs.getUnlockedDeptCount();
    let html = '';

    if (this.selectedDept) {
      // 부서 상세 — 배치/해제
      const di = gs.getDeptInfo(this.selectedDept);
      const members = gs.getDeptMembers(this.selectedDept);
      html += `<div class="info-panel" style="border-color:${di.color};">
        <div style="font-size:15px; font-weight:bold; color:${di.color};">${di.emoji} ${di.name}</div>
        <div style="font-size:12px; color:#94a3b8; margin-top:4px;">${di.effect} · 스킬: ${di.skillName} (${di.skillDesc})</div>
        <div style="font-size:11px; color:#64748b; margin-top:2px;">배치 ${members.length}/${gs.getDeptMaxMembers(this.selectedDept)}명 · 효과는 인원수 비례</div>
      </div>`;
      // 현재 배치 인원
      html += `<div style="font-size:13px; font-weight:bold; color:#cbd5e1; margin:10px 0 6px;">배치 인원</div>`;
      if (members.length === 0) {
        html += `<div class="info-panel" style="color:#64748b; text-align:center; padding:12px;">아직 배치된 직원이 없습니다</div>`;
      } else {
        members.forEach(eid => {
          const e = gs.findEmployeeById(eid);
          if (!e) return;
          html += `<div class="info-panel" style="display:flex; justify-content:space-between; align-items:center; padding:8px 12px;">
            <span style="color:#e2e8f0;">${htmlEscape(e.name)} <span style="color:#64748b; font-size:11px;">Lv${e.level||1}</span></span>
            <button class="btn-mini" data-unassign="${e.id}" style="background:#7f1d1d; color:#fca5a5; border:none; border-radius:6px; padding:4px 10px; font-size:12px;">해제</button>
          </div>`;
        });
      }
      // 배치 가능 직원 (정직원 이상 또는 Lv50 잔류 알바, 아직 이 부서가 아닌)
      const eligible = [];
      s.businesses.forEach(b => (b.employees||[]).forEach(e => {
        if (gs.canAssignToDept(e) && gs.getEmployeeDept(e.id) !== this.selectedDept) eligible.push(e);
      }));
      html += `<div style="font-size:13px; font-weight:bold; color:#cbd5e1; margin:12px 0 6px;">배치 가능 직원</div>`;
      if (eligible.length === 0) {
        html += `<div class="info-panel" style="color:#64748b; text-align:center; padding:12px; font-size:12px;">배치 가능한 직원이 없습니다<br>(정직원 이상 또는 Lv50 거절·잔류 알바)</div>`;
      } else if (members.length >= gs.getDeptMaxMembers(this.selectedDept)) {
        html += `<div class="info-panel" style="color:#f59e0b; text-align:center; padding:12px; font-size:12px;">부서 정원이 가득 찼습니다</div>`;
      } else {
        eligible.forEach(e => {
          const curDept = gs.getEmployeeDept(e.id);
          const curLabel = curDept ? ` <span style="color:#64748b; font-size:11px;">(현재: ${gs.getDeptInfo(curDept).name})</span>` : '';
          html += `<div class="info-panel" style="display:flex; justify-content:space-between; align-items:center; padding:8px 12px;">
            <span style="color:#e2e8f0;">${htmlEscape(e.name)} <span style="color:#64748b; font-size:11px;">Lv${e.level||1}</span>${curLabel}</span>
            <button class="btn-mini" data-assign="${e.id}" style="background:${di.color}33; color:${di.color}; border:1px solid ${di.color}; border-radius:6px; padding:4px 10px; font-size:12px;">배치</button>
          </div>`;
        });
      }
      const footer = `<button class="btn" data-action="back">← 부서 목록</button>`;
      modal.open(`${di.emoji} ${di.name}`, html, footer);

      const self = this;
      document.querySelectorAll('[data-assign]').forEach(el => bindClick(el, () => {
        const r = gs.assignToDept(self.selectedDept, el.dataset.assign);
        if (r.ok) { toast.show('✅ 배치 완료', '#a3e635'); window.MJY.saveSystem.save(); self.render(); }
        else toast.show(r.reason==='full'?'🚫 정원 초과':'🚫 배치 불가', '#dc2626');
      }));
      document.querySelectorAll('[data-unassign]').forEach(el => bindClick(el, () => {
        gs.assignToDept(null, el.dataset.unassign);
        toast.show('해제 완료', '#94a3b8'); window.MJY.saveSystem.save(); self.render();
      }));
      document.querySelectorAll('[data-action="back"]').forEach(el => bindClick(el, () => { self.selectedDept = null; self.render(); }));
      return;
    }

    // 부서 목록
    html += `<div style="font-size:12px; color:#94a3b8; margin-bottom:10px;">본사 레벨당 부서 2개 해금 · 정직원 이상 배치 가능</div>`;
    gs.DEPARTMENTS.forEach((d, idx) => {
      const isUnlocked = idx < unlocked;
      const n = gs.getDeptMemberCount(d.key);
      if (isUnlocked) {
        html += `<div class="info-panel" data-dept="${d.key}" style="border-color:${d.color}; cursor:pointer; display:flex; justify-content:space-between; align-items:center;">
          <div>
            <div style="font-size:14px; font-weight:bold; color:${d.color};">${d.emoji} ${d.name} <span style="color:#64748b; font-size:11px;">${n}/${gs.getDeptMaxMembers(d.key)}</span></div>
            <div style="font-size:11px; color:#94a3b8; margin-top:2px;">${d.effect}</div>
          </div>
          <span style="color:${d.color};">▶</span>
        </div>`;
      } else {
        html += `<div class="info-panel" style="opacity:0.45; display:flex; justify-content:space-between; align-items:center;">
          <div>
            <div style="font-size:14px; font-weight:bold; color:#64748b;">🔒 ${d.name}</div>
            <div style="font-size:11px; color:#64748b; margin-top:2px;">본사 Lv${Math.ceil((idx+1)/2)} 필요</div>
          </div>
        </div>`;
      }
    });
    const footer = `<button class="btn" data-action="close">닫기</button>`;
    modal.open('🏛 사내 팀 관리', html, footer);

    const self = this;
    document.querySelectorAll('[data-dept]').forEach(el => bindClick(el, () => {
      self.selectedDept = el.dataset.dept; self.render();
    }));
    document.querySelectorAll('[data-action="close"]').forEach(el => bindClick(el, () => sceneManager.switch('hqMenu')));
  },
  update: function() {},
};

/* ─── ★ v0.10 퀘스트 메뉴 (HTML 모달) ─── */
scenes.questMenu = {
  isModal: true,
  tab: 'quests',
  enter: function() { this.tab = 'quests'; this.pickMode = null; this.render(); },
  exit: function() { modal.close(); },
  render: function() {
    const gs = window.MJY.gameState;
    const qe = window.MJY.questEngine;
    const s = gs.get();
    qe.ensureState(s);

    // ★ v0.10 피커 모드면 피커 유지 (매 프레임 render에도 안 덮이도록)
    if (this.pickMode) { this.renderPicker(); return; }
    // ★ v0.10 탭 헤더 (퀘스트 / 상점)
    const tabBar = `<div style="display:flex; gap:6px; margin-bottom:10px;">
      <button class="btn-mini" data-tab="quests" style="flex:1; padding:8px; border-radius:8px; font-size:13px; font-weight:bold; border:none; background:${this.tab==='quests'?'#0891b2':'#1e293b'}; color:${this.tab==='quests'?'#fff':'#94a3b8'};">📋 퀘스트</button>
      <button class="btn-mini" data-tab="shop" style="flex:1; padding:8px; border-radius:8px; font-size:13px; font-weight:bold; border:none; background:${this.tab==='shop'?'#a855f7':'#1e293b'}; color:${this.tab==='shop'?'#fff':'#94a3b8'};">🛒 보석 상점</button>
    </div>`;

    if (this.tab === 'shop') { this.renderShop(s, tabBar); return; }

    const TIER_INFO = {
      tutorial: { label: '📘 튜토리얼', color: '#0ea5e9', desc: '게임의 기본을 익혀요' },
      challenge: { label: '🏆 도전 과제', color: '#a855f7', desc: '경영자의 실력을 증명하세요' },
      gate: { label: '🔑 해금 관문', color: '#facc15', desc: '새로운 단계로 가는 길' },
    };

    const claimable = qe.countClaimable(s);
    let html = tabBar;
    html += `<div style="font-size:12px; color:#94a3b8; margin-bottom:10px;">💎 보유 보석: <span style="color:#67e8f9; font-weight:bold;">${s.gems||0}</span>${claimable>0?` · <span style="color:#facc15;">수령 가능 ${claimable}건</span>`:''}</div>`;

    ['tutorial','challenge','gate'].forEach(tier => {
      const info = TIER_INFO[tier];
      const defs = qe.getByTier(s, tier);
      html += `<div style="font-size:14px; font-weight:bold; color:${info.color}; margin:14px 0 4px;">${info.label}</div>`;
      html += `<div style="font-size:10px; color:#64748b; margin-bottom:6px;">${info.desc}</div>`;
      defs.forEach(def => {
        const st = s.quests[def.id] ? s.quests[def.id].status : 'locked';
        // 보상 텍스트
        let rwd = [];
        if (def.reward.gems) rwd.push(`💎${def.reward.gems}`);
        if (def.reward.exp) rwd.push(`경험치 ${def.reward.exp}`);
        const rwdStr = rwd.join(' · ');
        // 상태별 스타일
        let border, bg, statusBadge, opacity = '1';
        if (st === 'claimed') {
          border = '#334155'; bg = '#0f172a'; statusBadge = '<span style="color:#22c55e; font-size:11px;">✓ 완료</span>'; opacity = '0.6';
        } else if (st === 'done') {
          border = '#facc15'; bg = '#2e260f'; statusBadge = '<span style="color:#facc15; font-size:11px; font-weight:bold;">🎁 수령 가능</span>';
        } else if (st === 'active') {
          border = info.color; bg = '#0f172a'; statusBadge = '<span style="color:#94a3b8; font-size:11px;">진행 중</span>';
        } else { // locked
          if (def.pending) { border = '#475569'; bg = '#0f172a'; statusBadge = '<span style="color:#64748b; font-size:10px;">🔒 추후 공개</span>'; opacity = '0.5'; }
          else { border = '#475569'; bg = '#0f172a'; statusBadge = '<span style="color:#64748b; font-size:11px;">🔒 잠김</span>'; opacity = '0.55'; }
        }
        html += `<div class="info-panel" style="border-color:${border}; background:${bg}; opacity:${opacity}; padding:8px 12px; margin-bottom:6px;">
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <span style="font-size:13px; font-weight:bold; color:#e2e8f0;">${htmlEscape(def.title)}</span>
            ${statusBadge}
          </div>
          <div style="font-size:11px; color:#94a3b8; margin-top:2px;">${htmlEscape(def.desc)}</div>
          <div style="display:flex; justify-content:space-between; align-items:center; margin-top:4px;">
            <span style="font-size:11px; color:#67e8f9;">보상: ${rwdStr}</span>
            ${st==='done' ? `<button class="btn-mini" data-claim="${def.id}" style="background:#facc15; color:#000; border:none; border-radius:6px; padding:4px 12px; font-size:12px; font-weight:bold;">수령</button>` : ''}
          </div>
        </div>`;
      });
    });

    const footer = `<button class="btn" data-action="close">닫기</button>`;
    modal.open('📋 퀘스트', html, footer);

    const self = this;
    document.querySelectorAll('[data-claim]').forEach(el => bindClick(el, () => {
      const r = qe.claim(s, el.dataset.claim);
      if (r.ok) {
        let msg = '🎁 보상 수령!';
        if (r.reward.gems) msg += ' 💎' + r.reward.gems;
        if (r.reward.exp) msg += ' 경험치 ' + r.reward.exp;
        toast.show(msg, '#facc15');
        window.MJY.saveSystem.save();
        self.render();
      }
    }));
    document.querySelectorAll('[data-action="close"]').forEach(el => bindClick(el, () => sceneManager.switch('game')));
    document.querySelectorAll('[data-tab]').forEach(el => bindClick(el, () => { self.pickMode = null; self.tab = el.dataset.tab; self.render(); }));
  },
  // ★ v0.10 보석 상점 탭
  renderShop: function(s, tabBar) {
    const gs = window.MJY.gameState;
    const self = this;
    const shop = gs.GEM_SHOP;
    let html = tabBar;
    html += `<div style="font-size:13px; color:#94a3b8; margin-bottom:10px;">💎 보유 보석: <span style="color:#67e8f9; font-weight:bold; font-size:15px;">${s.gems||0}</span></div>`;
    html += `<div style="font-size:10px; color:#64748b; margin-bottom:10px;">보석은 퀘스트와 로그인 보상으로 모읍니다. 신중히 사용하세요.</div>`;

    // 각 아이템 구매 가능 여부
    const hasHQ = s.headquarters && s.headquarters.established;
    const hasNeg = gs.hasActiveNegativeEvent();
    const curBiz = gs.findBusiness(self._shopBizId) || s.businesses.find(b=>b.unlocked) || s.businesses[0];
    const bizFull = curBiz ? (curBiz.employees||[]).length >= curBiz.maxEmployees : true;

    const items = [
      { key:'instant_hire', enabled:(s.gems>=shop.instant_hire.price && !bizFull), note: bizFull?'정원 가득':'' },
      { key:'reroll',       enabled:(s.gems>=shop.reroll.price), note:'직원 선택 필요', action:'pick' },
      { key:'event_cancel', enabled:(s.gems>=shop.event_cancel.price && hasNeg), note: hasNeg?'':'진행 중 악재 없음' },
      { key:'dept_slot',    enabled:(s.gems>=shop.dept_slot.price && hasHQ), note: hasHQ?'부서 선택 필요':'본사 필요', action:'pick' },
    ];

    items.forEach(it => {
      const d = shop[it.key];
      const canBuy = it.enabled;
      const priceColor = (s.gems>=d.price) ? '#67e8f9' : '#f87171';
      html += `<div class="info-panel" style="border-color:${canBuy?'#a855f7':'#334155'}; opacity:${canBuy?'1':'0.6'}; padding:10px 12px; margin-bottom:8px;">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <span style="font-size:14px; font-weight:bold; color:#e2e8f0;">${d.emoji} ${d.label}</span>
          <span style="font-size:13px; color:${priceColor}; font-weight:bold;">💎${d.price}</span>
        </div>
        <div style="font-size:11px; color:#94a3b8; margin-top:3px;">${d.desc}</div>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:6px;">
          <span style="font-size:10px; color:#64748b;">${it.note||''}</span>
          <button class="btn-mini" ${canBuy?'':'disabled'} data-buy="${it.key}" style="background:${canBuy?'#a855f7':'#334155'}; color:#fff; border:none; border-radius:6px; padding:5px 14px; font-size:12px; font-weight:bold; ${canBuy?'':'cursor:not-allowed;'}">구매</button>
        </div>
      </div>`;
    });

    const footer = `<button class="btn" data-action="close">닫기</button>`;
    modal.open('🛒 보석 상점', html, footer);

    document.querySelectorAll('[data-tab]').forEach(el => bindClick(el, () => { self.pickMode = null; self.tab = el.dataset.tab; self.render(); }));
    document.querySelectorAll('[data-action="close"]').forEach(el => bindClick(el, () => sceneManager.switch('game')));
    document.querySelectorAll('[data-buy]').forEach(el => bindClick(el, () => self.handleBuy(el.dataset.buy)));
  },
  // 구매 처리 (즉시형 / 선택형 분기)
  handleBuy: function(key) {
    const gs = window.MJY.gameState;
    const s = gs.get();
    const self = this;
    if (key === 'instant_hire') {
      const biz = gs.findBusiness(this._shopBizId) || s.businesses.find(b=>b.unlocked) || s.businesses[0];
      const r = gs.gemInstantHire(biz.id);
      if (r.ok) { toast.show('⚡ ' + r.employee.name + ' 영입! (능력치합 ' + (r.employee.cooking+r.employee.serving+r.employee.patience) + ')', '#a3e635'); window.MJY.saveSystem.save(); }
      else if (r.reason==='full') toast.show('🚫 정원이 가득 찼습니다', '#dc2626');
      else toast.show('🚫 보석 부족', '#dc2626');
      self.render();
    } else if (key === 'event_cancel') {
      const r = gs.gemCancelEvent();
      if (r.ok) { toast.show('🛡 악재 "' + (r.removed.name||'사건') + '" 무효화!', '#a3e635'); window.MJY.saveSystem.save(); }
      else if (r.reason==='no_negative'||r.reason==='no_event') toast.show('🚫 무효화할 악재가 없습니다', '#dc2626');
      else toast.show('🚫 보석 부족', '#dc2626');
      self.render();
    } else if (key === 'reroll') {
      this.pickMode = 'reroll'; this.render();
    } else if (key === 'dept_slot') {
      this.pickMode = 'dept_slot'; this.render();
    }
  },
  // 선택형(리롤=직원, 부서정원=부서) 피커
  renderPicker: function() {
    const gs = window.MJY.gameState;
    const s = gs.get();
    const self = this;
    let html = '';
    if (this.pickMode === 'reroll') {
      html += `<div style="font-size:13px; color:#facc15; font-weight:bold; margin-bottom:4px;">🎲 능력치 리롤 (💎10)</div>`;
      html += `<div style="font-size:11px; color:#94a3b8; margin-bottom:10px;">재추첨할 직원을 선택하세요. <span style="color:#f87171;">결과는 즉시 확정되며 나빠질 수도 있습니다.</span></div>`;
      const emps = [];
      s.businesses.forEach(b => (b.employees||[]).forEach(e => emps.push(e)));
      if (emps.length === 0) html += `<div class="info-panel" style="text-align:center; color:#64748b; padding:14px;">직원이 없습니다</div>`;
      emps.forEach(e => {
        const sum = (e.cooking||0)+(e.serving||0)+(e.patience||0);
        html += `<div class="info-panel" style="padding:8px 12px; margin-bottom:6px; display:flex; justify-content:space-between; align-items:center;">
          <span style="font-size:13px; color:#e2e8f0;">${htmlEscape(e.name)} <span style="font-size:11px; color:#94a3b8;">🔥${e.cooking} 🍽${e.serving} 💪${e.patience} (합${sum})</span></span>
          <button class="btn-mini" data-reroll="${e.id}" style="background:#facc15; color:#000; border:none; border-radius:6px; padding:4px 12px; font-size:12px; font-weight:bold;">리롤</button>
        </div>`;
      });
    } else if (this.pickMode === 'dept_slot') {
      html += `<div style="font-size:13px; color:#facc15; font-weight:bold; margin-bottom:4px;">🏛 부서 정원 +1 (💎50)</div>`;
      html += `<div style="font-size:11px; color:#94a3b8; margin-bottom:10px;">정원을 늘릴 부서를 선택하세요. (영구)</div>`;
      const unlocked = gs.getUnlockedDeptCount();
      gs.DEPARTMENTS.forEach((d, idx) => {
        if (idx >= unlocked) return;
        const cur = gs.getDeptMaxMembers(d.key);
        html += `<div class="info-panel" style="padding:8px 12px; margin-bottom:6px; display:flex; justify-content:space-between; align-items:center; border-color:${d.color};">
          <span style="font-size:13px; color:${d.color};">${d.emoji} ${d.name} <span style="font-size:11px; color:#94a3b8;">정원 ${cur} → ${cur+1}</span></span>
          <button class="btn-mini" data-deptslot="${d.key}" style="background:${d.color}; color:#000; border:none; border-radius:6px; padding:4px 12px; font-size:12px; font-weight:bold;">선택</button>
        </div>`;
      });
    }
    const footer = `<button class="btn" data-action="back">← 상점으로</button>`;
    modal.open(this.pickMode==='reroll'?'🎲 리롤 대상 선택':'🏛 부서 선택', html, footer);

    document.querySelectorAll('[data-reroll]').forEach(el => bindClick(el, () => {
      const r = gs.gemReroll(el.dataset.reroll);
      if (r.ok) {
        const sign = r.delta>0?'+':'';
        const col = r.delta>0?'#a3e635':(r.delta<0?'#f87171':'#94a3b8');
        toast.show('🎲 ' + r.empName + ' 리롤: 능력치합 ' + sign + r.delta + ' (🔥' + r.after.cooking + ' 🍽' + r.after.serving + ' 💪' + r.after.patience + ')', col);
        window.MJY.saveSystem.save();
      } else toast.show('🚫 리롤 불가', '#dc2626');
      self.pickMode=null; self.tab='shop'; self.render();
    }));
    document.querySelectorAll('[data-deptslot]').forEach(el => bindClick(el, () => {
      const r = gs.gemDeptSlot(el.dataset.deptslot);
      if (r.ok) { toast.show('🏛 부서 정원 +1 (새 정원 ' + r.newMax + ')', '#a3e635'); window.MJY.saveSystem.save(); }
      else toast.show('🚫 구매 불가', '#dc2626');
      self.pickMode=null; self.tab='shop'; self.render();
    }));
    document.querySelectorAll('[data-action="back"]').forEach(el => bindClick(el, () => { self.pickMode=null; self.tab='shop'; self.render(); }));
  },
  update: function() {},
};

/* ─── 시스템 메뉴 (HTML 모달) ─── */
// ★ v0.47 G↔보석 환전소 씬
scenes.gemExchange = {
  isModal: true,
  _inputG: 0,
  enter: function() { this._inputG = 0; this.render(); },
  exit:  function() { modal.close(); },
  render: function() {
    const s   = window.MJY.gameState.get();
    const gce = window.MJY.GCoinEngine;
    const grade = gce.rateGrade(s);
    const inputG = this._inputG || 0;
    const range  = inputG > 0 ? gce.estimateRange(s, inputG) : null;

    // 수수료 구간 안내 (구간만 표시, 퍼센트는 숨김)
    const feeHint = inputG < 100000   ? '구간 C (소액)'
                  : inputG < 1000000  ? '구간 B'
                  : inputG < 10000000 ? '구간 A'
                  : '구간 S (대량)';

    const html = `
      <div style="background:#0c1a2e;border:1px solid #1e3a5f;border-radius:10px;padding:14px;margin-bottom:12px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
          <span style="font-size:13px;color:#94a3b8;">이번 분기 환율</span>
          <span style="font-size:15px;font-weight:bold;color:${grade.color};">${grade.label}</span>
        </div>
        <div style="font-size:11px;color:#475569;margin-bottom:4px;">
          ※ 환율은 분기·보석잔고·명성·부채에 따라 복합 결정됩니다
        </div>
        <div style="font-size:11px;color:#475569;">
          현재 보석 잔고: <span style="color:#fbbf24;">${s.gems||0}개</span>
          · 잔고 <span style="color:#a3e635;">${fmtG(s.cash)}</span>
        </div>
      </div>

      <!-- 입력 구간 -->
      <div style="font-size:13px;font-weight:bold;color:#e2e8f0;margin-bottom:8px;">환전할 G 선택</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px;">
        ${[100000,500000,1000000,3000000,10000000,30000000].map(amt=>`
          <button class="btn ${inputG===amt?'btn-success':''}" data-exchange-amt="${amt}"
            style="font-size:11px;padding:6px 2px;">${fmtG(amt)}</button>
        `).join('')}
      </div>

      ${inputG > 0 ? `
        <div style="background:#0f2318;border:1px solid #166534;border-radius:8px;padding:12px;margin-bottom:10px;">
          <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
            <span style="font-size:12px;color:#94a3b8;">환전 금액</span>
            <span style="font-size:13px;font-weight:bold;color:#e2e8f0;">${fmtG(inputG)}</span>
          </div>
          <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
            <span style="font-size:12px;color:#94a3b8;">수수료 구간</span>
            <span style="font-size:12px;color:#f87171;">${feeHint} <span style="color:#475569;font-size:10px;">(미공개)</span></span>
          </div>
          <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
            <span style="font-size:12px;color:#94a3b8;">예상 수령</span>
            <span style="font-size:14px;font-weight:bold;color:#fbbf24;">약 ${range.lo}~${range.hi}개 💎</span>
          </div>
          <div style="font-size:10px;color:#334155;margin-top:4px;">
            ※ 실제 수령량은 환전 시점 환율에 따라 다릅니다
          </div>
        </div>
        <button class="btn btn-warn" data-action="execute-exchange" style="width:100%;font-size:14px;">
          💱 환전하기 (${fmtG(inputG)} → 보석 약 ${range.lo}~${range.hi}개)
        </button>
      ` : `
        <div style="text-align:center;color:#475569;padding:16px;font-size:12px;">
          위에서 환전할 금액을 선택해주세요
        </div>
      `}

      <button class="btn" data-action="view-gcoin" style="width:100%;margin-top:8px;font-size:12px;">
        📈 G코인 시세 보기 (주식·선물)
      </button>
    `;
    const footer = `<button class="btn" data-action="close">◀ 닫기</button>`;
    modal.open('💱 G↔보석 환전소', html, footer);

    const self = this;
    document.querySelectorAll('[data-exchange-amt]').forEach(el => {
      bindClick(el, () => {
        self._inputG = parseInt(el.dataset.exchangeAmt);
        self.render();
      });
    });
    document.querySelectorAll('[data-action="execute-exchange"]').forEach(el => {
      bindClick(el, () => {
        const r = gce.exchange(s, self._inputG);
        if (!r.ok) { toast.show('🚫 ' + r.reason, '#dc2626'); return; }
        window.MJY.saveSystem.save();
        const col = r.gems >= (self._inputG / 12000) ? '#a3e635' : '#fbbf24';
        toast.show('💎 ' + r.gems + '개 수령! (수수료 ' + fmtG(r.fee) + ')', col);
        self._inputG = 0;
        self.render();
      });
    });
    document.querySelectorAll('[data-action="view-gcoin"]').forEach(el => {
      bindClick(el, () => {
        modal.close();
        sceneManager.switch('stockMarket');
      });
    });
    document.querySelectorAll('[data-action="close"]').forEach(el => {
      bindClick(el, () => { modal.close(); sceneManager.switch('game'); });
    });
  },
  update: function() {},
};

scenes.systemMenu = {
  isModal: true,
  enter: function() { this.render(); },
  exit: function() { modal.close(); },
  render: function() {
    const s = window.MJY.gameState.get();
    const isDevMode = s.loginType === 'dev';
    const html = `
      <button class="btn btn-info" data-action="help"><div style="font-size:16px;">❓ 게임 도움말</div></button>
      <button class="btn btn-success" data-action="save"><div style="font-size:16px;">💾 저장하기</div></button>
      <button class="btn btn-info" data-action="home"><div style="font-size:16px;">🏠 시작 화면으로</div></button>
      <!-- ★ v0.49 개발자 모드 전환 -->
      <button class="btn" data-action="dev-mode"
        style="background:${isDevMode?'#1a2e1a':'#1a1a2e'};border-color:${isDevMode?'#22c55e':'#6366f1'};margin-top:4px;">
        <div style="font-size:16px;">${isDevMode ? '🛠 개발자 모드 ON' : '🔑 개발자 모드'}</div>
        <div style="font-size:11px;color:#475569;margin-top:2px;">${isDevMode ? '현재 모든 기능 해금 상태' : '비밀번호 입력'}</div>
      </button>
      <button class="btn btn-danger" data-action="new"><div style="font-size:16px;">🔄 새 게임 (현재 진행 폐기)</div></button>
    `;
    const footer = `<button class="btn" data-action="close">닫기</button>`;
    modal.open('⚙ 시스템 메뉴', html, footer);

    document.querySelectorAll('[data-action]').forEach(el => {
      bindClick(el, () => {
        const action = el.dataset.action;
        if (action === 'close') { sceneManager.switch('game'); return; }
        if (action === 'help') { sceneManager.switch('help', {from:'game'}); return; }
        if (action === 'save') { window.MJY.saveSystem.save(); toast.show('💾 저장 완료', '#a3e635'); sceneManager.switch('game'); }
        if (action === 'home') { window.MJY.saveSystem.save(); sceneManager.switch('start'); }
        // ★ v0.49 개발자 모드 전환
        if (action === 'dev-mode') {
          const s2 = window.MJY.gameState.get();
          if (s2.loginType === 'dev') {
            toast.show('🛠 이미 개발자 모드입니다', '#fbbf24');
            return;
          }
          const pw = prompt('개발자 ID 입력:');
          if (pw === 'dev' || pw === 'developer' || pw === '1234') {
            s2.loginType = 'dev';
            window.MJY.saveSystem.save();
            modal.close();
            // 개발자 모드 해금 처리 (game.enter 효과 직접 적용)
            if (typeof scenes.game !== 'undefined' && scenes.game.enter) {
              scenes.game.enter();
            } else {
              sceneManager.switch('game');
            }
            toast.show('🛠 개발자 모드 해금! 모든 기능 활성화', '#fbbf24');
          } else if (pw !== null) {
            toast.show('❌ 잘못된 개발자 ID', '#f87171');
          }
          return;
        }
        if (action === 'new') {
          if (confirm('현재 진행을 폐기하시겠습니까?')) {
            window.MJY.saveSystem.reset();
            window.MJY.gameState.reset();
            sceneManager.switch('start');
          }
        }
      });
    });
  },
  update: function() {},
};

scenes.settlement = {
  isModal: true,
  report: null, endCheck: null, tab: 'summary',
  enter: function(o) { this.report = o.report; this.endCheck = o.endCheck; this.tab = 'summary'; this.render(); },
  exit: function() { modal.close(); },
  render: function() {
    if (!this.report || !this.endCheck) { modal.close(); return; } // ★ BUG-1 FIX: null 방어
    const r = this.report;
    const ec = this.endCheck;
    let html = `
      <div class="tabs">
        <button class="tab ${this.tab==='summary'?'active':''}" data-tab="summary">📊 통합</button>
        <button class="tab ${this.tab==='yongpali'?'active':''}" data-tab="yongpali">💀 용팔이</button>
        <button class="tab ${this.tab==='hr'?'active':''}" data-tab="hr">👥 인사</button>
      </div>
    `;

    if (this.tab === 'summary') html += this.summaryHTML(r);
    else if (this.tab === 'yongpali') html += this.yongpaliHTML(r);
    else if (this.tab === 'hr') html += this.hrHTML(r);

    const nextLabel = ec.ended
      ? ({gameover:'☠ 게임오버 보기', ending:'🏆 엔딩 보기', timeout:'⏰ 결과 보기'})[ec.type] || '확인'
      : '▶ 다음 분기로';
    const footer = `<button class="btn btn-primary" data-action="next">${nextLabel}</button>`;

    modal.open(`${fmtQuarterLabel(r.quarter)} 결산`, html, footer);

    const self = this;
    document.querySelectorAll('.tab[data-tab]').forEach(el => {
      bindClick(el, () => { self.tab = el.dataset.tab; self.render(); });
    });
    document.querySelectorAll('[data-action="next"]').forEach(el => {
      bindClick(el, () => {
        if (ec.ended) { sceneManager.switch('endScreen', {endCheck:ec}); return; }
        const s = window.MJY.gameState.get();
        s.quarter++; s.quarterElapsedMs = 0; s.phase = 'playing';
        // ★ v0.8.0 게임 연도 업데이트 (5분기마다 5년 진행)
        s.gameYear = window.MJY.eventEngine.getYearFromQuarter(s.quarter);
        if (s.pendingBusinesses && s.pendingBusinesses.length > 0) {
          for (const pb of s.pendingBusinesses) s.businesses.push(pb);
          s.pendingBusinesses = [];
        }
        window.MJY.saveSystem.save();

        // ★ v0.32 결산 후 직원 대화 이벤트 추첨
        const allEmps = [];
        (s.businesses||[]).forEach(biz => {
          if (!biz.unlocked) return;
          (biz.employees||[]).forEach(emp => allEmps.push({emp, biz}));
        });

        // 각 직원별 확률 체크 → 최대 1명 선택
        let talkTarget = null;
        const shuffled = allEmps.sort(() => Math.random()-0.5);
        for (const {emp, biz} of shuffled) {
          const chance = talkEventChance(emp);
          if (Math.random() < chance) {
            const talk = pickTalkEvent(emp, s);
            if (talk) { talkTarget = {emp, biz, talk}; break; }
          }
        }

        if (talkTarget) {
          // 대화 팝업 → 닫히면 game으로
          sceneManager.switch('empTalkPopup', {
            emp: talkTarget.emp,
            biz: talkTarget.biz,
            talk: talkTarget.talk,
            afterClose: () => sceneManager.switch('game'),
          });
        } else {
          sceneManager.switch('game');
        }
      });
    });
  },
  summaryHTML: function(r) {
    let html = `
      <div style="font-size:15px; font-weight:bold; color:#0ea5e9; margin-bottom:8px;">💼 손익 내역</div>
      <div class="info-panel">
        <div class="info-row"><span class="info-label">매출</span><span class="info-value" style="color:#a3e635">+${fmtWon(r.revenue)}</span></div>
    `;
    if (r.revenueDelta < 0) html += `<div class="info-row" style="padding-left:20px;"><span class="info-label" style="color:#f87171">└ 사고 손실</span><span style="color:#f87171">${fmtWon(r.revenueDelta)}</span></div>`;
    html += `<div class="info-row"><span class="info-label">운영비</span><span class="info-value" style="color:#f87171">-${fmtWon(r.operationCost)}</span></div>`;
    if (r.operationCostDelta > 0) html += `<div class="info-row" style="padding-left:20px;"><span class="info-label" style="color:#f87171">└ 사고 추가비용</span><span style="color:#f87171">-${fmtWon(r.operationCostDelta)}</span></div>`;
    html += `<div class="info-row"><span class="info-label">인건비</span><span class="info-value" style="color:#f87171">-${fmtWon(r.laborCost)}</span></div>`;
    html += `<div class="info-row" style="border-top:1px solid #374151; padding-top:6px; margin-top:4px;"><span class="info-label" style="font-weight:bold">영업이익</span><span class="info-value" style="color:${r.operatingProfit>=0?'#a3e635':'#f87171'}; font-size:16px;">${r.operatingProfit>=0?'+':''}${fmtWon(r.operatingProfit)}</span></div>`;
    html += `<div class="info-row"><span class="info-label">이자 지급</span><span class="info-value" style="color:#f87171">-${fmtWon(r.totalInterestPaid)}</span></div>`;
    html += `<div class="info-row" style="border-top:1px solid #374151; padding-top:6px; margin-top:4px;"><span class="info-label" style="font-weight:bold; font-size:16px;">순이익</span><span class="info-value" style="color:${r.netProfit>=0?'#a3e635':'#f87171'}; font-size:18px;">${r.netProfit>=0?'+':''}${fmtWon(r.netProfit)}</span></div>`;

    if (r.interestReport && r.interestReport.penaltiesTriggered && r.interestReport.penaltiesTriggered.length > 0) { // ★ BUG-6 FIX: null 방어
      html += `<div style="font-size:15px; font-weight:bold; color:#dc2626; margin:14px 0 6px 0;">⚡ 페널티 발동</div>`;

        else if (p.type === 'yongpali_appeared') {
          m = '☠ 용팔이 등장! (원금 ' + fmtWon(p.seedAmount) + ') 💎100 지급';

          setTimeout(() => {
            screenFlash.flash('negative');
            toast.show('☠ 용팔이: "선물이야. 근데 이제 내 사람이야."', '#dc2626');
            setTimeout(() => toast.show('💎×100 획득! 이제 하드모드입니다.', '#facc15'), 1500);
            setTimeout(() => toast.show('박신양: "빌리는 순간 이미 지고 있어요."', '#7f1d1d'), 3000);

    // ★ v0.8.0 활성 사건 표시
    const s = window.MJY.gameState.get();
    if (s.activeEvents && s.activeEvents.length > 0) {
