// ── 화면 흔들기 (Screen Shake) ──
const _shake = { x:0, y:0, intensity:0, duration:0, elapsed:0, active:false };
function screenShake(intensity, durationMs) {
  _shake.intensity = intensity || 5;
  _shake.duration = durationMs || 300;
  _shake.elapsed = 0;
  _shake.active = true;
}
function updateScreenShake(dt) {
  if (!_shake.active) { _shake.x=0; _shake.y=0; return; }
  _shake.elapsed += dt;
  if (_shake.elapsed >= _shake.duration) { _shake.active=false; _shake.x=0; _shake.y=0; return; }
  const progress = 1 - _shake.elapsed / _shake.duration;
  const mag = _shake.intensity * progress;
  _shake.x = (Math.random()-0.5)*2*mag;

const _pedestrians = [];
function initPedestrians() {
  const colors = ['#ef4444','#3b82f6','#22c55e','#f59e0b','#8b5cf6','#ec4899'];
  for (let i=0; i<6; i++) {
    _pedestrians.push({
      x: Math.random()*800, y: 120+Math.random()*4,
      speed: 0.3+Math.random()*0.4, dir: Math.random()>0.5?1:-1,
      color: colors[i%colors.length], frame:0, frameTimer:0
    });
  }
}
initPedestrians();

function updatePedestrians() {
  for (const ped of _pedestrians) {
    ped.x += ped.speed * ped.dir;
    ped.frameTimer++;
    if (ped.frameTimer % 12 === 0) ped.frame = (ped.frame+1) % 4;
    if (ped.x > 820) { ped.x = -10; ped.dir = 1; }
    if (ped.x < -20) { ped.x = 820; ped.dir = -1; }
  }
}

function renderPedestrians(bctx) {
  for (const ped of _pedestrians) {
    const px = Math.floor(ped.x), py = Math.floor(ped.y);
    const bobY = (ped.frame%2===0) ? 0 : -1;
    // 머리
    bctx.fillStyle = '#f5d0a9'; bctx.fillRect(px+1, py+bobY, 4, 4);
    // 몸통
    bctx.fillStyle = ped.color; bctx.fillRect(px, py+4+bobY, 6, 5);
    // 다리 (걷기 애니메이션)
    bctx.fillStyle = '#1e293b';
    if (ped.frame === 0 || ped.frame === 2) {
      bctx.fillRect(px+1, py+9+bobY, 2, 3);
      bctx.fillRect(px+3, py+9+bobY, 2, 3);
    } else if (ped.frame === 1) {
      bctx.fillRect(px, py+9+bobY, 2, 3);
      bctx.fillRect(px+4, py+9+bobY, 2, 4);
    } else {
      bctx.fillRect(px, py+9+bobY, 2, 4);
      bctx.fillRect(px+4, py+9+bobY, 2, 3);
    }
  }
}

const _neonSigns = [];
function initNeonSigns() {
  const signs = [
    {x:90, y:85, w:30, h:8, color:'#ef4444', text:'치킨', freq:0.03},
    {x:220, y:82, w:24, h:7, color:'#3b82f6', text:'BAR', freq:0.05},
    {x:370, y:80, w:28, h:8, color:'#22c55e', text:'편의점', freq:0.02},
    {x:530, y:83, w:32, h:7, color:'#f59e0b', text:'CAFE', freq:0.04},
    {x:670, y:81, w:26, h:8, color:'#ec4899', text:'노래방', freq:0.06},
  ];
  signs.forEach(s => _neonSigns.push({...s, phase: Math.random()*Math.PI*2, on:true, flicker:0}));
}
initNeonSigns();

function renderNeonSigns(bctx, isNight) {
  for (const n of _neonSigns) {
    n.phase += n.freq;
    n.flicker = Math.sin(n.phase)*0.5+0.5;
    if (Math.random()<0.005) n.on = !n.on;
    if (!n.on && Math.random()<0.03) n.on = true;
    const baseAlpha = isNight ? 0.9 : 0.4;
    const alpha = n.on ? baseAlpha*n.flicker + baseAlpha*0.3 : 0.05;
    // 간판 뒤 글로우
    if (isNight && n.on) {
      bctx.fillStyle = n.color.replace(')', ',0.15)').replace('rgb','rgba');
      const gx=n.x-4, gy=n.y-4, gw=n.w+8, gh=n.h+8;
      bctx.fillRect(gx, gy, gw, gh);
    }
    bctx.globalAlpha = alpha;
    bctx.fillStyle = '#1a1a2e'; bctx.fillRect(n.x-1, n.y-1, n.w+2, n.h+2);
    bctx.fillStyle = n.color; bctx.fillRect(n.x, n.y, n.w, n.h);
    bctx.fillStyle = '#fff';
    bctx.font = 'bold 6px sans-serif'; bctx.textAlign = 'center'; bctx.textBaseline = 'middle';
    bctx.fillText(n.text, n.x+n.w/2, n.y+n.h/2+1);
    bctx.globalAlpha = 1;
  }
}

// ── 가로등 불빛 애니메이션 ──
function renderStreetLights(bctx, isNight) {
  if (!isNight) return;
  const lampPositions = [60, 180, 320, 460, 600, 740];
  for (const lx of lampPositions) {
    // 가로등 기둥
    bctx.fillStyle = '#4a4a5a'; bctx.fillRect(lx, 90, 3, 28);
    // 등 갓
    bctx.fillStyle = '#6a6a7a'; bctx.fillRect(lx-3, 88, 9, 4);
    // 불빛 (깜빡임)
    const flk = 0.7 + Math.sin(frameCount*0.08+lx)*0.3;
    bctx.globalAlpha = flk;
    bctx.fillStyle = 'rgba(255,220,120,0.5)';
    bctx.beginPath(); bctx.ellipse(lx+1, 92, 18, 30, 0, 0, Math.PI); bctx.fill();
    // 바닥 반사
    bctx.fillStyle = 'rgba(255,220,120,0.08)';
    bctx.beginPath(); bctx.ellipse(lx+1, 155, 35, 6, 0, 0, Math.PI*2); bctx.fill();
    bctx.globalAlpha = 1;
  }
}

function drawSkyBackground() {
  ctx.fillStyle = '#fde68a'; ctx.fillRect(0, 0, LW, 50);
  ctx.fillStyle = '#fcd34d'; ctx.fillRect(0, 50, LW, 30);
  ctx.fillStyle = '#bae6fd'; ctx.fillRect(0, 80, LW, 80);
  const co = (frameCount/4) % 900;
  drawSprite(ctx, SPRITES.cloud, 100-co, 20, 4);
  drawSprite(ctx, SPRITES.cloud, 400-co, 35, 3);

  drawSprite(ctx, SPRITES.cloud, 880-co, 40, 3);
  ctx.fillStyle = '#475569'; ctx.fillRect(0, 130, LW, 60);
  for (let i = 0; i < 12; i++) {
    const sp = i%2===0 ? SPRITES.building1 : SPRITES.building2;
    drawSprite(ctx, sp, i*70+5, 130 - sp.data.length*3, 3);
  }
  ctx.fillStyle = '#374151'; ctx.fillRect(0, 190, LW, 24);
  ctx.fillStyle = '#fbbf24';
  for (let x = 0; x < LW; x += 60) ctx.fillRect(x+10, 201, 30, 2);
  for (const c of cars) {
    if (c.speed > 0) drawSprite(ctx, SPRITES.car, c.x, 195, 2);
    else {
      ctx.save(); ctx.translate(c.x+30, 195); ctx.scale(-1, 1);
      drawSprite(ctx, SPRITES.car, 0, 0, 2); ctx.restore();
    }
  }
}

}

  const news = [];

    }
  });
  return news;
}

// 연도·분기에 해당하는 역사적 이벤트 조회
function getHistoricalEvent(year, quarter) {
  // 정확히 해당 연도 이벤트 탐색
  const ev = HISTORICAL_EVENTS.find(e => e.year === year);
  if (!ev) return null;
  // subEvents 체크 (연도 내 특정 분기)
  if (ev.subEvents) {
    const sub = ev.subEvents.find(s => s.year === year && (!s.q || s.q === quarter));
    if (sub) return {...ev, ...sub, isSubEvent: true};
  }
  return ev;
}

// stockEngine — 주식 가격 계산 엔진
// ══════════════════════════════════════════════════════
const stockEngine = (function() {

  // 분기별 가격 계산
  function calcPrice(code, s) {
    const base = STOCK_DATA[code];
    if (!base) return 0;
    const hist = (s.stocks && s.stocks.priceHistory && s.stocks.priceHistory[code]) || [];
    if (hist.length === 0) return base.basePrice;
    return hist[hist.length - 1];
  }

  // ★ v0.35b 분기 정산 시 가격 갱신 — 역사적 이벤트 연동
  function updatePrices(s) {
    if (!s.stocks) return;
    const macro    = s.stocks.currentMacro;
    const gameYear = s.gameYear || 1985;
    const quarter  = s.quarter  || 1;

    // 역사적 이벤트 조회
    const histEvent = (typeof getHistoricalEvent === 'function')
      ? getHistoricalEvent(gameYear, ((quarter-1)%4)+1)
      : null;

    // 역사적 이벤트 발생 시 알림 예약
    if (histEvent && (!s.stocks._pendingHistEvent || s.stocks._lastHistEventYear !== gameYear)) {
      s.stocks._lastHistEventYear = gameYear;
      s.stocks._pendingHistEvent  = histEvent;
    }

    Object.keys(STOCK_DATA).forEach(code => {
      const stock = STOCK_DATA[code];

      // ── 연도별 기준가 계산 (방법B: 장기 성장 배수 반영)
      const growthMul = (typeof getSectorGrowthMultiple === 'function')
        ? getSectorGrowthMultiple(stock.sector, gameYear)
        : 1.0;
      const yearBasePrice = Math.floor(stock.basePrice * growthMul);

      // ── 현재 히스토리 마지막값 (없으면 연도기반 기준가)
      if (!s.stocks.priceHistory) s.stocks.priceHistory = {};
      if (!s.stocks.priceHistory[code] || s.stocks.priceHistory[code].length === 0) {
        s.stocks.priceHistory[code] = [yearBasePrice];
      }
      const prev = s.stocks.priceHistory[code][s.stocks.priceHistory[code].length - 1];

      // ── 기본 랜덤 변동
      const rand = (Math.random() * 2 - 1) * stock.volatility;

      // ── 역사적 이벤트 효과 (가장 강한 영향)
      let histEffect = 0;
      if (histEvent && histEvent.sectorEffect) {
        histEffect = histEvent.sectorEffect[stock.sector] || (histEvent.globalMul ? histEvent.globalMul - 1 : 0);
        // 이벤트 강도를 분기에 걸쳐 분산 (duration 고려)
        const dur = histEvent.duration || 1;
        histEffect = histEffect / dur;
      }

      // ── 매크로 힌트 효과
      let macroEffect = 0;
      if (macro) {
        if (macro.effect === 'all') macroEffect = macro.dir * 0.06;
        else if (macro.effect === stock.sector) macroEffect = macro.dir * 0.12;
      }

      // ── 세계관 시너지
      let synergyEffect = 0;
      if (stock.synergy === 'bot' && s.botPurchasedThisQuarter) {
        synergyEffect = 0.10;
      }
      if (stock.synergy === 'food_biz') {
        const foodBiz = (s.businesses||[]).filter(b=>b.unlocked && b.category==='food');
        const avgRev  = foodBiz.length > 0
          ? foodBiz.reduce((a,b)=>(a+(b.baseRevenue||0)),0) / foodBiz.length : 0;
        if (avgRev > 2000000) synergyEffect = 0.05;
      }
      if (stock.synergy === 'loan' && (s.loans.bank2>0||s.loans.loanShark>0)) {
        synergyEffect = 0.06;
      }
      if (stock.synergy === 'expansion' && (s.businesses||[]).length > 1) {
        synergyEffect = 0.04;
      }
      // ★ v0.47 G코인 시너지 — 환율과 역연동
      if (stock.synergy === 'gcoin_rate' && typeof GCoinEngine !== 'undefined') {
        const gcRate = GCoinEngine._baseRate(s.quarter||1);
        // 환율 높으면(보석 비쌈) GC 가격 하락, 환율 낮으면 상승 (역연동)
        const rateNorm = (gcRate - 10000) / 10000; // -1~+1 정규화
        synergyEffect = -rateNorm * 0.15; // 역연동
      }

      // ── 종목 뉴스 효과
      let newsEffect = 0;
      if (s.stocks.currentNews) {
        const newsItem = s.stocks.currentNews.find(n => n.code === code);
        if (newsItem) newsEffect = newsItem.priceEffect;
      }

      // ── 장기 평균회귀 (기준가와 현재가 괴리 조정)
      const gapRatio  = yearBasePrice > 0 ? (prev - yearBasePrice) / yearBasePrice : 0;
      const meanRevert = -gapRatio * 0.08; // 괴리의 8%씩 회귀

      // ── 최종 가격
      const change   = rand + histEffect + macroEffect + synergyEffect + newsEffect + meanRevert;
      const rawPrice = Math.floor(prev * (1 + change));
      // 하한: yearBasePrice의 30% / 상한: yearBasePrice의 500%
      const newPrice = Math.max(
        Math.floor(yearBasePrice * 0.30),
        Math.min(Math.floor(yearBasePrice * 5.0), rawPrice)
      );

      s.stocks.priceHistory[code].push(newPrice);
      if (s.stocks.priceHistory[code].length > 12)
        s.stocks.priceHistory[code].shift();
    });

    // 다음 분기 매크로 힌트
    // 역사적 이벤트가 있으면 그에 맞는 매크로로 교체
    if (histEvent) {
      const mainSector = Object.entries(histEvent.sectorEffect||{})
        .sort((a,b)=>Math.abs(b[1])-Math.abs(a[1]))[0];
      const isNeg = mainSector && mainSector[1] < 0;
      s.stocks.nextMacro = {
        keyword: histEvent.name,
        effect:  mainSector ? mainSector[0] : 'all',
        dir:     isNeg ? -1 : +1,
        desc:    histEvent.desc,
        isHistorical: true,
      };
    } else {
      s.stocks.nextMacro = MACRO_HINTS[Math.floor(Math.random()*MACRO_HINTS.length)];
    }
  }

  // 배당 지급
  function payDividends(s) {
    if (!s.stocks || !s.stocks.portfolio) return 0;
    let total = 0;
    Object.keys(s.stocks.portfolio).forEach(code => {
      const holding = s.stocks.portfolio[code];
      if (!holding || holding.shares <= 0) return;
      const stock = STOCK_DATA[code];
      if (!stock) return;
      const price = calcPrice(code, s);
      const div = Math.floor(price * holding.shares * stock.dividendRate);
      total += div;
      holding.dividendReceived = (holding.dividendReceived||0) + div;
    });
    s.cash += total;
    return total;
  }

  // 매수 처리
  function buyStock(s, code, shares) {
    const stock = STOCK_DATA[code];
    if (!stock) return {ok:false, reason:'not_found'};
    if (!s.stocks) s.stocks = initStocksState();
    if (!s.stocks.unlocked) return {ok:false, reason:'locked'};

    const price = calcPrice(code, s);
    const cost  = price * shares;
    const fee   = Math.floor(cost * 0.00015); // 거래세 0.015%
    const total = cost + fee;

    if (s.cash < total) return {ok:false, reason:'cash', need:total};

    s.cash -= total;
    if (!s.stocks.portfolio[code]) {
      s.stocks.portfolio[code] = {shares:0, avgPrice:0, dividendReceived:0};
    }
    const h = s.stocks.portfolio[code];
    h.avgPrice = Math.floor((h.avgPrice * h.shares + price * shares) / (h.shares + shares));
    h.shares  += shares;
    s.stocks.totalTraded = (s.stocks.totalTraded||0) + total;
    recordTrade(s, 'buy', code, shares, price, 0);
    return {ok:true, price, shares, fee, total};
  }

  // 매도 처리
  function sellStock(s, code, shares) {
    if (!s.stocks || !s.stocks.portfolio[code]) return {ok:false, reason:'no_holding'};
    const h = s.stocks.portfolio[code];
    if (h.shares < shares) return {ok:false, reason:'insufficient', have:h.shares};

    const price   = calcPrice(code, s);
    const revenue = price * shares;
    const fee     = Math.floor(revenue * 0.00015);
    const profit  = revenue - h.avgPrice * shares;

    s.cash += revenue - fee;
    h.shares -= shares;
    if (h.shares === 0) { h.avgPrice = 0; }

    // 손실 시 용팔이 이자 소폭 증가 (달리오·사마의 원칙)
    if (profit < 0) {
      const penalty = Math.floor(Math.abs(profit) * 0.05); // 손실의 5% 이자 페널티
      s.yongpaliAccumInterest = (s.yongpaliAccumInterest||0) + penalty;
      return {ok:true, price, shares, fee, revenue, profit, yongpaliPenalty: penalty};
    }
    recordTrade(s, 'sell', code, shares, price, profit);
    return {ok:true, price, shares, fee, revenue, profit, yongpaliPenalty:0};
  }

  function initStocksState() {
    return {
      unlocked: false,
      portfolio: {},          // {code: {shares, avgPrice, dividendReceived}}
      shorts: {},             // ★ v0.35 공매도 {code: {shares, avgPrice, margin}}
      priceHistory: {},       // {code: [price1, price2, ...]}
      currentMacro: null,     // 이번 분기 매크로
      nextMacro: null,        // 다음 분기 예고
      currentNews: [],        // ★ v0.35 이번 분기 종목 뉴스
      tradeHistory: [],       // ★ v0.35 거래 내역
      priceTargets: {},       // ★ v0.35 목표가 {code: {type, price}}
      totalTraded: 0,
      totalDividend: 0,
    };
  }


  // ★ v0.35 거래 내역 기록
  function recordTrade(s, type, code, shares, price, profit) {
    if (!s.stocks.tradeHistory) s.stocks.tradeHistory = [];
    s.stocks.tradeHistory.unshift({
      type, code, shares, price, profit: profit||0,
      quarter: s.quarter,
      name: STOCK_DATA[code] ? STOCK_DATA[code].name : code,
    });
    if (s.stocks.tradeHistory.length > 30) s.stocks.tradeHistory.pop();
  }

  // ★ v0.35 공매도 (숏셀링)
  function shortSell(s, code, shares) {
    const stock = STOCK_DATA[code];
    if (!stock) return {ok:false, reason:'not_found'};
    const price  = calcPrice(code, s);
    const margin = Math.floor(price * shares * 0.5); // 증거금 50%
    if (s.cash < margin) return {ok:false, reason:'margin', need:margin};
    s.cash -= margin;
    if (!s.stocks.shorts) s.stocks.shorts = {};
    if (!s.stocks.shorts[code]) s.stocks.shorts[code] = {shares:0, avgPrice:0, margin:0};
    const sh = s.stocks.shorts[code];
    sh.avgPrice = Math.floor((sh.avgPrice*sh.shares + price*shares)/(sh.shares+shares));
    sh.shares  += shares;
    sh.margin  += margin;
    recordTrade(s, 'short', code, shares, price, 0);
    return {ok:true, price, shares, margin};
  }

  // ★ v0.35 공매도 청산
  function coverShort(s, code, shares) {
    if (!s.stocks.shorts || !s.stocks.shorts[code]) return {ok:false, reason:'no_short'};
    const sh    = s.stocks.shorts[code];
    if (sh.shares < shares) return {ok:false, reason:'insufficient', have:sh.shares};
    const price  = calcPrice(code, s);
    const profit = (sh.avgPrice - price) * shares; // 하락하면 이익
    const returnMargin = Math.floor(sh.margin * (shares/sh.shares));
    s.cash += returnMargin + profit;
    sh.shares -= shares;
    sh.margin -= returnMargin;
    if (sh.shares === 0) { sh.avgPrice = 0; sh.margin = 0; }
    // 손실 시 용팔이 페널티
    const yongpaliPenalty = profit < 0 ? Math.floor(Math.abs(profit)*0.05) : 0;
    if (yongpaliPenalty > 0) s.yongpaliAccumInterest = (s.yongpaliAccumInterest||0) + yongpaliPenalty;
    recordTrade(s, 'cover', code, shares, price, profit);
    return {ok:true, price, shares, profit, yongpaliPenalty};
  }

  // ★ v0.35 목표가 체크 (분기별)
  function checkPriceTargets(s) {
    if (!s.stocks || !s.stocks.priceTargets) return [];
    const triggered = [];
    Object.keys(s.stocks.priceTargets).forEach(code => {
      const target = s.stocks.priceTargets[code];
      const price  = calcPrice(code, s);
      if (target.type === 'above' && price >= target.price) {
        triggered.push({code, price, target: target.price, type:'above',
          name: STOCK_DATA[code] ? STOCK_DATA[code].name : code});
        delete s.stocks.priceTargets[code];
      } else if (target.type === 'below' && price <= target.price) {
        triggered.push({code, price, target: target.price, type:'below',
          name: STOCK_DATA[code] ? STOCK_DATA[code].name : code});
        delete s.stocks.priceTargets[code];
      }
    });
    return triggered;
  }

  // ★ v0.35 뉴스 효과를 updatePrices에 반영 → 기존 updatePrices 교체

  return {
    calcPrice, updatePrices, payDividends,
    buyStock, sellStock, initStocksState,
    shortSell, coverShort, checkPriceTargets, recordTrade,
    STOCK_DATA
  };
})();

// ★ v0.37f 선물 실시간 틱 타이머 (장 = 탭이 열린 시간)
const futuresTicker = (function() {
  let _interval  = null;
  let _callback  = null;
  let _tickData  = {};  // code → [가격 배열]
  let _isRunning = false;
  // ★ v0.49 C안: 체결강도 + 시고저 + 미결제약정 추가
  let _buyCount  = {};  // code → 매수체결 카운트 (현재 세션)
  let _sellCount = {};  // code → 매도체결 카운트
  let _ohlc      = {};  // code → {open, high, low}
  let _oi        = {};  // code → 미결제약정 시뮬값

  function start(futuresState, baseData, callback) {
    stop();
    _callback  = callback;
    _isRunning = true;

    // 초기 틱 데이터: 현재 분기 히스토리 기반
    Object.keys(baseData).forEach(code => {
      const hist = (futuresState.priceHistory && futuresState.priceHistory[code]) || [];
      const lastP = hist.length > 0 ? hist[hist.length-1] : baseData[code].basePrice;
      // 30틱 초기화
      _tickData[code] = Array(30).fill(lastP);
      // ★ 초기화
      _buyCount[code]  = Math.floor(Math.random()*40 + 20);
      _sellCount[code] = Math.floor(Math.random()*40 + 20);
      _ohlc[code]      = { open: lastP, high: lastP, low: lastP };
      _oi[code]        = Math.floor(Math.random()*2000 + 500);
    });

    // 2초마다 틱 업데이트
    _interval = setInterval(() => {
      Object.keys(baseData).forEach(code => {
        const fut  = baseData[code];
        const prev = _tickData[code][_tickData[code].length-1];
        // 선물 틱 변동: volatility의 1/10 수준
        const tickV = fut.tickVolatility || (fut.volatility * 0.08);
        const micro = (Math.random()*2-1) * tickV;
        const newP  = Math.max(10, Math.floor(prev * (1 + micro)));
        _tickData[code].push(newP);
        if (_tickData[code].length > 120) _tickData[code].shift();
        // ★ 체결강도: 가격 오르면 매수, 내리면 매도 가중
        if (newP > prev) {
          _buyCount[code]  += Math.floor(Math.random()*3 + 1);
          _sellCount[code] += Math.floor(Math.random()*1);
        } else if (newP < prev) {
          _sellCount[code] += Math.floor(Math.random()*3 + 1);
          _buyCount[code]  += Math.floor(Math.random()*1);
        } else {
          _buyCount[code]  += Math.floor(Math.random()*2);
          _sellCount[code] += Math.floor(Math.random()*2);
        }
        // 카운트 최대 500으로 스케일 유지
        if (_buyCount[code] + _sellCount[code] > 500) {
          _buyCount[code]  = Math.floor(_buyCount[code]  * 0.9);
          _sellCount[code] = Math.floor(_sellCount[code] * 0.9);
        }
        // ★ 시고저 갱신
        _ohlc[code].high = Math.max(_ohlc[code].high, newP);
        _ohlc[code].low  = Math.min(_ohlc[code].low,  newP);
        // ★ 미결제약정 소폭 변동
        _oi[code] += Math.floor((Math.random()*6-2));
        _oi[code] = Math.max(100, _oi[code]);
      });
      if (_callback) _callback(_tickData);
    }, 2000);
  }

  function stop() {
    if (_interval) { clearInterval(_interval); _interval = null; }
    _isRunning = false;
    _callback  = null;
  }

  function getTicks(code) { return _tickData[code] || []; }
  // ★ v0.49 신규 접근자
  function getStrength(code) {
    const b = _buyCount[code] || 1, s = _sellCount[code] || 1;
    return Math.round(b / (b + s) * 100); // 0~100, 50=균형
  }
  function getOHLC(code) { return _ohlc[code] || null; }
  function getOI(code)   { return _oi[code]   || 0;   }
  function isRunning() { return _isRunning; }

  return { start, stop, getTicks, getStrength, getOHLC, getOI, isRunning };
})();

const futuresEngine = (function() {

  function calcFuturesPrice(code, s) {
    const base = FUTURES_DATA[code];
    if (!base) return 0;
    const hist = (s.futures && s.futures.priceHistory && s.futures.priceHistory[code]) || [];
    return hist.length > 0 ? hist[hist.length-1] : base.basePrice;
  }

  function updateFuturesPrices(s) {
    if (!s.futures) return;
    const gameYear = s.gameYear || 1985;
    const histEffect = FUTURES_HISTORICAL[gameYear] || {};

    if (!s.futures.priceHistory) s.futures.priceHistory = {};

    Object.keys(FUTURES_DATA).forEach(code => {
      const fut  = FUTURES_DATA[code];
      const prev = calcFuturesPrice(code, s);

      const rand    = (Math.random()*2-1) * fut.volatility;
      const hEffect = histEffect[code] || 0;

      // 세계관 시너지
      let syn = 0;
      if (fut.synergy === 'delivery') {
        const hasDel = (s.businesses||[]).some(b=>b.unlocked && b.category==='delivery');
        if (hasDel) syn = 0.05;
      }
      if (fut.synergy === 'expansion' && (s.businesses||[]).length > 2) syn = 0.04;
      // 천연가스 — 1분기(겨울) 급등
      if (fut.synergy === 'season') {
        const q = ((s.quarter-1) % 4) + 1;
        if (q === 1) syn = 0.15;   // 겨울 분기 급등
        if (q === 3) syn = -0.08;  // 여름 분기 약세
      }
      // 밀 — 외식업 원가 연동
      if (fut.synergy === 'food_cost') {
        const foodBiz = (s.businesses||[]).filter(b=>b.unlocked && b.category==='food');
        if (foodBiz.length > 0) syn = 0.04;
      }
      // 나스닥 — 봇 구매 분기 시 AI 테마 강세
      if (fut.synergy === 'tech' && s.botPurchasedThisQuarter) syn = 0.12;
      // BTC — 극고위험, 블랙스완 확률 2배
      if (fut.synergy === 'highRisk') syn = (Math.random()*2-1) * 0.05;
      // ★ v0.47 GC 선물 — 환율 역연동 + 추가 노이즈
      if (fut.synergy === 'gcoin_rate' && typeof GCoinEngine !== 'undefined') {
        const gcRate = GCoinEngine._baseRate(s.quarter||1);
        const rateNorm = (gcRate - 10000) / 10000;
        syn = -rateNorm * 0.18 + (Math.random()*0.12 - 0.06); // 역연동 + 노이즈
      }

      const change = rand + hEffect * 0.5 + syn;
      const newPrice = Math.max(100, Math.floor(prev * (1 + change)));

      if (!s.futures.priceHistory[code]) s.futures.priceHistory[code] = [fut.basePrice];
      s.futures.priceHistory[code].push(newPrice);
      if (s.futures.priceHistory[code].length > 12) s.futures.priceHistory[code].shift();
    });

    // 블랙스완 체크 (20분기 1회)
    if (s.quarter > 0 && s.quarter % 20 === 0 && !s.futures._blackSwanUsed) {
      s.futures._blackSwanUsed = true;
      s.futures._pendingBlackSwan = true;
    }
    if (s.futures._pendingBlackSwan) {
      s.futures._pendingBlackSwan = false;
      const shock = (Math.random() > 0.5 ? 1 : -1) * (0.30 + Math.random()*0.20);
      Object.keys(FUTURES_DATA).forEach(code => {
        const hist = s.futures.priceHistory[code];
        if (hist && hist.length > 0) {
          hist[hist.length-1] = Math.max(100, Math.floor(hist[hist.length-1]*(1+shock)));
        }
      });
      s.futures._lastBlackSwanShock = shock;
    }
  }

  function openPosition(s, code, direction, lots, leverage) {
    const fut = FUTURES_DATA[code];
    if (!fut) return {ok:false, reason:'not_found'};
    if (!s.futures || !s.futures.unlocked) return {ok:false, reason:'locked'};

    const price    = calcFuturesPrice(code, s);
    const lev      = Math.min(leverage||1, 5);
    const notional = price * lots * lev * 10000;  // 1랏 = 10000배수
    const margin   = Math.floor(notional * 0.20); // 증거금 20%
    if (s.cash < margin) return {ok:false, reason:'margin', need:margin};

    s.cash -= margin;
    if (!s.futures.positions) s.futures.positions = {};
    const posKey = code + '_' + direction;
    if (!s.futures.positions[posKey]) {
      s.futures.positions[posKey] = {code, direction, lots:0, avgPrice:0, leverage:lev, margin:0};
    }
    const pos = s.futures.positions[posKey];
    pos.avgPrice = Math.floor((pos.avgPrice*pos.lots + price*lots) / (pos.lots+lots));
    pos.lots    += lots;
    pos.margin  += margin;
    pos.leverage = lev;

    // 거래 기록
    if (!s.futures.tradeHistory) s.futures.tradeHistory = [];
    s.futures.tradeHistory.unshift({type:'open', direction, code, lots, price, leverage:lev, margin, quarter:s.quarter, name:fut.name});
    if (s.futures.tradeHistory.length > 30) s.futures.tradeHistory.pop();

    return {ok:true, price, lots, leverage:lev, margin, notional};
  }

  function closePosition(s, code, direction, lots) {
    if (!s.futures || !s.futures.positions) return {ok:false, reason:'no_position'};
    const posKey = code + '_' + direction;
    const pos    = s.futures.positions[posKey];
    if (!pos || pos.lots <= 0) return {ok:false, reason:'no_position'};

    const closeLots = Math.min(lots, pos.lots);
    const price     = calcFuturesPrice(code, s);
    const lev       = pos.leverage || 1;
    const notional  = pos.avgPrice * closeLots * lev * 10000;

    // 손익 계산
    const priceDiff = direction === 'long' ? price - pos.avgPrice : pos.avgPrice - price;
    const rawProfit = priceDiff * closeLots * lev * 10000;
    const returnMargin = Math.floor(pos.margin * (closeLots/pos.lots));

    s.cash += returnMargin + rawProfit;
    pos.lots   -= closeLots;
    pos.margin -= returnMargin;
    if (pos.lots <= 0) { pos.avgPrice = 0; pos.margin = 0; }

    // 손실 시 용팔이 이자 가산
    let yongpaliPenalty = 0;
    if (rawProfit < 0) {
      yongpaliPenalty = Math.floor(Math.abs(rawProfit) * 0.05);
      s.yongpaliAccumInterest = (s.yongpaliAccumInterest||0) + yongpaliPenalty;
    }

    // 원유 롱 청산 시 배달 헤지 효과 제거
    if (code === 'OIL' && direction === 'long') {
      s.futures._oilHedgeActive = pos.lots > 0;
    }

    if (!s.futures.tradeHistory) s.futures.tradeHistory = [];
    s.futures.tradeHistory.unshift({
      type:'close', direction, code, lots:closeLots, price,
      profit:rawProfit, yongpaliPenalty, quarter:s.quarter,
      name: FUTURES_DATA[code] ? FUTURES_DATA[code].name : code
    });

    return {ok:true, price, lots:closeLots, profit:rawProfit, returnMargin, yongpaliPenalty};
  }

  // 마진콜 체크 (분기마다)
  function checkMarginCalls(s) {
    if (!s.futures || !s.futures.positions) return [];
    const calls = [];
    Object.keys(s.futures.positions).forEach(posKey => {
      const pos = s.futures.positions[posKey];
      if (!pos || pos.lots <= 0) return;
      const price    = calcFuturesPrice(pos.code, s);
      const lev      = pos.leverage || 1;
      const priceDiff= pos.direction==='long' ? price-pos.avgPrice : pos.avgPrice-price;
      const unrealPnl= priceDiff * pos.lots * lev * 10000;
      // 증거금의 50% 이상 손실 → 마진콜
      if (unrealPnl < 0 && Math.abs(unrealPnl) >= pos.margin * 0.50) {
        // 강제 청산
        const r = closePosition(s, pos.code, pos.direction, pos.lots);
        calls.push({code:pos.code, direction:pos.direction, profit:r.ok?r.profit:0,
          yongpaliPenalty: r.ok?r.yongpaliPenalty:0,
          name: FUTURES_DATA[pos.code] ? FUTURES_DATA[pos.code].name : pos.code,
          extra: Math.floor(Math.abs(r.ok?r.profit:0)*0.10)  // 마진콜 추가 페널티
        });
        if (r.ok && calls[calls.length-1].extra > 0) {
          s.yongpaliAccumInterest = (s.yongpaliAccumInterest||0) + calls[calls.length-1].extra;
        }
      }
    });
    return calls;
  }

  // 원유 롱 헤지 효과 (배달 운영비 절감)
  function getOilHedgeEffect(s) {
    if (!s.futures || !s.futures.positions) return 0;
    const oilLong = s.futures.positions['OIL_long'];
    if (oilLong && oilLong.lots > 0) return 0.10; // 10% 절감
    return 0;
  }

  function initFuturesState() {
    return {
      unlocked: false,
      positions: {},
      priceHistory: {},
      tradeHistory: [],
      _oilHedgeActive: false,
      _blackSwanUsed: false,
      _pendingBlackSwan: false,
      _lastBlackSwanShock: 0,
      _tutorialDone: false,   // ★ v0.37b 첫 진입 튜토리얼 완료 여부
    };
  }

  return {
    calcFuturesPrice, updateFuturesPrices, openPosition, closePosition,
    checkMarginCalls, getOilHedgeEffect, initFuturesState,
    FUTURES_DATA
  };
})();

// 환율 시스템 (원/달러)
const EXCHANGE_RATE_BASE = 1350;

function calcExchangeRate(s) {
  if (!s.foreignStocks) return EXCHANGE_RATE_BASE;
  return s.foreignStocks.exchangeRate || EXCHANGE_RATE_BASE;
}

function updateExchangeRate(s) {
  const prev = calcExchangeRate(s);
  // 매 분기 ±5~15% 변동
  const change = (Math.random()*0.20 - 0.10);
  const newRate = Math.max(900, Math.min(2000, Math.floor(prev*(1+change))));
  if (!s.foreignStocks) return EXCHANGE_RATE_BASE;
  s.foreignStocks.exchangeRate = newRate;
  return newRate;
}

// 초단위 틱 가격 시뮬레이터 (모달 열려있는 동안)
const foreignStockTicker = (function() {
  let _interval = null;
  let _callback  = null;
  let _tickData  = {};  // code → [최근 60틱 가격]

  function start(stocks, baseData, callback) {
    stop();
    _callback = callback;
    // 초기 틱 데이터
    Object.keys(baseData).forEach(code => {
      const lastP = stocks && stocks.priceHistory && stocks.priceHistory[code]
        ? stocks.priceHistory[code][stocks.priceHistory[code].length-1]
        : baseData[code].basePrice;
      _tickData[code] = Array(60).fill(lastP);
    });
    // 2초마다 틱 업데이트
    _interval = setInterval(() => {
      Object.keys(baseData).forEach(code => {
        const stock = baseData[code];
        const prev  = _tickData[code][_tickData[code].length-1];
        // 틱 변동: 매우 작은 랜덤 + 약한 평균회귀
        const micro  = (Math.random()*2-1) * stock.tickVolatility;
        const newP   = Math.max(10, Math.floor(prev*(1+micro)));
        _tickData[code].push(newP);
        if (_tickData[code].length > 120) _tickData[code].shift();
      });
      if (_callback) _callback(_tickData);
    }, 2000);
  }

  function stop() {
    if (_interval) { clearInterval(_interval); _interval = null; }
    _callback = null;
  }

  function getTicks(code) { return _tickData[code] || []; }

  return { start, stop, getTicks };
})();

// 해외주식 엔진
const foreignStockEngine = (function() {

  function calcPrice(code, s) {
    const base = FOREIGN_STOCK_DATA[code];
    if (!base) return 0;
    const hist = (s.foreignStocks && s.foreignStocks.priceHistory && s.foreignStocks.priceHistory[code]) || [];
    return hist.length > 0 ? hist[hist.length-1] : base.basePrice;
  }

  // KRW 환산 가격
  function calcPriceKRW(code, s) {
    return Math.floor(calcPrice(code, s) * calcExchangeRate(s));
  }

  function updatePrices(s) {
    if (!s.foreignStocks) return;
    const gameYear = s.gameYear || 1985;

    // 환율 갱신
    updateExchangeRate(s);
    const exRate = calcExchangeRate(s);

    Object.keys(FOREIGN_STOCK_DATA).forEach(code => {
      const stock = FOREIGN_STOCK_DATA[code];
      const prev  = calcPrice(code, s);

      const rand = (Math.random()*2-1) * stock.volatility;

      // 세계관 시너지
      let syn = 0;
      if (stock.synergy==='bot' && s.botPurchasedThisQuarter) syn = 0.15;
      if (stock.synergy==='reputation' && (s.reputation||50) > 70) syn = 0.08;
      if (stock.synergy==='oil_inverse' && s.futures && s.futures.positions) {
        const oilPos = s.futures.positions['OIL_long'];
        if (oilPos && oilPos.lots > 0) syn = -0.06; // 원유 롱 보유 시 역연동
      }
      // 환율 상승이면 수출주 수혜
      if (stock.synergy==='exchange_rate' && exRate > EXCHANGE_RATE_BASE) {
        syn = 0.05 * ((exRate - EXCHANGE_RATE_BASE) / EXCHANGE_RATE_BASE);
      }

      // 역사적 이벤트 연동 (AI붐 시 기술주 강세)
      let histEffect = 0;
      if (gameYear >= 2023 && code === 'NVTECH')   histEffect = +0.15;
      if (gameYear === 2020)                         histEffect = -0.20;
      if (gameYear === 2008)                         histEffect = -0.35;

      const change   = rand + syn + histEffect * 0.3;
      const newPrice = Math.max(10, Math.floor(prev*(1+change)));

      if (!s.foreignStocks.priceHistory) s.foreignStocks.priceHistory = {};
      if (!s.foreignStocks.priceHistory[code]) {
        s.foreignStocks.priceHistory[code] = [stock.basePrice];
      }
      s.foreignStocks.priceHistory[code].push(newPrice);
      if (s.foreignStocks.priceHistory[code].length > 12) {
        s.foreignStocks.priceHistory[code].shift();
      }
    });
  }

  function buyStock(s, code, shares) {
    const stock = FOREIGN_STOCK_DATA[code];
    if (!stock) return {ok:false, reason:'not_found'};
    if (!s.foreignStocks || !s.foreignStocks.unlocked) return {ok:false, reason:'locked'};

    const priceKRW = calcPriceKRW(code, s);
    const total    = priceKRW * shares;
    const fee      = Math.floor(total * 0.0015); // 해외 수수료 0.15%
    if (s.cash < total + fee) return {ok:false, reason:'cash', need:total+fee};

    s.cash -= (total + fee);
    if (!s.foreignStocks.portfolio) s.foreignStocks.portfolio = {};
    if (!s.foreignStocks.portfolio[code]) {
      s.foreignStocks.portfolio[code] = {shares:0, avgPriceUSD:0, avgPriceKRW:0, dividendReceived:0};
    }
    const h = s.foreignStocks.portfolio[code];
    const priceUSD = calcPrice(code, s);
    h.avgPriceUSD = Math.floor((h.avgPriceUSD*h.shares + priceUSD*shares)/(h.shares+shares));
    h.avgPriceKRW = Math.floor((h.avgPriceKRW*h.shares + priceKRW*shares)/(h.shares+shares));
    h.shares += shares;

    if (!s.foreignStocks.tradeHistory) s.foreignStocks.tradeHistory = [];
    s.foreignStocks.tradeHistory.unshift({
      type:'buy', code, shares, priceUSD, priceKRW,
      quarter:s.quarter, name:stock.name, exRate:calcExchangeRate(s)
    });
    return {ok:true, priceUSD, priceKRW, shares, fee, total};
  }

  function sellStock(s, code, shares) {
    if (!s.foreignStocks || !s.foreignStocks.portfolio) return {ok:false, reason:'no_holding'};
    const h = s.foreignStocks.portfolio[code];
    if (!h || h.shares < shares) return {ok:false, reason:'insufficient'};

    const priceKRW = calcPriceKRW(code, s);
    const revenue  = priceKRW * shares;
    const fee      = Math.floor(revenue * 0.0015);
    const profit   = revenue - h.avgPriceKRW * shares;

    s.cash += revenue - fee;
    h.shares -= shares;
    if (h.shares === 0) { h.avgPriceUSD = 0; h.avgPriceKRW = 0; }

    // 손실 시 용팔이 페널티
    const yongpaliPenalty = profit < 0 ? Math.floor(Math.abs(profit)*0.05) : 0;
    if (yongpaliPenalty > 0) s.yongpaliAccumInterest = (s.yongpaliAccumInterest||0) + yongpaliPenalty;

    if (!s.foreignStocks.tradeHistory) s.foreignStocks.tradeHistory = [];
    s.foreignStocks.tradeHistory.unshift({
      type:'sell', code, shares, priceKRW, profit, yongpaliPenalty,
      quarter:s.quarter, name:FOREIGN_STOCK_DATA[code].name
    });
    return {ok:true, priceKRW, shares, fee, revenue, profit, yongpaliPenalty};
  }

  function payDividends(s) {
    if (!s.foreignStocks || !s.foreignStocks.portfolio) return 0;
    let total = 0;
    const exRate = calcExchangeRate(s);
    Object.keys(s.foreignStocks.portfolio).forEach(code => {
      const h = s.foreignStocks.portfolio[code];
      if (!h || h.shares <= 0) return;
      const stock   = FOREIGN_STOCK_DATA[code];
      const priceUSD= calcPrice(code, s);
      const divUSD  = priceUSD * h.shares * stock.dividendRate;
      const divKRW  = Math.floor(divUSD * exRate);
      total += divKRW;
      h.dividendReceived = (h.dividendReceived||0) + divKRW;
    });
    s.cash += total;
    return total;
  }

  function initForeignStocksState() {
    return {
      unlocked: false,
      portfolio: {},
      priceHistory: {},
      tradeHistory: [],
      exchangeRate: EXCHANGE_RATE_BASE,
      exchangeRateHistory: [],
    };
  }

  return {
    calcPrice, calcPriceKRW, updatePrices,
    buyStock, sellStock, payDividends,
    initForeignStocksState,
    FOREIGN_STOCK_DATA
  };
})();

const sceneManager = {

  // 📊 재무재표 탭
  _renderPnL: function(s, gs) {

    const curRev = gs.getQuarterlyRevenue();
    const curOp = gs.getQuarterlyOperationCost();

    s.businesses.forEach(b => { b.employees.forEach(e => { curLabor += (SAL[e.grade] || 0); }); });
    const curOpProfit = curRev - curOp - curLabor;

    const hist = s.history || [];
    let totalRev=0, totalOp=0, totalLabor=0, totalInt=0, totalNet=0;
    hist.forEach(r => {
      totalRev += r.revenue || 0;

        <div class="info-row"><span class="info-label">(-) 누적 인건비</span><span class="info-value" style="color:#f87171">-${fmtWon(totalLabor)}</span></div>

        <div class="info-row" style="border-top:1px solid #374151; padding-top:6px; margin-top:6px;">
          <span class="info-label" style="font-weight:bold;">= 누적 순이익</span>
          <span class="info-value" style="color:${totalNet>=0?'#facc15':'#f87171'}; font-size:18px;">${totalNet>=0?'+':''}${fmtWon(totalNet)}</span>
        </div>
      </div>
    `;
  },
  // 🏢 사업체별 탭
  _renderBizStats: function(s, gs) {
    if (s.businesses.length === 0) {
      return `<div class="info-panel"><div style="text-align:center; padding:20px; color:#94a3b8;">사업체가 없습니다.</div></div>`;
    }
    const SAL = window.MJY.payrollEngine.SALARY;
    let html = '';
    s.businesses.forEach(b => {
      const cat = gs.BUSINESS_CATEGORIES[b.category] || gs.BUSINESS_CATEGORIES.food;
      // 봇 추가 매출 합산
      let botRev = 0;
      b.bots.forEach(bot => {
        botRev += (gs.BOT_REVENUE_BY_LEVEL[bot.level] || 0);
      });
      const rev = (b.baseRevenue || 0) + botRev;
      const op = b.operationCost || 0;
      let labor = 0;
      b.employees.forEach(e => { labor += (SAL[e.grade] || 0); });
      const profit = rev - op - labor;
      const profitColor = profit >= 0 ? '#facc15' : '#f87171';
      html += `
        <div class="info-panel" style="border-color:#3a3a5a;">
          <div style="display:flex; align-items:center; gap:10px; margin-bottom:8px;">
            <div style="font-size:28px;">${cat.emoji}</div>
            <div style="flex:1;">
              <div style="font-size:16px; font-weight:bold; color:#fbbf24;">${htmlEscape(b.name)}</div>
              <div style="font-size:11px; color:#94a3b8;">${cat.label} · 봇 ${b.bots.length}/${b.maxBots} · 직원 ${b.employees.length}/${b.maxEmployees}</div>
            </div>
          </div>
          <div class="info-row"><span class="info-label">매출/분기</span><span class="info-value" style="color:#a3e635">+${fmtWon(rev)}</span></div>
          <div class="info-row"><span class="info-label">운영비/분기</span><span class="info-value" style="color:#f87171">-${fmtWon(op)}</span></div>
          <div class="info-row"><span class="info-label">인건비/분기</span><span class="info-value" style="color:#f87171">-${fmtWon(labor)}</span></div>
          <div class="info-row" style="border-top:1px solid #374151; padding-top:6px; margin-top:6px;">
            <span class="info-label" style="font-weight:bold;">= 영업이익</span>
            <span class="info-value" style="color:${profitColor}; font-size:15px;">${profit>=0?'+':''}${fmtWon(profit)}</span>
          </div>
        </div>
      `;
    });
    return html;
  },
  update: function() {},
};


/* ─── 사업확장 메뉴 (HTML 모달) ─── */
scenes.expansionMenu = {
  isModal: true,
  enter: function() { this.render(); },
  exit: function() {
    modal.close();
    // ★ v0.37 해외주식 + 선물 틱 타이머 정지
    if (typeof foreignStockTicker !== 'undefined') foreignStockTicker.stop();
    if (typeof futuresTicker !== 'undefined') futuresTicker.stop();
  },
  render: function() {
    const s = window.MJY.gameState.get();
    const gs = window.MJY.gameState;
    const stage = gs.getCurrentStage();
    const stages = gs.STAGES;
    const curIdx = stages.findIndex(st=>st.key===s.businessStage);
    const nextStage = stages[curIdx+1] || null;
    const usedSlots = s.businesses.length;
    const maxSlots = stage.slots;
    const slotsLeft = Math.max(0, maxSlots - usedSlots);

    let html = `
      <div class="info-panel" style="border-color:#0ea5e9;">
        <div class="info-row"><span class="info-label">🏢 현재 단계</span><span class="info-value" style="color:#0ea5e9; font-size:16px;">${stage.label}</span></div>
        <div class="info-row"><span class="info-label">📊 사업 슬롯</span><span class="info-value">${usedSlots} / ${maxSlots===999?'∞':maxSlots} ${slotsLeft>0?'(남은 '+slotsLeft+')':'(가득참)'}</span></div>
        <div class="info-row"><span class="info-label">💰 잔고</span><span class="info-value" style="color:#a3e635">${fmtWon(s.cash)}</span></div>
        <div class="info-row"><span class="info-label">📈 누적 순이익</span><span class="info-value">${fmtWon(s.cumulativeProfit)}</span></div>
    `;
    if (nextStage) {
      const need = nextStage.promotion - s.cumulativeProfit;
      const pct = Math.min(100, (s.cumulativeProfit / nextStage.promotion * 100)).toFixed(1);
      html += `
        <div class="info-row" style="border-top:1px solid #374151; padding-top:6px; margin-top:6px;">
          <span class="info-label">다음 단계</span>
          <span style="color:#fbbf24">${nextStage.label} (${pct}%)</span>
        </div>
        <div style="font-size:12px; color:#94a3b8; margin-top:4px;">${need>0 ? '남은 누적 ' + fmtWon(need) : '✨ 승급 가능!'}</div>
      `;
    } else {
      html += `<div style="font-size:12px; color:#facc15; margin-top:8px;">⭐ 최고 단계 도달</div>`;
    }
    html += `</div>`;

    html += `<div style="font-size:15px; font-weight:bold; color:#0ea5e9; margin:16px 0 8px 0;">🏗 업종 선택</div>`;
    html += `<div style="font-size:12px; color:#94a3b8; margin-bottom:12px;">슬롯이 남아있고 자본이 충분해야 추가 가능합니다.</div>`;

    const cats = gs.BUSINESS_CATEGORIES;
    const unlockedCats = s.unlockedCategories || ['food'];

    // ★ v0.25 해금 상태에 따라 3개 섹션으로 분류
    const openKeys   = Object.keys(cats).filter(k => unlockedCats.includes(k));
    const lockedAKeys= Object.keys(cats).filter(k => !unlockedCats.includes(k) && cats[k].type==='A');
    const lockedBKeys= Object.keys(cats).filter(k => !unlockedCats.includes(k) && cats[k].type==='B');
    const lockedCKeys= Object.keys(cats).filter(k => !unlockedCats.includes(k) && cats[k].type==='C');

    function renderCatCard(key, catUnlocked) {
      const cat = cats[key];
      const minCapital = Math.floor(stage.baseCapital * cat.capitalMul * 0.7);
      const canAfford  = s.cash >= minCapital;
      const canSlot    = slotsLeft > 0;
      const enabled    = catUnlocked && canAfford && canSlot;

      // 해금 진행도 계산 (TYPE A만)
      let progressHTML = '';
      if (!catUnlocked && cat.type === 'A' && cat.unlockCond) {
        const cond = cat.unlockCond;
        if (cond.cumulativeProfit) {
          const pct = Math.min(100, (s.cumulativeProfit / cond.cumulativeProfit * 100)).toFixed(0);
          progressHTML = '<div style="margin-top:6px;">'
            + '<div style="font-size:11px; color:#94a3b8; margin-bottom:3px;">🔓 ' + cat.unlockDesc + ' (' + pct + '%)</div>'
            + '<div style="height:4px; background:#1e293b; border-radius:2px;">'
            + '<div style="height:100%; width:'+pct+'%; background:#a3e635; border-radius:2px;"></div></div></div>';
        } else {
          progressHTML = '<div style="font-size:11px; color:#94a3b8; margin-top:6px;">🔓 ' + cat.unlockDesc + '</div>';
        }
      }

      // TYPE B: 조건 달성 여부
      let typeBadge = '';
      if (!catUnlocked) {
        if (cat.type === 'A') typeBadge = '<span style="font-size:10px; color:#a3e635; margin-left:6px;">FREE</span>';
        if (cat.type === 'B') typeBadge = '<span style="font-size:10px; color:#fbbf24; margin-left:6px;">₩' + (cat.iapPrice||0).toLocaleString() + '</span>';
        if (cat.type === 'C') typeBadge = '<span style="font-size:10px; color:#f87171; margin-left:6px;">결제전용 ₩' + (cat.iapPrice||0).toLocaleString() + '</span>';
      }

      const borderColor = catUnlocked ? (enabled ? '#0ea5e9' : '#374151')
                        : cat.type==='C' ? '#7f1d1d' : cat.type==='B' ? '#92400e' : '#374151';
      const opacity = catUnlocked ? (enabled ? 1 : 0.6) : 0.7;
      const arrow   = catUnlocked ? (enabled ? '▶' : '🔒') : (cat.type==='C' ? '💳' : cat.type==='B' ? '💰' : '🔓');

      return '<div class="card" data-category="'+key+'" data-unlocked="'+(catUnlocked?'1':'0')+'" data-type="'+(cat.type||'A')+'" '
           + 'style="border-color:'+borderColor+'; opacity:'+opacity+';">'
           + '<div class="card-header">'
           + '<div class="card-icon">'+cat.emoji+'</div>'
           + '<div style="flex:1; min-width:0;">'
           + '<div class="card-title">'+cat.label+typeBadge+'</div>'
           + '<div class="card-meta">기본 매출 '+fmtWon(cat.baseRevenue)+'/분기</div>'
           + '</div>'
           + '<div class="card-arrow">'+arrow+'</div>'
           + '</div>'
           + '<div style="display:flex; gap:10px; font-size:12px; margin-top:6px; flex-wrap:wrap;">'
           + '<span style="color:#fbbf24">사고율 '+cat.baseRisk+'</span>'
           + (catUnlocked ? '<span style="color:#cbd5e1">최소비 '+fmtWon(minCapital)+'</span>' : '')
           + '<span style="color:#a3e635">'+cat.effect+'</span>'
           + '</div>'
           + progressHTML
           + '</div>';
    }

    // ── 해금된 카테고리
    if (openKeys.length) {
      html += '<div style="font-size:12px; color:#a3e635; margin:8px 0 4px 0; font-weight:bold;">✅ 해금된 업종</div>';
      openKeys.forEach(k => { html += renderCatCard(k, true); });
    }
    // ── TYPE A 잠금 (성취로 해금 가능)
    if (lockedAKeys.length) {
      html += '<div style="font-size:12px; color:#94a3b8; margin:12px 0 4px 0; font-weight:bold;">🔓 성취 달성 시 자동 해금</div>';
      lockedAKeys.forEach(k => { html += renderCatCard(k, false); });
    }
    // ── TYPE B (조건 or 결제)
    if (lockedBKeys.length) {
      html += '<div style="font-size:12px; color:#fbbf24; margin:12px 0 4px 0; font-weight:bold;">💰 조건 달성 또는 결제 해금</div>';
      lockedBKeys.forEach(k => { html += renderCatCard(k, false); });
    }
    // ── TYPE C (결제 전용)
    if (lockedCKeys.length) {
      html += '<div style="font-size:12px; color:#f87171; margin:12px 0 4px 0; font-weight:bold;">💳 결제 전용 프리미엄</div>';
      lockedCKeys.forEach(k => { html += renderCatCard(k, false); });
    }

    const footer = `<button class="btn" data-action="back">◀ 게임으로 돌아가기</button>`;
    modal.open('🏗 사업확장', html, footer);

    // ★ v0.25 이벤트 — 해금 상태별 분기
    document.querySelectorAll('.card[data-category]').forEach(el => {
      bindClick(el, () => {
        const key        = el.dataset.category;
        const isUnlocked = el.dataset.unlocked === '1';
        const catType    = el.dataset.type || 'A';
        const cat        = cats[key];

        // ── 잠금 상태 처리
        if (!isUnlocked) {
          if (catType === 'C') {
            toast.show('💳 결제 전용 콘텐츠입니다 (준비 중)', '#f87171');
          } else if (catType === 'B') {
            // TYPE B: 조건 달성 여부 재확인
            const cond = cat.unlockCond || {};
            const botCount = s.businesses.reduce((t,b)=>t+(b.bots?b.bots.length:0),0);
            const bizCount = s.businesses.filter(b=>b.unlocked).length;
            let condMet = true;
            if (cond.cumulativeProfit && s.cumulativeProfit < cond.cumulativeProfit) condMet = false;
            if (cond.bizCount && bizCount < cond.bizCount) condMet = false;
            if (cond.botCount && botCount < cond.botCount) condMet = false;
            if (condMet) {
              // 조건 달성 → 즉시 해금
              if (!s.unlockedCategories.includes(key)) s.unlockedCategories.push(key);
              toast.show('🔓 ' + cat.emoji + ' ' + cat.label + ' 해금!', '#a3e635');
              window.MJY.saveSystem.save();
              self.render();
            } else {
              toast.show('🔒 ' + cat.unlockDesc + ' 또는 결제로 해금', '#fbbf24');
            }
          } else {
            // TYPE A: 조건 미달
            toast.show('🔓 ' + (cat.unlockDesc || '조건 달성 시 자동 해금'), '#94a3b8');
          }
          return;
        }

        // ── 해금됨 → 기존 로직
        if (slotsLeft <= 0) {
          toast.show('🚫 사업 슬롯이 가득 찼습니다. 단계 승급이 필요합니다.', '#dc2626');
          return;
        }
        const minCapital = Math.floor(stage.baseCapital * cat.capitalMul * 0.7);
        if (s.cash < minCapital) {
          toast.show('🚫 자본 부족 (최소 ' + fmtWon(minCapital) + ')', '#dc2626');
          return;
        }
        sceneManager.switch('customizeBusiness', {category: key});
      });
    });
    document.querySelectorAll('[data-action="back"]').forEach(el => {
      bindClick(el, () => sceneManager.switch('game'));
    });
  },
  update: function() {},
};

          <div style="font-size:18px; font-weight:bold; color:#0ea5e9;">${cat.label} 사업 설정</div>
          <div style="font-size:12px; color:#94a3b8;">5개 옵션을 조정해 자기 전략을 만드세요</div>
        </div>
      </div>

/* ============================================================
   HTML 모달 시스템 (v0.4-B 모바일 가독성 개선)
   ============================================================ */
const modal = (function() {
  const overlay = document.getElementById('modal-overlay');
  const titleEl = document.getElementById('modal-title');
  const bodyEl = document.getElementById('modal-body');
  const footerEl = document.getElementById('modal-footer');
  const closeBtn = document.getElementById('modal-close');
  let onCloseCallback = null;

  // 닫기 버튼 - touchmove 감지로 스크롤 의도 분리
  let _closeTouchStartX = 0, _closeTouchStartY = 0, _closeTouchMoved = false;
  let _closeLastHandled = 0;
  closeBtn.addEventListener('touchstart', (e) => {
    if (e.touches && e.touches[0]) {
      _closeTouchStartX = e.touches[0].clientX;
      _closeTouchStartY = e.touches[0].clientY;
      _closeTouchMoved = false;
    }
  }, { passive: true });
  closeBtn.addEventListener('touchmove', (e) => {
    if (e.touches && e.touches[0]) {
      const dx = Math.abs(e.touches[0].clientX - _closeTouchStartX);
      const dy = Math.abs(e.touches[0].clientY - _closeTouchStartY);
      if (dx > 10 || dy > 10) _closeTouchMoved = true;
    }
  }, { passive: true });
  function _handleClose(e) {
    if (_closeTouchMoved) { _closeTouchMoved = false; return; }
    const now = Date.now();
    if (now - _closeLastHandled < 300) return;
    _closeLastHandled = now;
    if (e && e.stopPropagation) e.stopPropagation();
    closeModal();
  }
  closeBtn.addEventListener('click', _handleClose);
  closeBtn.addEventListener('touchend', function(e) {
    if (!_closeTouchMoved && e.cancelable) e.preventDefault();
    _handleClose(e);
  }, { passive: false });
  // 컨테이너 클릭은 overlay로 전파되지 않게 차단
  const containerEl = document.getElementById('modal-container');
  if (containerEl) {
    containerEl.addEventListener('click', (e) => { e.stopPropagation(); });
    containerEl.addEventListener('touchend', (e) => { e.stopPropagation(); });
  }
  // ★ C안: modal-body 스크롤 중 버튼 오터치 방지
  // touchstart/touchend Y 이동 감지 → 스크롤 의도면 이벤트 소비
  let _modalScrollY = 0;
  const bodyEl2 = document.getElementById('modal-body');
  if (bodyEl2) {
    bodyEl2.addEventListener('touchstart', (e) => {
      if (e.touches && e.touches[0]) _modalScrollY = e.touches[0].clientY;
    }, { passive: true });
    bodyEl2.addEventListener('touchend', (e) => {
      if (!e.changedTouches || !e.changedTouches[0]) return;
      const dy = Math.abs(e.changedTouches[0].clientY - _modalScrollY);
      // 20px 이상 스크롤 이동이면 버튼 클릭 이벤트 차단
      if (dy > 20 && e.cancelable) e.preventDefault();
    }, { passive: false });
  }
  // 오버레이 자체를 탭한 경우만 닫기 (모달이 풀스크린이라 거의 안 보임)
  overlay.addEventListener('click', (e) => { if (e.target === overlay) closeModal(); });

  let _closing = false;  // 재진입 가드 (switch→exit→close 재귀 방지)
  function closeModal() {
    overlay.classList.remove('active');
    if (onCloseCallback) { const cb = onCloseCallback; onCloseCallback = null; cb(); }
    // ★ X/오버레이로 닫을 때, 현재 씬이 모달 씬이면 game으로 복귀
    //   (안 그러면 다음 프레임 render가 modal을 다시 열어 안 닫히는 것처럼 보임)
    if (_closing) return;
    try {
      if (typeof sceneManager !== 'undefined' && sceneManager.current) {
        const sc = scenes[sceneManager.current];
        if (sc && sc.isModal) { _closing = true; sceneManager.switch('game'); _closing = false; }
      }
    } catch(e) { _closing = false; }
  }

  return {
    // 신규 모달 - 스크롤 건드리지 않음 (브라우저 기본 동작에 맡김)
    open: function(title, bodyHTML, footerHTML, onClose) {
      titleEl.textContent = title;
      bodyEl.innerHTML = bodyHTML;
      footerEl.innerHTML = footerHTML || '';
      onCloseCallback = onClose || null;
      overlay.classList.add('active');
      // 모달 안 HUD 동기화 (게임 자산 가시성 유지)
      try { if (scenes.game && scenes.game.renderHUD) scenes.game.renderHUD(); } catch(e) {}
      // 모달 안 HUD 클릭 핸들러 (sceneManager가 정의된 후에만)
      try {
        const mh = document.getElementById('modal-hud');
        if (mh && !mh._mjyHudBound) {
          mh._mjyHudBound = true;
          mh.addEventListener('click', () => sceneManager.switch('financeDashboard'));
        }
      } catch(e) {}
    },
    // 같은 모달 재렌더링 - 스크롤 건드리지 않음
    update: function(title, bodyHTML, footerHTML) {
      titleEl.textContent = title;
      bodyEl.innerHTML = bodyHTML;
      footerEl.innerHTML = footerHTML || '';
      try { if (scenes.game && scenes.game.renderHUD) scenes.game.renderHUD(); } catch(e) {}
    },
    close: closeModal,
    isOpen: function() { return overlay.classList.contains('active'); },
    setTitle: function(t) { titleEl.textContent = t; },
  };
})();

const toast = (function() {

// ★ v0.8.2 사건 전용 토스트 (희귀도별 연출)
const eventToast = (function() {
  const el = document.getElementById('event-toast');
  const rarityEl = document.getElementById('et-rarity');
  const nameEl = document.getElementById('et-name');
  const storyEl = document.getElementById('et-story');
  const effectEl = document.getElementById('et-effect');
  let timer = null;
  const rarityLabel = {common:'COMMON', uncommon:'UNCOMMON', rare:'RARE', legendary:'LEGENDARY ★'};
  return {
    show: function(ev) {
      if (!el) return;
      // 희귀도 클래스 적용
      el.className = 'event-toast rar-' + (ev.rarity || 'common');
      rarityEl.textContent = rarityLabel[ev.rarity] || 'COMMON';
      nameEl.textContent = (ev.trigger ? '⭐ ' : '') + ev.name;
      storyEl.textContent = ev.story || '';
      // 효과 요약
      const color = ev.posneg === 'positive' ? '#4ade80' : (ev.category === 'oneoff' ? '#fbbf24' : '#ef4444');
      let effect = '';
      if (ev.cashDelta && ev.cashDelta !== 0) effect += (ev.cashDelta > 0 ? '+' : '') + fmtWon(ev.cashDelta) + ' ';
      if (ev.revMul && ev.revMul !== 1.0) effect += '매출×' + ev.revMul.toFixed(2) + ' ';
      if (ev.costMul && ev.costMul !== 1.0) effect += '비용×' + ev.costMul.toFixed(2);
      effectEl.textContent = effect.trim() || (ev.posneg === 'positive' ? '긍정 효과' : '영향');
      effectEl.style.color = color;
      // 표시 + 애니메이션
      el.style.display = 'block';
      el.style.animation = 'none';
      void el.offsetWidth;
      const isLegend = ev.rarity === 'legendary';
      // legendary는 펄스 유지를 위해 in 애니메이션만 짧게
      el.style.animation = 'eventToastIn 0.4s ease-out forwards' + (isLegend ? ', legendaryPulse 1.2s ease-in-out 0.4s infinite' : '');
      const dur = isLegend ? 3500 : 2800;
      if (timer) clearTimeout(timer);
      timer = setTimeout(() => {
        el.style.animation = 'eventToastOut 0.4s ease-in forwards';
        setTimeout(() => { el.style.display = 'none'; }, 400);
      }, dur);
      // 화면 플래시 동반
      screenFlash.flash(ev.posneg);
      // ★ v0.50 파티클 이펙트 연동
      try {
        const bgCanvas = document.getElementById('bg-canvas');
        const bx = 400, by = 80;
        if (ev.posneg === 'positive') {
          fx_sparkle(bx, by, '#4ade80', 10);
          if (ev.cashDelta && ev.cashDelta > 0) fx_moneyBurst(bx, by, ev.cashDelta);
        } else if (ev.posneg === 'negative') {
          fx_fire(bx, by, ev.rarity==='legendary'?1.5 : ev.rarity==='rare'?1.0 : 0.5);
          if (ev.rarity === 'legendary' || ev.rarity === 'rare') screenShake(ev.rarity==='legendary'?8:4, ev.rarity==='legendary'?500:300);
        }
      } catch(e) { console.warn('[fx] eventToast effect error:', e.message); }
    },
  };
})();

// ★ v0.27 사업 이벤트 선택지 모달
function showBizEventChoice(ev) {
  if (!ev.choices || !ev.choices.length) return;
  const s = window.MJY.gameState.get();

  let html = '<div style="font-size:13px; color:#94a3b8; margin-bottom:12px; line-height:1.5;">'
    + htmlEscape(ev.story || '') + '</div>';

  if (ev.choicePrompt) {
    html += '<div style="font-size:15px; font-weight:bold; color:#fbbf24; margin-bottom:14px;">'
      + htmlEscape(ev.choicePrompt) + '</div>';
  }

  ev.choices.forEach((ch, idx) => {
    // 신용 조건 체크
    const creditOk = !ch.creditReq || (s.creditScore || 500) >= ch.creditReq;
    const cashOk   = !ch.cashCost  || s.cash >= ch.cashCost;
    const disabled = (!creditOk || !cashOk) ? 'disabled' : '';
    const hint = !creditOk ? ' (신용도 부족)' : !cashOk ? ' (잔고 부족)' : '';

    html += '<button class="btn '+(disabled?'':'btn-warn')+'" data-choice-idx="'+idx+'" '
      + disabled + ' style="margin-bottom:8px; width:100%; text-align:left;">'
      + htmlEscape(ch.label)
      + (ch.cashCost ? ' <span style="color:#f87171; font-size:11px;">-'+fmtWon(ch.cashCost)+'</span>' : '')
      + (hint ? '<span style="color:#f87171; font-size:11px;"> '+hint+'</span>' : '')
      + '</button>';
  });

  modal.open('⚡ ' + htmlEscape(ev.name), html, '', () => {
    sceneManager.switch('game');
  });

  // 선택 버튼 바인딩
  requestAnimationFrame(() => {
    document.querySelectorAll('[data-choice-idx]').forEach(el => {
      bindClick(el, () => {
        const idx = parseInt(el.dataset.choiceIdx);
        const ch  = ev.choices[idx];
        if (!ch) return;
        const s2  = window.MJY.gameState.get();
        // 비용 차감
        if (ch.cashCost && s2.cash >= ch.cashCost) s2.cash -= ch.cashCost;
        if (ch.cashDelta) s2.cash += ch.cashDelta;
        // 이펙트 적용
        const eff = ch.effect || {};
        if (eff.costMul)   ev.costMul = eff.costMul;
        if (eff.revMul)    ev.revMul  = eff.revMul;
        if (eff.duration)  ev.remainingQuarters = Math.min(ev.remainingQuarters||1, eff.duration);
        // 결과 토스트
        toast.show('✅ ' + htmlEscape(eff.msg || ch.label), '#a3e635');
        window.MJY.saveSystem.save();
        modal.close();
      });
    });
  });
}

// ★ v0.23 SSR/SR 풀스크린 채용 연출 모듈
const gachaReveal = (function() {
  const overlay   = document.getElementById('gacha-reveal');
  const raysEl    = document.getElementById('gacha-rays');
  const charWrap  = document.getElementById('gacha-char-wrap');
  const charCanvas= document.getElementById('gacha-char-canvas');
  const badgeEl   = document.getElementById('gacha-badge');
  const nameEl    = document.getElementById('gacha-name');
  const flavorEl  = document.getElementById('gacha-flavor');
  const introEl   = document.getElementById('gacha-intro');
  const skillEl   = document.getElementById('gacha-skill');
  let _onClose = null;
  let _timers  = [];

  function later(fn, ms) {
    const t = setTimeout(fn, ms);
    _timers.push(t);
    return t;
  }
  function clearAll() {
    _timers.forEach(clearTimeout);
    _timers = [];
  }

  // 방사선 파티클 생성
  function buildRays(color) {
    raysEl.innerHTML = '';
    const count = 16;
    for (let i = 0; i < count; i++) {
      const ray = document.createElement('div');
      ray.className = 'gacha-ray';
      const angle = (360 / count) * i;
      ray.style.cssText = [
        'background: linear-gradient(to top, transparent, ' + color + '55)',
        'transform: rotate(' + angle + 'deg) translateX(-50%)',
        'animation: rayExpand 1.2s ease-out ' + (i * 0.04) + 's forwards',
      ].join(';');
      raysEl.appendChild(ray);
    }
  }

  // 별 파티클
  function spawnStars(color, count) {
    count = count || 12;
    for (let i = 0; i < count; i++) {
      const star = document.createElement('div');
      star.className = 'gacha-star';
      const angle  = Math.random() * 360;
      const dist   = 80 + Math.random() * 140;
      const sx = Math.cos(angle * Math.PI / 180) * dist + 'px';
      const sy = Math.sin(angle * Math.PI / 180) * dist + 'px';
      star.style.cssText = [
        'left: calc(50% + ' + (Math.random()*160-80) + 'px)',
        'top:  calc(50% + ' + (Math.random()*160-80) + 'px)',
        '--sx: ' + sx, '--sy: ' + sy,
        'color: ' + color,
        'animation: starFloat ' + (0.8 + Math.random()*0.6) + 's ease-out ' + (Math.random()*0.4) + 's forwards',
      ].join(';');
      star.textContent = ['✦','★','✧','⭐'][Math.floor(Math.random()*4)];
      raysEl.appendChild(star);
    }
  }

  // 캐릭터 픽셀 렌더
  function renderChar(emp) {
    if (!charCanvas || !window.drawEmployee) return;
    const c = charCanvas.getContext('2d');
    c.imageSmoothingEnabled = false;
    c.clearRect(0, 0, charCanvas.width, charCanvas.height);
    const tmpl = window.SPRITES && SPRITES.empTemplate ? SPRITES.empTemplate.data : null;
    if (!tmpl) return;
    const cols  = tmpl[0].length;
    const rows  = tmpl.length;
    const scale = Math.max(1, Math.min(
      Math.floor(charCanvas.width  / cols),
      Math.floor(charCanvas.height / rows)
    ));
    const x = Math.floor((charCanvas.width  - cols * scale) / 2);
    const y = Math.floor((charCanvas.height - rows * scale) / 2);
    drawEmployee(c, emp, x, y, scale);
  }

  // 메인 show 함수
  function show(emp, onClose) {
    if (!overlay) return;
    clearAll();
    _onClose = onClose || null;

    const rarity  = emp.rarity || 'SR';
    const isSSR   = rarity === 'SSR';

    overlay.className = '';
    [charWrap, badgeEl, nameEl, flavorEl, introEl, skillEl].forEach(el => {
      if (el) el.classList.remove('show');
    });

    // CSS 변수 세팅
    overlay.style.setProperty('--gacha-glow', glowCol);

    // 오버레이 열기
    overlay.classList.add('active', 'rarity-' + rarity);

    // 방사선 + 별 파티클
    buildRays(glowCol);
    later(() => spawnStars(glowCol, starCnt), 200);
    // ★ v0.50 가챠 Canvas 파티클
    try {
      fx_levelUp(400, 300);
      if (isSSR) { screenShake(4, 300); fx_sparkle(400, 300, '#facc15', 20); }
    } catch(e){}

    // 캐릭터 픽셀 렌더
    renderChar(emp);

    // 배지
    badgeEl.textContent = (isSSR ? '⭐⭐⭐ SSR' : '⭐⭐ SR');
    badgeEl.style.color = textCol;
    later(() => badgeEl.classList.add('show'), 80);

    // 캐릭터 등장
    later(() => charWrap.classList.add('show'), 180);

    // 이름
    nameEl.textContent = emp.name;
    nameEl.style.color = textCol;
    later(() => nameEl.classList.add('show'), 380);

    // 플레이버
    flavorEl.textContent = emp.flavor || '';
    later(() => flavorEl.classList.add('show'), 520);

    // intro 대사
    introEl.textContent = emp.intro || '';
    introEl.style.color = textCol;
    later(() => introEl.classList.add('show'), 680);

    // 스킬 칩
    if (emp.skills && emp.skills.length) {
      const sk = emp.skills[0];
      skillEl.innerHTML = '<span style="color:' + textCol + ';">✦ ' + sk.name + '</span>'
        + ' <span style="color:#94a3b8; font-weight:normal;">— ' + sk.desc + '</span>';
      skillEl.style.borderColor = glowCol + '55';
      later(() => skillEl.classList.add('show'), 840);
    }

    // 탭/클릭으로 닫기
    function closeHandler(e) {
      e.stopPropagation();
      overlay.removeEventListener('click', closeHandler);
      hide();
    }
    later(() => overlay.addEventListener('click', closeHandler), 900);
  }

  function hide() {
    clearAll();
    if (overlay) overlay.classList.remove('active');
    if (_onClose) { const cb = _onClose; _onClose = null; cb(); }
  }

  return { show, hide };
})();

// HTML 유틸: 능력치 별 표시
function htmlStars(value, max) {
  max = max || 5;
  let html = '<span class="stars">';
  for (let i = 0; i < max; i++) {
    html += `<span class="star ${i < value ? 'filled' : ''}"></span>`;
  }
  html += '</span>';
  return html;
}

// 모바일/데스크탑 모두 안정적으로 작동하는 클릭 바인더
// touchmove 감지로 스크롤 의도와 클릭 의도 분리
function bindClick(el, handler) {
  if (!el) return;
  let touched = false;
  let lastTime = 0;
  let _startY = 0; // ★ C안: 스크롤 감지용 시작 Y좌표
  let _startX = 0;
  el.addEventListener('touchstart', function(e) {
    touched = true;
    if (e.touches && e.touches[0]) {
      _startY = e.touches[0].clientY;
      _startX = e.touches[0].clientX;
    }
  }, { passive: true });
  el.addEventListener('touchend', function(e) {
    if (!touched) return;
    touched = false;
    // ★ C안: 20px 이상 이동 시 스크롤 의도 → 클릭 무시
    const endY = (e.changedTouches && e.changedTouches[0]) ? e.changedTouches[0].clientY : _startY;
    const endX = (e.changedTouches && e.changedTouches[0]) ? e.changedTouches[0].clientX : _startX;
    if (Math.abs(endY - _startY) > 20 || Math.abs(endX - _startX) > 20) return;
    const now = Date.now();
    if (now - lastTime < 200) return;
    lastTime = now;
    if (e.cancelable) e.preventDefault();
    e.stopPropagation();
    handler.call(this, e);
  }, { passive: false });
  el.addEventListener('click', function(e) {
    if (touched) return;
    const now = Date.now();
    if (now - lastTime < 200) return;
    lastTime = now;
    e.stopPropagation();
    handler.call(this, e);
  });
}

function bindClickAll(selector, handler) {
  document.querySelectorAll(selector).forEach(el => bindClick(el, handler.bind(null, el)));
}
function htmlProgress(val, max, label) {
  const ratio = Math.max(0, Math.min(1, val/max));
  const cls = ratio > 0.6 ? 'high' : ratio > 0.3 ? 'mid' : 'low';
  const txt = label || `${val}/${max}`;
  return `<div class="progress"><div class="progress-fill ${cls}" style="width:${ratio*100}%"></div><div class="progress-text">${txt}</div></div>`;
}
function htmlEscape(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ★ v0.10 즉시형 퀘스트 평가 + 완료 토스트 (액션 시점 호출)
function questCheck(s) {
  if (!window.MJY.questEngine) return;
  const done = window.MJY.questEngine.evaluate(s);
  if (done && done.length > 0) {
    done.forEach((qid, idx) => {
      const qd = window.MJY.questEngine.getDef(qid);
      setTimeout(() => {
        toast.show('✅ 퀘스트 완료: ' + (qd ? qd.title : qid) + ' (보상 수령 가능)', '#facc15');
      }, idx * 600);
    });
  }
}

// 캐릭터 미리보기 캔버스에 그리기
function renderEmpPreview(canvasEl, emp) {
  // ★ PATCH-KIAN-C v0.22: 기안84 스타일 16×17 템플릿 비율 자동 맞춤
  const c = canvasEl.getContext('2d');
  c.imageSmoothingEnabled = false;
  c.clearRect(0, 0, canvasEl.width, canvasEl.height);
  const tmpl = SPRITES.empTemplate.data;
  const cols = tmpl[0].length;
  const rows = tmpl.length;
  const scale = Math.max(1, Math.min(
    Math.floor(canvasEl.width  / cols),
    Math.floor(canvasEl.height / rows)
  ));
  const x = Math.floor((canvasEl.width  - cols * scale) / 2);
  const y = Math.floor((canvasEl.height - rows * scale) / 2);
  drawEmployee(c, emp, x, y, scale);
}
function renderBotPreview(canvasEl, bot) {
  const c = canvasEl.getContext('2d');
  c.imageSmoothingEnabled = false;
  c.clearRect(0, 0, canvasEl.width, canvasEl.height);
  const sprite = getBotSprite(bot);
  const scale = 9;
  const x = (canvasEl.width - 10*scale) / 2;
  const y = (canvasEl.height - 11*scale) / 2;
  drawSprite(c, sprite, x, y, scale);
}
