<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#4a7fb5" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1a3a5c"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <circle cx="200" cy="155" r="75" fill="#1a3a5c" stroke="#4a7fb5" stroke-width="3" filter="url(#glow)"/>
  <text x="200" y="178" text-anchor="middle" font-family="sans-serif" font-size="56" font-weight="bold" fill="#c9daf8">채</text>
  <rect x="40" y="270" width="320" height="2" fill="#4b9b6e" opacity="0.5"/>
  <text x="200" y="310" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="bold" fill="#c9daf8">윤채아</text>
  <text x="200" y="340" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#c9daf8" opacity="0.7">혈액연구원</text>
  <rect x="0" y="0" width="400" height="400" fill="none" stroke="#4b9b6e" stroke-width="4" rx="8" opacity="0.6"/>
</svg>