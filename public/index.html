<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a73e8">
  <title>석유사업본부 업무시스템</title>
  <link rel="stylesheet" href="/css/style.css?v=20260609q">
  <link rel="manifest" href="/manifest.json">
</head>
<body>

<!-- ═══ 로그인 화면 ═══ -->
<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <h1>석유사업본부</h1>
    <p class="subtitle">업무공유 시스템</p>
    <div class="form-group">
      <label>연락처</label>
      <div style="display:flex; align-items:center; gap:4px;">
        <span style="font-size:15px; font-weight:600; white-space:nowrap;">010 -</span>
        <input type="tel" id="loginPhone" class="form-control" placeholder="0000-0000" maxlength="9" style="flex:1;">
      </div>
    </div>
    <div class="form-group">
      <label>비밀번호</label>
      <input type="password" id="loginPassword" class="form-control" placeholder="비밀번호 입력">
    </div>
    <button class="btn btn-primary btn-block btn-lg" onclick="login()">로그인</button>
    <button class="btn btn-outline btn-block" style="margin-top:8px;" onclick="showRegisterForm()">가입신청</button>
    <p style="text-align:center; margin-top:12px;">
      <a href="#" onclick="showResetPassword(); return false;" style="font-size:12px; color:var(--gray-500); text-decoration:none;">비밀번호를 잊으셨나요?</a>
    </p>
    <p style="text-align:center; margin-top:12px;">
      <a href="#" onclick="showAdminLogin(); return false;" style="font-size:11px; color:#ccc; text-decoration:none;">시스템관리자</a>
    </p>
  </div>
</div>

<!-- ═══ 비밀번호 재설정 화면 ═══ -->
<div id="resetScreen" class="login-screen" style="display:none;">
  <div class="login-card">
    <h1>비밀번호 재설정</h1>
    <p class="subtitle">가입 시 등록한 이메일로 인증합니다</p>
    <div id="resetStep1">
      <div class="form-group">
        <label>이름</label>
        <input type="text" id="resetName" class="form-control" placeholder="실명 입력">
      </div>
      <div class="form-group">
        <label>이메일</label>
        <input type="email" id="resetEmail" class="form-control" placeholder="가입 시 등록한 이메일">
      </div>
      <button class="btn btn-primary btn-block btn-lg" onclick="verifyReset()">본인 확인</button>
    </div>
    <div id="resetStep2" style="display:none;">
      <div class="form-group">
        <label>새 비밀번호</label>
        <input type="password" id="resetNewPw" class="form-control" placeholder="새 비밀번호 입력">
      </div>
      <div class="form-group">
        <label>새 비밀번호 확인</label>
        <input type="password" id="resetNewPwConfirm" class="form-control" placeholder="새 비밀번호 재입력">
      </div>
      <button class="btn btn-success btn-block btn-lg" onclick="submitResetPassword()">비밀번호 변경</button>
    </div>
    <button class="btn btn-outline btn-block" style="margin-top:8px;" onclick="backToLogin()">뒤로</button>
  </div>
</div>

<!-- ═══ 가입신청 화면 ═══ -->
<div id="registerScreen" class="login-screen" style="display:none;">
  <div class="login-card">
    <h1>가입신청</h1>
    <p class="subtitle">사전 등록된 인원만 가입 가능</p>
    <div class="form-group">
      <label>이름</label>
      <input type="text" id="regName" class="form-control" placeholder="실명 입력">
    </div>
    <div class="form-group">
      <label>연락처</label>
      <div style="display:flex; align-items:center; gap:4px;">
        <span style="font-size:15px; font-weight:600; white-space:nowrap;">010 -</span>
        <input type="tel" id="regPhone" class="form-control" placeholder="0000-0000" maxlength="9" style="flex:1;">
      </div>
    </div>
    <div class="form-group">
      <label>이메일 (선택)</label>
      <input type="email" id="regEmail" class="form-control" placeholder="이메일 입력">
    </div>
    <div class="form-group">
      <label>비밀번호</label>
      <input type="password" id="regPassword" class="form-control" placeholder="비밀번호 설정">
    </div>
    <div class="form-group">
      <label>비밀번호 확인</label>
      <input type="password" id="regPasswordConfirm" class="form-control" placeholder="비밀번호 재입력">
    </div>
    <button class="btn btn-success btn-block btn-lg" onclick="submitRegister()">가입신청</button>
    <button class="btn btn-outline btn-block" style="margin-top:8px;" onclick="backToLogin()">뒤로</button>
  </div>
</div>

<!-- ═══ 관리자 로그인 화면 ═══ -->
<div id="adminLoginScreen" class="login-screen" style="display:none;">
  <div class="login-card">
    <h1>시스템관리자</h1>
    <p class="subtitle">관리자 비밀번호 입력</p>
    <div class="form-group">
      <label>비밀번호</label>
      <input type="password" id="adminPassword" class="form-control" placeholder="관리자 비밀번호">
    </div>
    <button class="btn btn-primary btn-block btn-lg" onclick="adminLogin()">로그인</button>
    <button class="btn btn-outline btn-block" style="margin-top:8px;" onclick="backToLogin()">뒤로</button>
  </div>
</div>

<!-- ═══ 관리자 페이지 ═══ -->
<div id="adminContainer" class="app-container" style="display:none;">
  <header class="app-header" style="background:var(--danger);">
    <h1>시스템 관리</h1>
    <div class="header-actions">
      <button class="header-btn" onclick="backToApp()" title="앱으로" style="font-size:13px; width:auto; padding:0 10px; border-radius:6px;">앱</button>
      <button class="header-btn" onclick="adminLogout()" title="로그아웃">&#9654;</button>
    </div>
  </header>
  <main class="main-content" id="adminContent"></main>
</div>

<!-- ═══ 메인 앱 ═══ -->
<div id="appContainer" class="app-container">

  <!-- 헤더 -->
  <header class="app-header">
    <h1 id="pageTitle">석유사업본부</h1>
    <div class="header-actions">
      <button class="header-btn" onclick="showGlobalSearch()" title="통합 검색">&#128269;</button>
      <button class="header-btn" onclick="showNotifications()" title="알림" style="position:relative;" id="notiBtn">&#128276;<span id="notiBadge" style="display:none; position:absolute; top:2px; right:2px; width:8px; height:8px; background:#ef4444; border-radius:50%;"></span></button>
      <button class="header-btn" onclick="showUserInfo()" title="내 정보">&#128100;</button>
      <button class="header-btn" onclick="logout()" title="로그아웃">&#9654;</button>
    </div>
  </header>

  <!-- 메인 컨텐츠 영역 -->
  <main class="main-content" id="mainContent"></main>

  <!-- FAB 버튼 -->
  <button class="fab" id="fabBtn" onclick="showFabMenu()">+</button>
  <!-- FAB 메뉴 -->
  <div id="fabMenu" style="display:none; position:fixed; bottom:80px; right:16px; z-index:999;">
    <div style="display:flex; flex-direction:column; gap:10px; align-items:flex-end;">
      <button onclick="closeFabMenu(); startVoiceReport();" style="display:flex; align-items:center; gap:8px; padding:12px 18px; border-radius:28px; border:none; background:#7c3aed; color:#fff; font-size:14px; font-weight:600; box-shadow:0 4px 14px rgba(124,58,237,.4); cursor:pointer;">
        <span style="font-size:20px;">&#127908;</span> 음성으로 기록
      </button>
      <button onclick="closeFabMenu(); openNewReport();" style="display:flex; align-items:center; gap:8px; padding:12px 18px; border-radius:28px; border:none; background:var(--primary); color:#fff; font-size:14px; font-weight:600; box-shadow:0 4px 14px rgba(26,115,232,.4); cursor:pointer;">
        <span style="font-size:20px;">&#9997;</span> 직접 입력
      </button>
    </div>
  </div>
  <div id="fabOverlay" onclick="closeFabMenu()" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.3); z-index:998;"></div>

  <!-- 하단 네비게이션 -->
  <nav class="bottom-nav">
    <button class="nav-item active" data-page="home" onclick="navigate('home')">
      <span class="nav-icon">&#127968;</span>
      <span>홈</span>
    </button>
    <button class="nav-item" data-page="reports" onclick="navigate('reports')">
      <span class="nav-icon">&#128221;</span>
      <span>업무일지</span>
    </button>
    <button class="nav-item" data-page="weekly" onclick="navigate('weekly')">
      <span class="nav-icon">&#128197;</span>
      <span>주간계획</span>
    </button>
    <button class="nav-item" data-page="franchise" onclick="navigate('franchise')">
      <span class="nav-icon">&#127970;</span>
      <span>가맹관리</span>
    </button>
    <button class="nav-item" data-page="more" onclick="navigate('more')">
      <span class="nav-icon">&#9776;</span>
      <span>더보기</span>
    </button>
  </nav>
</div>

<!-- ═══ 업무일지 작성 모달 ═══ -->
<div class="modal-overlay" id="reportModal">
  <div class="modal-content">
    <div class="modal-handle"></div>
    <h2 class="modal-title" id="reportModalTitle">업무일지 작성</h2>

    <div class="form-group">
      <label>보고 유형</label>
      <div class="chip-group">
        <button class="chip selected" data-field="report_type" data-value="daily" onclick="selectChip(this)">일일보고</button>
        <button class="chip" data-field="report_type" data-value="weekly" onclick="selectChip(this)">주간보고</button>
      </div>
    </div>

    <div class="form-group">
      <label>근무 유형</label>
      <div class="chip-group">
        <button class="chip selected" data-field="work_category" data-value="내근" onclick="selectChip(this)">내근</button>
        <button class="chip" data-field="work_category" data-value="외근" onclick="selectChip(this)">외근</button>
        <button class="chip" data-field="work_category" data-value="출장" onclick="selectChip(this)">출장</button>
      </div>
    </div>

    <div class="form-group">
      <label>보고일자</label>
      <input type="date" id="reportDate" class="form-control">
    </div>

    <div class="form-group form-group-autocomplete">
      <label>목적</label>
      <input type="text" id="reportPurpose" class="form-control" placeholder="업무 목적"
        onfocus="loadSuggestions('purpose', this)" oninput="filterSuggestions(this)">
      <div class="autocomplete-list" id="suggest-purpose"></div>
    </div>

    <p class="section-title" style="font-size:14px; margin-top:20px;">&#128270; 육하원칙 (5W1H)</p>
    <div class="w5h1-grid">
      <div class="form-group form-group-autocomplete">
        <label>누가 (Who)</label>
        <input type="text" id="reportWho" class="form-control" placeholder="담당자">
      </div>
      <div class="form-group">
        <label>언제 (When)</label>
        <input type="text" id="reportWhen" class="form-control" placeholder="시간/기간">
      </div>
      <div class="form-group form-group-autocomplete">
        <label>어디서 (Where)</label>
        <input type="text" id="reportWhere" class="form-control" placeholder="장소"
          onfocus="loadSuggestions('where_place', this)" oninput="filterSuggestions(this)">
        <div class="autocomplete-list" id="suggest-where_place"></div>
      </div>
      <div class="form-group form-group-autocomplete">
        <label>무엇을 (What)</label>
        <input type="text" id="reportWhat" class="form-control" placeholder="업무내용"
          onfocus="loadSuggestions('what_task', this)" oninput="filterSuggestions(this)">
        <div class="autocomplete-list" id="suggest-what_task"></div>
      </div>
      <div class="form-group form-group-autocomplete">
        <label>어떻게 (How)</label>
        <input type="text" id="reportHow" class="form-control" placeholder="수행방법"
          onfocus="loadSuggestions('how_method', this)" oninput="filterSuggestions(this)">
        <div class="autocomplete-list" id="suggest-how_method"></div>
      </div>
      <div class="form-group form-group-autocomplete">
        <label>왜 (Why)</label>
        <input type="text" id="reportWhy" class="form-control" placeholder="사유/목적"
          onfocus="loadSuggestions('why_reason', this)" oninput="filterSuggestions(this)">
        <div class="autocomplete-list" id="suggest-why_reason"></div>
      </div>
    </div>

    <div class="form-group">
      <label>상세 내용</label>
      <textarea id="reportContent" class="form-control" placeholder="업무 상세 내용을 입력하세요"></textarea>
    </div>

    <div class="form-group">
      <label>결재라인</label>
      <select id="reportApprover1" class="form-control">
        <option value="">1차 결재자 선택</option>
      </select>
    </div>
    <div class="form-group">
      <select id="reportApprover2" class="form-control">
        <option value="">2차 결재자 선택 (선택사항)</option>
      </select>
    </div>

    <div class="form-group">
      <label>수신</label>
      <select id="reportRecipient" class="form-control" multiple size="3">
      </select>
    </div>

    <div class="form-group">
      <label>템플릿 불러오기</label>
      <select id="templateSelect" class="form-control" onchange="loadTemplate()">
        <option value="">반복 업무 템플릿 선택</option>
      </select>
    </div>

    <div style="display:flex; gap:8px; margin-top:20px;">
      <button class="btn btn-outline" style="flex:1" onclick="closeModal('reportModal')">취소</button>
      <button class="btn btn-primary" style="flex:1" onclick="saveAsTemplate()">템플릿 저장</button>
      <button class="btn btn-success" style="flex:1" onclick="submitReport()">제출</button>
    </div>
  </div>
</div>

<!-- ═══ 주간계획 모달 ═══ -->
<div class="modal-overlay" id="weeklyModal">
  <div class="modal-content">
    <div class="modal-handle"></div>
    <h2 class="modal-title">주간계획 작성</h2>
    <div style="display:flex; gap:8px; margin-bottom:16px;">
      <div class="form-group" style="flex:1">
        <label>시작일</label>
        <input type="date" id="weekStart" class="form-control">
      </div>
      <div class="form-group" style="flex:1">
        <label>종료일</label>
        <input type="date" id="weekEnd" class="form-control">
      </div>
    </div>
    <div id="weeklyPlanItems"></div>
    <button class="btn btn-outline btn-block" style="margin-bottom:16px" onclick="addWeeklyItem()">+ 항목 추가</button>
    <div style="display:flex; gap:8px;">
      <button class="btn btn-outline" style="flex:1" onclick="closeModal('weeklyModal')">취소</button>
      <button class="btn btn-success" style="flex:1" onclick="submitWeeklyPlan()">저장</button>
    </div>
  </div>
</div>

<!-- ═══ 가맹점 등록 모달 ═══ -->
<div class="modal-overlay" id="franchiseModal">
  <div class="modal-content">
    <div class="modal-handle"></div>
    <h2 class="modal-title" id="franchiseModalTitle">가맹점 등록</h2>
    <div class="form-group">
      <label>구분</label>
      <div class="chip-group">
        <button class="chip selected" data-field="franchise_type" data-value="existing" onclick="selectChip(this)">기존 가맹</button>
        <button class="chip" data-field="franchise_type" data-value="new_prospect" onclick="selectChip(this)">신규 영업</button>
      </div>
    </div>
    <div class="form-group">
      <label>상호명</label>
      <input type="text" id="franchiseName" class="form-control" placeholder="가맹점 상호">
    </div>
    <div class="form-group">
      <label>지역</label>
      <select id="franchiseRegion" class="form-control">
        <option value="">지역 선택</option>
        <option>서울</option><option>경기</option><option>인천</option>
        <option>강원</option><option>충북</option><option>충남</option>
        <option>대전</option><option>전북</option><option>전남</option>
        <option>광주</option><option>경북</option><option>경남</option>
        <option>대구</option><option>울산</option><option>부산</option>
        <option>제주</option>
      </select>
    </div>
    <div class="form-group">
      <label>주소</label>
      <input type="text" id="franchiseAddress" class="form-control" placeholder="상세 주소">
    </div>
    <div class="form-group">
      <label>대표자명</label>
      <input type="text" id="franchiseOwner" class="form-control" placeholder="대표자명">
    </div>
    <div class="form-group">
      <label>연락처</label>
      <input type="tel" id="franchisePhone" class="form-control" placeholder="010-0000-0000">
    </div>
    <div class="form-group">
      <label>계약일</label>
      <input type="date" id="franchiseContractDate" class="form-control">
    </div>
    <div class="form-group">
      <label>비고</label>
      <textarea id="franchiseNotes" class="form-control" placeholder="메모"></textarea>
    </div>
    <div style="display:flex; gap:8px; margin-top:20px;">
      <button class="btn btn-outline" style="flex:1" onclick="closeModal('franchiseModal')">취소</button>
      <button class="btn btn-success" style="flex:1" onclick="submitFranchise()">등록</button>
    </div>
  </div>
</div>

<!-- 음성 녹음 전체화면 -->
<div id="voiceRecordScreen" style="display:none; position:fixed; inset:0; z-index:9999; background:#1a1a2e; color:#fff; flex-direction:column; align-items:center; justify-content:center;">
  <div style="text-align:center; padding:24px; max-width:340px; width:100%;">
    <div id="vrMicIcon" style="width:100px; height:100px; border-radius:50%; background:#7c3aed; display:flex; align-items:center; justify-content:center; margin:0 auto 24px; font-size:44px; box-shadow:0 0 0 0 rgba(124,58,237,.5); animation:vrPulse 1.5s infinite;">
      &#127908;
    </div>
    <p id="vrTitle" style="font-size:20px; font-weight:700; margin-bottom:8px;">업무 내용을 말씀해 주세요</p>
    <p style="font-size:13px; color:#aaa; margin-bottom:24px; line-height:1.6;">자유롭게 말하면 자동으로<br>육하원칙에 맞춰 분류됩니다</p>
    <div id="vrPreview" style="background:rgba(255,255,255,.08); border-radius:12px; padding:16px; min-height:80px; margin-bottom:24px; text-align:left;">
      <p id="vrText" style="font-size:14px; line-height:1.7; color:#ccc; min-height:20px;">...</p>
    </div>
    <div style="display:flex; gap:12px; justify-content:center;">
      <button onclick="cancelVoiceReport()" style="padding:14px 28px; border-radius:28px; border:none; background:rgba(255,255,255,.15); color:#fff; font-size:15px; font-weight:600; cursor:pointer;">취소</button>
      <button onclick="finishVoiceReport()" style="padding:14px 28px; border-radius:28px; border:none; background:#ef4444; color:#fff; font-size:15px; font-weight:600; cursor:pointer;">&#9724; 완료</button>
    </div>
  </div>
</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<style>
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.5;} }
@keyframes vrPulse { 0%{box-shadow:0 0 0 0 rgba(124,58,237,.5);} 70%{box-shadow:0 0 0 20px rgba(124,58,237,0);} 100%{box-shadow:0 0 0 0 rgba(124,58,237,0);} }
</style>
<script src="/js/app.js?v=20260610c"></script>
<script>
window.onerror = function(msg, url, line) {
  document.title = 'ERR:' + line + ':' + msg;
  console.error('JS Error:', msg, 'at line', line);
};
if (typeof login !== 'function') {
  document.title = 'app.js 로드 실패';
  document.getElementById('loginScreen').innerHTML = '<div style="padding:40px; text-align:center; color:#fff;"><h2>앱 로드 오류</h2><p>새로고침 해주세요 (캐시 삭제)</p><button onclick="location.reload(true)" style="margin-top:16px; padding:12px 24px; font-size:16px; border:2px solid #fff; background:none; color:#fff; border-radius:8px; cursor:pointer;">새로고침</button></div>';
}
</script>
</body>
</html>
